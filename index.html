<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER - MSI EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        #setup { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 24px; font-weight: bold; color: #f1c40f; }
        #dice-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100px; height: 100px; background: white; color: black; display: none; align-items: center; justify-content: center; font-size: 50px; font-weight: bold; border-radius: 15px; box-shadow: 0 0 30px #fff; }
        input { padding: 15px; width: 250px; margin-bottom: 20px; border-radius: 5px; border: none; text-align: center; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #f1c40f;">SQUAD LADDER V16</h1>
    <input type="text" id="pName" placeholder="Masukkan Nama (Contoh: Alvin)">
    <button class="btn" onclick="start()">START GAME</button>
</div>

<div id="ui">
    <div id="msg">MENUNGGU...</div>
    <div id="dice-box">?</div>
    <div id="controls"><button id="rollBtn" class="btn" onclick="roll()" disabled>KOCOK DADU! 🎲</button></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, myName = "";
    let boardPos = [];
    const GITHUB_BASE = "https://raw.githubusercontent.com/Alvinphanestu/ular-tangga/main/assets/";

    window.start = () => {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("Nama jangan kosong!");
        document.getElementById('setup').style.display = 'none';
        init();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 12); camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5)); // CAHAYA TERANG BIAR GAK ITEM

        // BUAT PAPAN (WARNA DASAR, GAK PAKE GAMBAR BIAR GAK ERROR)
        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            
            // Canvas buat NOMOR
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = (row + col) % 2 === 0 ? '#d35400' : '#e67e22'; // Warna Orange/Coklat
            ctx.fillRect(0,0,128,128);
            ctx.fillStyle = 'white'; ctx.font = 'bold 60px Arial'; ctx.textAlign = 'center';
            ctx.fillText(i+1, 64, 85);

            const tex = new THREE.CanvasTexture(canvas);
            const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.2), new THREE.MeshStandardMaterial({map: tex}));
            tile.position.set(col * 1.3 - 5.8, 0, row * 1.3 - 5.8);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }

        // TAMBAH PION LO DENGAN FOTO GITHUB
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0x00d4ff})));
        
        const loader = new THREE.TextureLoader();
        const faceUrl = `${GITHUB_BASE}${myName.toLowerCase()}.png`;
        const face = new THREE.Sprite(new THREE.SpriteMaterial({ 
            map: loader.load(faceUrl, undefined, undefined, () => {
                console.log("Pake avatar default kalau github gagal");
            }) 
        }));
        face.position.y = 1.2; face.scale.set(1.2, 1.2, 1);
        g.add(face);
        g.position.copy(boardPos[0]).add(new THREE.Vector3(0, 0.6, 0));
        scene.add(g);

        document.getElementById('msg').innerText = `GILIRAN: ${myName.toUpperCase()}`;
        document.getElementById('rollBtn').disabled = false;

        animate();
    }

    window.roll = () => {
        const r = Math.floor(Math.random() * 6) + 1;
        const db = document.getElementById('dice-box');
        db.style.display = 'flex'; db.innerText = r;
        setTimeout(() => db.style.display = 'none', 1000);
    }

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
