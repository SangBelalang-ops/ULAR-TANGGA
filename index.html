<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD HORROR: DATA BREACH V8</title>
    <style>
        :root { --blood: #800; --neon: #00d4ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: white; cursor: crosshair; }
        
        /* VISUAL FX */
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, black 150%); pointer-events: none; z-index: 10; }
        #noise { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUqnW3Fe/giphy.gif'); opacity: 0.04; pointer-events: none; z-index: 11; }
        #scanline { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.5) 51%); background-size: 100% 4px; pointer-events: none; z-index: 12; }
        
        /* UI OVERLAY */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 20; padding: 30px; display: flex; flex-direction: column; justify-content: space-between; }
        .top-ui { display: flex; justify-content: space-between; align-items: flex-start; }
        .bottom-ui { display: flex; flex-direction: column; gap: 10px; }
        
        .stat-box { background: rgba(0,0,0,0.7); border-left: 4px solid var(--blood); padding: 10px 20px; text-transform: uppercase; letter-spacing: 2px; }
        .data-counter { font-size: 24px; color: var(--neon); border: 1px solid var(--neon); padding: 10px; }
        
        /* BARS */
        .bar-container { width: 250px; height: 12px; background: #222; border: 1px solid #444; position: relative; }
        #stam-fill { width: 100%; height: 100%; background: #2ecc71; transition: 0.1s; }
        #bat-fill { width: 100%; height: 100%; background: #f1c40f; transition: 0.5s; }
        
        /* CROSSHAIR */
        #reticle { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%); }

        /* SCREENS */
        #menu { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
        .btn-start { padding: 20px 60px; font-size: 24px; background: transparent; color: var(--neon); border: 2px solid var(--neon); cursor: pointer; font-family: inherit; transition: 0.3s; }
        .btn-start:hover { background: var(--neon); color: black; box-shadow: 0 0 20px var(--neon); }
        
        #jumpscare { position: absolute; inset: 0; background: #000; z-index: 1000; display: none; align-items: center; justify-content: center; }
        .scare-msg { color: red; font-size: 8vw; font-weight: 900; animation: glitch 0.1s infinite; }

        @keyframes glitch {
            0% { transform: translate(2px, -2px); filter: hue-rotate(90deg); }
            50% { transform: translate(-2px, 2px) scale(1.1); filter: invert(1); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="font-size: 60px; color: var(--blood); margin-bottom: 10px;">SQUAD HORROR</h1>
    <p style="color: #666; margin-bottom: 40px;">[ MSI i7 PERFORMANCE MODE ACTIVE ]<br>SIHANOUKVILLE NIGHT SHIFT</p>
    <button class="btn-start" onclick="startGame()">INITIALIZE SYSTEM</button>
    <div style="margin-top: 30px; font-size: 14px; color: #444;">W,A,S,D: MOVE | SHIFT: SPRINT | E: FLASHLIGHT | MOUSE: LOOK</div>
</div>

<div id="vignette"></div>
<div id="noise"></div>
<div id="scanline"></div>
<div id="reticle"></div>

<div id="hud">
    <div class="top-ui">
        <div class="stat-box">
            STATUS: <span id="p-status">NORMAL</span><br>
            BPM: <span id="bpm">72</span>
        </div>
        <div class="data-counter">
            ENCRYPTED DATA: <span id="dc">0</span>/5
        </div>
    </div>
    <div class="bottom-ui">
        <div>STAMINA</div>
        <div class="bar-container"><div id="stam-fill"></div></div>
        <div>FLASHLIGHT POWER</div>
        <div class="bar-container"><div id="bat-fill"></div></div>
        <div id="hint" style="font-size: 12px; color: #666; margin-top: 10px;">PENCET 'E' UNTUK SENTER</div>
    </div>
</div>

<div id="jumpscare"><div class="scare-msg">ACCESS DENIED</div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- GAME CONSTANTS ---
    const MAP_SIZE = 60;
    const WALL_COUNT = 120;
    const DATA_COUNT = 5;

    // --- VARIABLES ---
    let scene, camera, renderer, clock, player, flashLight, audioCtx;
    let yaw = new THREE.Object3D();
    let pitch = new THREE.Object3D();
    let keys = {}, items = [], walls = [];
    let battery = 100, stamina = 100, dataFound = 0, isDead = false;
    let enemy, enemyActive = false;
    let moveSpeed = 0.1, sprintSpeed = 0.22;

    // --- CORE START ---
    window.startGame = () => {
        document.getElementById('menu').style.display = 'none';
        document.body.requestPointerLock();
        initAudio();
        init();
    };

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Background Hum (Wind)
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'brown'; osc.frequency.value = 50;
        g.gain.value = 0.02;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
    }

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 18);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        player = new THREE.Group();
        player.position.set(0, 1.6, 25);
        scene.add(player);
        
        player.add(yaw);
        yaw.add(pitch);
        pitch.add(camera);

        // Flashlight setup
        flashLight = new THREE.SpotLight(0xffffff, 0, 22, Math.PI/6, 0.6, 1);
        pitch.add(flashLight);
        flashLight.position.set(0, 0, 0);
        flashLight.target.position.set(0, 0, -1);
        pitch.add(flashLight.target);

        // Subtle Ambient (So it's not pitch black)
        scene.add(new THREE.AmbientLight(0xffffff, 0.03));

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        
        generateMap();
        spawnEnemy();
        spawnItems();
        
        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('keydown', (e) => { 
            keys[e.code] = true;
            if(e.code === 'KeyE' && battery > 0) toggleFlashlight();
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        animate();
    }

    function toggleFlashlight() {
        const isOn = flashLight.intensity > 0;
        flashLight.intensity = isOn ? 0 : 15;
        document.getElementById('hint').innerText = isOn ? "SENTER MATI" : "SENTER NYALA";
        playClickSound();
    }

    function playClickSound() {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.frequency.value = 150; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + 0.05);
    }

    function onMouseMove(e) {
        if (document.pointerLockElement === document.body && !isDead) {
            yaw.rotation.y -= e.movementX * 0.002;
            pitch.rotation.x -= e.movementY * 0.002;
            pitch.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch.rotation.x));
        }
    }

    // --- MAP GEN ---
    function generateMap() {
        const floorGeo = new THREE.PlaneGeometry(MAP_SIZE, MAP_SIZE);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 1 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        const wallGeo = new THREE.BoxGeometry(1, 4, 6);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

        for(let i=0; i<WALL_COUNT; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set(
                Math.floor(Math.random() * 50 - 25),
                2,
                Math.floor(Math.random() * 50 - 25)
            );
            if(Math.random() > 0.5) wall.rotation.y = Math.PI/2;
            scene.add(wall);
            walls.push(wall);
        }
    }

    function spawnItems() {
        const itemGeo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
        const itemMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 2 });
        for(let i=0; i<DATA_COUNT; i++) {
            const item = new THREE.Mesh(itemGeo, itemMat);
            item.position.set(Math.random()*40-20, 1.2, Math.random()*40-20);
            scene.add(item);
            items.push(item);
        }
    }

    function spawnEnemy() {
        const stalkerGeo = new THREE.CylinderGeometry(0.5, 0.5, 3.5, 6);
        const stalkerMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        enemy = new THREE.Mesh(stalkerGeo, stalkerMat);
        enemy.position.set(-20, 1.75, -20);
        scene.add(enemy);
        setTimeout(() => enemyActive = true, 8000);
    }

    // --- LOGIC LOOP ---
    function update() {
        if(isDead) return;
        const delta = clock.getDelta();

        // MOVEMENT
        const isSprinting = keys['ShiftLeft'] && stamina > 0 && keys['KeyW'];
        const speed = isSprinting ? sprintSpeed : moveSpeed;
        
        const dir = new THREE.Vector3();
        if(keys['KeyW']) dir.z -= 1;
        if(keys['KeyS']) dir.z += 1;
        if(keys['KeyA']) dir.x -= 1;
        if(keys['KeyD']) dir.x += 1;
        
        dir.normalize().applyQuaternion(yaw.quaternion).multiplyScalar(speed);
        player.position.add(dir);

        // STAMINA
        if(isSprinting) {
            stamina -= 30 * delta;
            document.getElementById('p-status').innerText = "RUNNING";
        } else {
            stamina = Math.min(100, stamina + 15 * delta);
            document.getElementById('p-status').innerText = "NORMAL";
        }
        document.getElementById('stam-fill').style.width = stamina + "%";

        // BATTERY
        if(flashLight.intensity > 0) {
            battery -= 1.5 * delta;
            if(battery <= 0) flashLight.intensity = 0;
            // Glitch effect
            if(Math.random() > 0.98) flashLight.intensity = 0;
            else if(battery > 0) flashLight.intensity = 15;
        }
        document.getElementById('bat-fill').style.width = Math.max(0, battery) + "%";

        // ITEM PICKUP
        items.forEach((item, idx) => {
            item.rotation.y += 0.02;
            if(player.position.distanceTo(item.position) < 1.5) {
                scene.remove(item);
                items.splice(idx, 1);
                dataFound++;
                document.getElementById('dc').innerText = dataFound;
                if(dataFound === 5) { alert("DATA EXTRACTED! GET OUT!"); location.reload(); }
            }
        });

        // ENEMY AI
        if(enemyActive) {
            const dist = player.position.distanceTo(enemy.position);
            const eDir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
            
            // Speed scaling
            let eSpeed = 0.04 + (dataFound * 0.015);
            enemy.position.add(eDir.multiplyScalar(eSpeed));
            
            document.getElementById('bpm').innerText = Math.floor(70 + (15/dist)*25);

            if(dist < 1.4) triggerDeath();
        }
    }

    function triggerDeath() {
        isDead = true;
        document.getElementById('jumpscare').style.display = 'flex';
        // Screamer audio
        const o = audioCtx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = 60;
        o.connect(audioCtx.destination); o.start();
        setTimeout(() => location.reload(), 3000);
    }

    function animate() {
        if(!isDead) requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    };
</script>
</body>
</html>
