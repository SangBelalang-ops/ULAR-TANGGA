<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HERO 3D - MSI EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 20; }
        #setup { position: absolute; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        
        .btn { padding: 15px 45px; font-size: 24px; cursor: pointer; background: #fff; color: #000; border: 4px solid #f1c40f; border-radius: 50px; font-weight: 900; transition: 0.1s; }
        .btn:hover { background: #f1c40f; color: #fff; transform: scale(1.1); }

        #score-display { position: absolute; top: 20px; left: 20px; font-size: 40px; color: #fbbf24; text-shadow: 2px 2px #000; }
        #combo-display { position: absolute; top: 70px; left: 20px; font-size: 30px; color: #00d4ff; }
        #leaderboard { position: absolute; top: 20px; right: 20px; width: 220px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; font-size: 14px; border-right: 5px solid #00d4ff; }
        #hits { position: absolute; bottom: 100px; width: 100%; text-align: center; font-size: 50px; font-weight: bold; opacity: 0; transition: 0.2s; -webkit-text-stroke: 1px black;}

        input { padding: 15px; width: 250px; margin-bottom: 20px; border-radius: 10px; border: none; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #f1c40f; font-size: 60px; margin: 0;">SQUAD HERO</h1>
    <p style="color: #888; letter-spacing: 2px; margin-bottom: 30px;">PRESS A S K L TO SHRED</p>
    <input type="text" id="playerName" placeholder="Input Nama SQUAD...">
    <button class="btn" onclick="startGuitar()">MAIN SEKARAANG!</button>
</div>

<div id="ui">
    <div id="score-display">POIN: 0</div>
    <div id="combo-display">COMBO: 0x</div>
    <div id="hits">PERFECT!</div>
    <div id="leaderboard"><b>LIVE SCOREBOARD:</b><br><span id="msg">Loading...</span></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update } from 'firebase/database';

    // === CONFIG FIREBASE ALVIN (JANGAN DIHAPUS VIN!) ===
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    // Path Multiplayer Baru: 'guitar_hero_v1/score'
    const scoreRef = ref(db, 'guitar_hero_v1/scores');

    let scene, camera, renderer, myName = "", score = 0, combo = 0;
    let track, frets = [], notes = [];
    let startTime;
    let synth = new AudioContext(); // Synth Internal

    // BEAT TRACK LAGU (TIMING DALAM DETIK, TOMBOL 0-3)
    // Gue bikin track synth metal dasar (4 tombol)
    const SONGLIST = [
        {time: 1.0, key: 0}, {time: 1.5, key: 1}, {time: 2.0, key: 2}, {time: 2.5, key: 3}, // Intro
        {time: 3.5, key: 0}, {time: 3.6, key: 1}, {time: 3.7, key: 0}, {time: 3.8, key: 2}, // Fast Riff
        {time: 4.5, key: 3}, {time: 5.0, key: 0}, {time: 5.5, key: 2}, // Chorus
        {time: 6.0, key: 1}, {time: 6.1, key: 1}, {time: 6.2, key: 2}, {time: 6.3, key: 3},
        {time: 7.0, key: 0}, {time: 8.0, key: 0}, {time: 9.0, key: 1}, // Solo
        {time: 10.0, key: 0}, {time: 10.5, key: 1}, {time: 11.0, key: 2}, {time: 11.5, key: 3} // End
    ];

    const COLORS = [0x00ff00, 0xff0000, 0xffff00, 0x00aaff]; // Hijau, Merah, Kuning, Biru
    const KEY_MAP = { "KeyA": 0, "KeyS": 1, "KeyK": 2, "KeyL": 3 };
    const HIT_LINE_Y = -4; // Garis Putih di bawah layar

    window.startGuitar = () => {
        myName = document.getElementById('playerName').value.trim();
        if(!myName) return alert("Woi Alvin! Nama dulu bre!");
        document.getElementById('setup').style.display = 'none';
        init3D();
        connectMultiplayer();
    };

    function init3D() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 10, 40);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 3, 15); camera.lookAt(0, -3, 0); // FPS View nanjak

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        createTrack();
        animate();
        loadSong();
    }

    function createTrack() {
        // Papan Jalan (Frets)
        const geo = new THREE.PlaneGeometry(6, 40);
        const mat = new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide });
        track = new THREE.Mesh(geo, mat);
        track.rotation.x = -Math.PI/2.5; // Nanjak ke atas
        scene.add(track);

        // Garis Jalur (4 Lane)
        for(let i=0; i<5; i++) {
            const lMat = new THREE.MeshBasicMaterial({color: 0x333333});
            const lLine = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 40), lMat);
            lLine.rotation.x = -Math.PI/2.5;
            lLine.position.set(i*1.5 - 3, 0.01, 0);
            scene.add(lLine);
        }

        // Garis Putih (HIT ZONE)
        const hitGeo = new THREE.PlaneGeometry(6, 0.15);
        const hitMat = new THREE.MeshBasicMaterial({color: 0xffffff, transparent: true, opacity: 0.8});
        const hitZone = new THREE.Mesh(hitGeo, hitMat);
        hitZone.rotation.x = -Math.PI/2.5;
        hitZone.position.set(0, HIT_LINE_Y, 7); // Taruh di depan camera
        scene.add(hitZone);
    }

    function loadSong() {
        startTime = Date.now();
        SONGLIST.forEach(beat => {
            const geo = new THREE.CircleGeometry(0.5, 32);
            const mat = new THREE.MeshStandardMaterial({color: COLORS[beat.key], emissive: COLORS[beat.key], emissiveIntensity: 2});
            const note = new THREE.Mesh(geo, mat);
            
            note.rotation.x = -Math.PI/2.5;
            note.position.set(beat.key*1.5 - 2.25, 0.1, beat.time * -15); // Jalur waktu nanjak
            scene.add(note);
            notes.push({obj: note, time: beat.time, key: beat.key, hit: false});
        });
    }

    // === LOGIKA SHRED (KEYBOARD) ===
    window.addEventListener('keydown', (e) => {
        const keyId = KEY_MAP[e.code];
        if(keyId === undefined || isMoving) return;

        playSound(keyId); // Mainin nada

        // CEK APAKAH PAS NADA?
        let hitTime = (Date.now() - startTime) / 1000;
        let foundHit = false;

        for(let i=0; i<notes.length; i++) {
            let n = notes[i];
            // Toleransi Perfect: +- 0.15 detik
            if(!n.hit && n.key === keyId && Math.abs(n.time - hitTime) < 0.15) {
                foundHit = true; n.hit = true;
                handleHit(true);
                n.obj.material.color.set(0xffffff); // Jadi putih
                n.obj.scale.set(1.5, 1.5, 1); // Meledak
                setTimeout(() => scene.remove(n.obj), 100);
                break;
            }
        }
        if(!foundHit) handleHit(false);
    });

    function playSound(keyId) {
        // Synth Metal Dasar Alvin Edition
        const osc = synth.createOscillator();
        const gain = synth.createGain();
        const freqs = [110, 146, 196, 246]; // A, D, G, B
        osc.frequency.value = freqs[keyId];
        osc.type = 'sawtooth';
        gain.gain.value = 0.3;
        gain.gain.exponentialRampToValueAtTime(0.001, synth.currentTime + 0.5);
        osc.connect(gain); gain.connect(synth.destination);
        osc.start(); osc.stop(synth.currentTime + 0.5);
    }

    function handleHit(isHit) {
        const hitUI = document.getElementById('hits');
        hitUI.style.opacity = 1;

        if(isHit) {
            score += 100 + (combo * 10);
            combo++;
            hitUI.innerText = "SHRED! 🔥";
            hitUI.style.color = "#00ff00";
        } else {
            combo = 0;
            hitUI.innerText = "MISS! ❌";
            hitUI.style.color = "#ff0000";
        }
        document.getElementById('score-display').innerText = `POIN: ${score}`;
        document.getElementById('combo-display').innerText = `COMBO: ${combo}x`;
        setTimeout(() => hitUI.style.opacity = 0, 300);
    }

    // === MULTIPLAYER & LEADERBOARD (FIREBASE) ===
    function connectMultiplayer() {
        onValue(scoreRef, (snap) => {
            const data = snap.val() || {};
            
            // Push skor lo sendiri secara periodik
            setInterval(() => {
                const myScoreRef = ref(db, `guitar_hero_v1/scores/${myName}`);
                set(myScoreRef, {name: myName, score: score, color: '#00d4ff'});
            }, 5000);

            // Tampilkan Leaderboard
            const players = Object.values(data);
            players.sort((a,b) => b.score - a.score); // Ranking
            
            let leaderboard = players.slice(0, 5).map(p => 
                `<span style="color:${p.color}">[${p.name[0].toUpperCase()}] ${p.name}: ${p.score}</span>`
            ).join('<br>');
            document.getElementById('msg').innerHTML = leaderboard;
        });
    }

    function animate() {
        requestAnimationFrame(animate);
        let currentTime = (Date.now() - startTime) / 1000;

        // Gerakkan Nada ke Bawah (Menuju Camera)
        notes.forEach(n => {
            if(!n.hit) {
                // Kecepatan nanjak: 15 unit/detik
                n.obj.position.z = (n.time - currentTime) * 15;
                
                // Cek Miss (Kalau nadanya ngelewatin Hit Zone)
                if(n.obj.position.z > 7.5 && !n.hit) {
                    n.hit = true; n.obj.material.color.set(0x444444);
                    combo = 0; // Combo reset
                    addLog(`Missed key ${n.key}`);
                }
            }
        });
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
