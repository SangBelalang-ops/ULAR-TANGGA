<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER - REAL ENGINE</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { border: 5px solid #444; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #ui-layer { position: absolute; inset: 0; pointer-events: none; }
        .panel { position: absolute; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; pointer-events: auto; border: 1px solid #555; }
        #setup { inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: #111; }
        #controls { bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        #log-box { top: 20px; left: 20px; width: 220px; height: 120px; overflow-y: auto; font-size: 13px; }
        #status-box { top: 20px; right: 20px; font-size: 20px; font-weight: bold; color: #ffcc00; }
        .btn { padding: 12px 30px; font-size: 18px; cursor: pointer; background: #fff; color: #000; border: none; border-radius: 5px; font-weight: bold; }
        .btn:disabled { background: #444; color: #888; }
        #dice-view { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; background: white; color: black; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; border-radius: 10px; border: 4px solid #ccc; opacity: 0; transition: 0.3s; }
        input { padding: 12px; margin: 10px; border-radius: 5px; border: none; font-size: 16px; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #ff4444;">SQUAD LADDER FIX</h1>
    <input type="text" id="pName" placeholder="Nama (Alvin/Tegar/Meggy/Bernad)">
    <button class="btn" onclick="initGame()">MASUK GAME</button>
</div>

<div id="game-container">
    <canvas id="boardCanvas"></canvas>
    <div id="ui-layer">
        <div id="log-box" class="panel"><b>LOG:</b><br><span id="msg">...</span></div>
        <div id="status-box" class="panel">MENUNGGU...</div>
        <div id="dice-view">?</div>
        <div id="controls">
            <button id="rollBtn" class="btn" onclick="rollDice()" disabled>KOCOK DADU 🎲</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'final_fix_v11/state');

    const canvas = document.getElementById('boardCanvas');
    const ctx = canvas.getContext('2d');
    let myName = "", myId = null, players = [];
    const size = 600, tileSize = size / 10;
    
    // POSISI TANGGA & ULAR (Index 0-99)
    const LADDERS = { 2: 21, 7: 30, 27: 83, 50: 66, 70: 90 };
    const SNAKES = { 16: 6, 46: 25, 61: 18, 94: 74, 97: 77 };

    window.initGame = () => {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("Nama wajib diisi!");
        document.getElementById('setup').style.display = 'none';
        canvas.width = size; canvas.height = size;
        startSync();
    };

    function drawBoard() {
        ctx.clearRect(0, 0, size, size);
        for (let i = 0; i < 100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));
            const x = col * tileSize;
            const y = size - (row + 1) * tileSize;

            ctx.fillStyle = (row + col) % 2 === 0 ? "#3d2b1f" : "#5d4037";
            ctx.fillRect(x, y, tileSize, tileSize);
            ctx.strokeStyle = "#777"; ctx.strokeRect(x, y, tileSize, tileSize);
            
            ctx.fillStyle = "#fff"; ctx.font = "14px Arial";
            ctx.fillText(i + 1, x + 5, y + 18);
        }

        // DRAW TANGGA (HIJAU)
        ctx.lineWidth = 8; ctx.strokeStyle = "rgba(0, 255, 0, 0.5)";
        Object.entries(LADDERS).forEach(([s, e]) => drawLine(s, e));
        
        // DRAW ULAR (MERAH)
        ctx.strokeStyle = "rgba(255, 0, 0, 0.6)";
        Object.entries(SNAKES).forEach(([s, e]) => drawLine(s, e));
    }

    function getCoords(index) {
        const row = Math.floor(index / 10);
        const col = (row % 2 === 0) ? (index % 10) : (9 - (index % 10));
        return { x: col * tileSize + tileSize/2, y: size - (row * tileSize + tileSize/2) };
    }

    function drawLine(s, e) {
        const start = getCoords(parseInt(s)); const end = getCoords(parseInt(e));
        ctx.beginPath(); ctx.moveTo(start.x, start.y); ctx.lineTo(end.x, end.y); ctx.stroke();
    }

    function startSync() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, won: false, color: '#ff4444'}] });

            players = data.players || [];
            let found = false;
            players.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
            });

            if(!found) {
                players.push({name: myName, pos: 0, won: false, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players });
            }

            drawBoard();
            players.forEach(p => {
                const c = getCoords(p.pos);
                ctx.fillStyle = p.color; ctx.beginPath();
                ctx.arc(c.x, c.y, 15, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign="center";
                ctx.fillText(p.name[0], c.x, c.y + 5);
            });

            const activeP = players[data.turn];
            document.getElementById('status-box').innerText = `GILIRAN: ${activeP.name.toUpperCase()}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || activeP.won);
            if(players[myId].won) document.getElementById('status-box').innerText = "ANDA FINISH! 🎉";
        });
    }

    window.rollDice = async () => {
        const roll = Math.floor(Math.random() * 6) + 1;
        const dv = document.getElementById('dice-view');
        dv.innerText = roll; dv.style.opacity = 1;
        setTimeout(() => dv.style.opacity = 0, 1000);

        const snap = await get(gameRef);
        const data = snap.val();
        let p = data.players[myId];
        let nPos = p.pos + roll;

        if(nPos >= 99) { nPos = 99; p.won = true; }
        if(LADDERS[nPos]) nPos = LADDERS[nPos];
        if(SNAKES[nPos]) nPos = SNAKES[nPos];

        const updated = data.players;
        updated[myId].pos = nPos; updated[myId].won = p.won;
        update(gameRef, { turn: (data.turn + 1) % updated.length, players: updated });
    };

    function addLog(m) { document.getElementById('msg').innerHTML = `> ${m}<br>` + document.getElementById('msg').innerHTML; }
</script>
</body>
</html>
