<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD SHOWDOWN V15 - FULL ANIMATION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; }
        #game-area { width: 100vw; height: 100vh; background: #111; display: none; overflow: hidden; position: relative; }
        #floor { position: absolute; bottom: 0; width: 100%; height: 60px; background: #222; border-top: 4px solid #0f0; }

        /* HUD */
        #hud { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .hp-bar { width: 300px; height: 20px; background: #444; border: 2px solid #fff; }
        .hp-fill { height: 100%; width: 100%; transition: 0.2s; }

        /* SELECTION */
        #selector { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 15px 30px; border: 2px solid #00d4ff; background: none; color: #00d4ff; cursor: pointer; margin: 10px; font-family: inherit; }
        .btn:hover { background: #00d4ff; color: #000; }

        /* STICKMAN ANATOMY */
        .stickman { position: absolute; bottom: 60px; width: 60px; height: 120px; transition: left 0.05s linear; }
        .part { position: absolute; background: currentColor; border-radius: 10px; transform-origin: top center; }
        
        .s-head { width: 25px; height: 25px; border: 3px solid; border-radius: 50%; top: 0; left: 17.5px; background: none !important; }
        .s-body { width: 4px; height: 45px; top: 28px; left: 28px; }
        .s-arm { width: 3px; height: 35px; top: 30px; }
        .s-leg { width: 4px; height: 40px; top: 70px; }
        
        .arm-l { left: 28px; transform: rotate(20deg); }
        .arm-r { left: 28px; transform: rotate(-20deg); }
        .leg-l { left: 28px; transform: rotate(15deg); }
        .leg-r { left: 28px; transform: rotate(-15deg); }

        /* ANIMATIONS */
        .punching .arm-r { animation: punchAnim 0.2s; }
        .kicking .leg-r { animation: kickAnim 0.3s; }
        
        @keyframes punchAnim { 0% { transform: rotate(-20deg); } 50% { transform: rotate(-90deg) scaleY(1.5); } 100% { transform: rotate(-20deg); } }
        @keyframes kickAnim { 0% { transform: rotate(-15deg); } 50% { transform: rotate(-80deg) scaleY(1.4); } 100% { transform: rotate(-15deg); } }
        
        .hit-effect { position: absolute; color: yellow; font-weight: bold; font-size: 20px; animation: hitFade 0.4s forwards; }
        @keyframes hitFade { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }
    </style>
</head>
<body>

<div id="selector">
    <h1 style="color: #00d4ff;">CHOOSE YOUR FIGHTER</h1>
    <button class="btn" onclick="start('FLAUST', '#00d4ff')">FLAUST (Speed)</button>
    <button class="btn" onclick="start('IRON_ADM', '#ffaa00')">IRON ADM (Power)</button>
    <button class="btn" onclick="start('VINLESS', '#9b59b6')">VINLESS (Ninja)</button>
</div>

<div id="game-area">
    <div id="hud">
        <div><span id="p-label">PLAYER</span><div class="hp-bar"><div id="p-hp" class="hp-fill" style="background: #00d4ff;"></div></div></div>
        <div><span>TEAM MERAH</span><div class="hp-bar"><div id="e-hp" class="hp-fill" style="background: #ff0000;"></div></div></div>
    </div>
    <div id="floor"></div>

    <div id="player" class="stickman">
        <div class="part s-head"></div>
        <div class="part s-body"></div>
        <div class="part s-arm arm-l"></div>
        <div class="part s-arm arm-r"></div>
        <div class="part s-leg leg-l"></div>
        <div class="part s-leg leg-r"></div>
    </div>

    <div id="enemy" class="stickman" style="color: red;">
        <div class="part s-head"></div>
        <div class="part s-body"></div>
        <div class="part s-arm arm-l"></div>
        <div class="part s-arm arm-r"></div>
        <div class="part s-leg leg-l"></div>
        <div class="part s-leg leg-r"></div>
    </div>
</div>

<script>
    let playerPos = 100, enemyPos = 600;
    let pHp = 100, eHp = 100;
    let keys = {}, isAction = false, stats = { speed: 7, power: 10 };

    window.start = (name, col) => {
        document.getElementById('p-label').innerText = name;
        document.getElementById('player').style.color = col;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        if(name === 'VINLESS') stats = { speed: 11, power: 7 };
        if(name === 'IRON_ADM') stats = { speed: 5, power: 15 };
        update();
    };

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function update() {
        if(pHp <= 0 || eHp <= 0) return alert(pHp > 0 ? "SQUAD WIN!" : "GAME OVER");

        // Movement
        if(keys['ArrowLeft']) playerPos -= stats.speed;
        if(keys['ArrowRight']) playerPos += stats.speed;
        
        // Attack Logic
        if(keys['KeyZ'] && !isAction) perform('punching', 10);
        if(keys['KeyX'] && !isAction) perform('kicking', 15);

        // AI Simple
        if(enemyPos > playerPos + 70) enemyPos -= 3;
        else if(enemyPos < playerPos - 70) enemyPos += 3;
        else if(Math.random() > 0.98) enemyAttack();

        document.getElementById('player').style.left = playerPos + 'px';
        document.getElementById('enemy').style.left = enemyPos + 'px';
        document.getElementById('enemy').style.transform = playerPos > enemyPos ? 'scaleX(-1)' : 'scaleX(1)';

        requestAnimationFrame(update);
    }

    function perform(type, dmg) {
        isAction = true;
        const p = document.getElementById('player');
        p.classList.add(type);
        
        // Hit detection
        if(Math.abs(playerPos - enemyPos) < 90) {
            eHp -= dmg;
            document.getElementById('e-hp').style.width = eHp + "%";
            spawnHit(enemyPos);
            shake();
        }

        setTimeout(() => {
            p.classList.remove(type);
            isAction = false;
        }, 250);
    }

    function enemyAttack() {
        const e = document.getElementById('enemy');
        e.classList.add('punching');
        if(Math.abs(playerPos - enemyPos) < 90) {
            pHp -= 8;
            document.getElementById('p-hp').style.width = pHp + "%";
            spawnHit(playerPos);
        }
        setTimeout(() => e.classList.remove('punching'), 200);
    }

    function spawnHit(x) {
        const hit = document.createElement('div');
        hit.className = 'hit-effect';
        hit.innerText = 'POW!';
        hit.style.left = x + 'px';
        hit.style.bottom = '150px';
        document.getElementById('game-area').appendChild(hit);
        setTimeout(() => hit.remove(), 400);
    }

    function shake() {
        const area = document.getElementById('game-area');
        area.style.transform = `translate(${Math.random()*10}px, ${Math.random()*10}px)`;
        setTimeout(() => area.style.transform = '', 50);
    }
</script>
</body>
</html>
