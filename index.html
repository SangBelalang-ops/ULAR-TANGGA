<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HORROR V13 - STEALTH</title>
    <style>
        :root { --blood: #800; --neon: #00d4ff; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: white; user-select: none; }
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, black 150%); pointer-events: none; z-index: 10; }
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 20; padding: 20px; }
        .stat { background: rgba(0,0,0,0.8); padding: 5px 10px; border-left: 3px solid var(--blood); margin-bottom: 5px; display: inline-block;}
        #map-container { position: absolute; top: 20px; right: 20px; width: 160px; height: 160px; background: rgba(0,10,0,0.7); border: 2px solid #060; z-index: 30; overflow: hidden; }
        #map-player { position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%; transform: translate(-50%, -50%); z-index: 50; }
        #stamina-box { width: 150px; height: 8px; background: #222; border: 1px solid #444; margin-top: 5px; }
        #stam-fill { width: 100%; height: 100%; background: #2ecc71; transition: 0.1s; }
        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; align-items: center; justify-content: center; color: red; font-size: 50px; font-weight: 900; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } }
    </style>
</head>
<body>

<div id="vignette"></div>
<div id="map-container"><div id="map-player"></div></div>

<div id="hud">
    <div class="stat">DATA: <span id="dc">0</span>/5</div><br>
    <div class="stat">BATTERY: <span id="bat">100</span>% (E)</div><br>
    <div class="stat">STAMINA (SHIFT):<div id="stamina-box"><div id="stam-fill"></div></div></div><br>
    <div class="stat">BPM: <span id="bpm">72</span></div>
</div>

<div id="jumpscare">DEAD END</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock, player, flashLight, audioCtx;
    let yaw = new THREE.Object3D(), pitch = new THREE.Object3D();
    let keys = {}, items = [], wallBoxes = [], mapDataDots = [];
    let battery = 100, stamina = 100, dataFound = 0, isDead = false;
    let enemy, enemyActive = false, canToggle = true;

    const WORLD_SIZE = 40; 
    const MAP_SCALE = 160 / (WORLD_SIZE * 2);

    window.onclick = () => {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            init();
        }
        document.body.requestPointerLock();
    };

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        player = new THREE.Group();
        player.position.set(0, 1.6, 15);
        scene.add(player);
        player.add(yaw); yaw.add(pitch); pitch.add(camera);

        // FIX SENTER: Arahnya ngikut kamera 100%
        flashLight = new THREE.SpotLight(0xffffff, 0, 25, Math.PI/6, 0.4, 1);
        pitch.add(flashLight);
        flashLight.target.position.set(0, 0, -1);
        pitch.add(flashLight.target);

        scene.add(new THREE.AmbientLight(0xffffff, 0.04));

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        buildMaze();
        spawnItems();
        spawnStalker();

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && !isDead) {
                yaw.rotation.y -= e.movementX * 0.002;
                pitch.rotation.x -= e.movementY * 0.002;
                pitch.rotation.x = Math.max(-1.4, Math.min(1.4, pitch.rotation.x));
            }
        });

        animate();
    }

    function buildMaze() {
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
        const wallGeo = new THREE.BoxGeometry(4, 5, 4);
        const mapCont = document.getElementById('map-container');

        for(let i=0; i<45; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            const rx = Math.floor(Math.random()*(WORLD_SIZE*2) - WORLD_SIZE);
            const rz = Math.floor(Math.random()*(WORLD_SIZE*2) - WORLD_SIZE);
            if(Math.abs(rx) < 5 && Math.abs(rz - 15) < 5) continue;

            wall.position.set(rx, 2.5, rz);
            scene.add(wall);
            wallBoxes.push(new THREE.Box3().setFromObject(wall));
            
            // Peta Dinding
            const wd = document.createElement('div');
            wd.style.cssText = `position:absolute; width:8px; height:8px; background:#222; left:${(rx+WORLD_SIZE)*MAP_SCALE}px; top:${(rz+WORLD_SIZE)*MAP_SCALE}px;`;
            mapCont.appendChild(wd);

            // OBOR (Remang-remang)
            if(Math.random() > 0.7) {
                const torch = new THREE.PointLight(0xff6600, 1.5, 7);
                torch.position.set(rx, 3, rz + 2.1);
                scene.add(torch);
            }
        }
    }

    function spawnItems() {
        const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 2 });
        const mapCont = document.getElementById('map-container');
        for(let i=0; i<5; i++) {
            const p = new THREE.Mesh(geo, mat);
            const rx = Math.random()*70-35, rz = Math.random()*70-35;
            p.position.set(rx, 1.2, rz);
            scene.add(p); items.push(p);

            const dot = document.createElement('div');
            dot.style.cssText = `position:absolute; width:4px; height:4px; background:#00d4ff; border-radius:50%; left:${(rx+WORLD_SIZE)*MAP_SCALE}px; top:${(rz+WORLD_SIZE)*MAP_SCALE}px;`;
            mapCont.appendChild(dot);
            mapDataDots.push({mesh: p, dotEl: dot});
        }
    }

    function spawnStalker() {
        enemy = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), new THREE.MeshBasicMaterial({color: 0x000000}));
        enemy.add(body);
        // MATA MERAH
        const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const e1 = new THREE.Mesh(new THREE.SphereGeometry(0.1), eyeMat); e1.position.set(-0.2, 1.2, -0.45);
        const e2 = new THREE.Mesh(new THREE.SphereGeometry(0.1), eyeMat); e2.position.set(0.2, 1.2, -0.45);
        enemy.add(e1); enemy.add(e2);
        enemy.position.set(-20, 1.5, -20);
        scene.add(enemy);
        setTimeout(() => enemyActive = true, 5000);
    }

    function update() {
        if(isDead) return;
        const delta = clock.getDelta();

        // SPRINT LOGIC
        const isSprint = keys['ShiftLeft'] && stamina > 0 && (keys['KeyW']||keys['KeyS']);
        const speed = isSprint ? 0.18 : 0.08;
        if(isSprint) stamina -= 0.5; else stamina = Math.min(100, stamina + 0.2);
        document.getElementById('stam-fill').style.width = stamina + "%";

        const dir = new THREE.Vector3();
        if(keys['KeyW']) dir.z -= 1; if(keys['KeyS']) dir.z += 1;
        if(keys['KeyA']) dir.x -= 1; if(keys['KeyD']) dir.x += 1;

        if(dir.length() > 0) {
            dir.normalize().applyQuaternion(yaw.quaternion).multiplyScalar(speed);
            const next = player.position.clone().add(dir);
            const pBox = new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.7, 1.8, 0.7));
            let hit = false;
            for(let b of wallBoxes) { if(pBox.intersectsBox(b)) { hit = true; break; } }
            if(!hit) player.position.copy(next);
        }

        // UPDATE MAP
        document.getElementById('map-player').style.left = (player.position.x + WORLD_SIZE) * MAP_SCALE + 'px';
        document.getElementById('map-player').style.top = (player.position.z + WORLD_SIZE) * MAP_SCALE + 'px';

        // FLASHLIGHT 'E'
        if(keys['KeyE'] && canToggle) {
            flashLight.intensity = (flashLight.intensity > 0) ? 0 : 20;
            canToggle = false; setTimeout(()=>canToggle=true, 300);
        }
        if(flashLight.intensity > 0) {
            battery -= 0.02; document.getElementById('bat').innerText = Math.floor(battery);
            if(battery <= 0) flashLight.intensity = 0;
        }

        // PICKUP
        items.forEach((it, i) => {
            if(player.position.distanceTo(it.position) < 1.5) {
                scene.remove(it); items.splice(i, 1);
                dataFound++; document.getElementById('dc').innerText = dataFound;
                mapDataDots[i].dotEl.remove(); mapDataDots.splice(i, 1);
            }
        });

        // ENEMY
        if(enemyActive) {
            enemy.lookAt(player.position);
            const dist = player.position.distanceTo(enemy.position);
            enemy.position.add(new THREE.Vector3().subVectors(player.position, enemy.position).normalize().multiplyScalar(0.04));
            document.getElementById('bpm').innerText = Math.floor(70 + (10/dist)*40);
            if(dist < 1.4) {
                isDead = true; document.getElementById('jumpscare').style.display = 'flex';
                setTimeout(() => location.reload(), 3000);
            }
        }
    }

    function animate() {
        if(!isDead) requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
</script>
</body>
</html>
