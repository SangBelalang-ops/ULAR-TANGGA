<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD STICKMAN: HAPPY WORLD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Fredoka One', cursive; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #fdf6e3; border: 8px solid #fff; border-radius: 30px; box-shadow: 0 10px 0 #ddd; }
        .ui { position: absolute; top: 20px; width: 750px; display: flex; justify-content: space-between; pointer-events: none; }
        .heart { font-size: 30px; filter: drop-shadow(0 2px 0 #000); }
    </style>
</head>
<body>

    <div class="ui">
        <div class="bg-white/80 p-4 rounded-2xl border-4 border-yellow-400">
            <p id="char-tag" class="text-orange-500 text-xs">Pahlawan: LILAS</p>
            <div id="hearts-container" class="flex gap-1">❤️❤️❤️❤️❤️</div>
        </div>
        <div class="text-center">
            <h1 class="text-4xl text-white drop-shadow-md">STAGE <span id="wave-num">1</span></h1>
            <p class="text-blue-600 bg-white rounded-full px-4 py-1 text-sm shadow-sm">SKOR: <span id="score">0</span></p>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // CONFIG GAMPANG BANGET
    let score = 0, wave = 1, hp = 5, gameActive = true, time = 0;
    const squad = ["LILAS", "MEGGY", "ALBERT", "ANJAS", "TEGAR", "PITER"];
    const colors = ["#FF5733", "#C70039", "#900C3F", "#581845", "#1ABC9C", "#3498DB"];
    let currentChar = 0;

    const player = { x: 100, y: 250, w: 40, h: 70, dy: 0, grounded: true };
    let bullets = [], enemies = [], items = [], fx = [];

    // FOTO KEPALA (Cek Folder!)
    const headImgs = squad.map(name => {
        const img = new Image();
        img.src = name.toLowerCase() + ".png";
        return img;
    });

    window.onkeydown = (e) => {
        if(e.key >= 1 && e.key <= 6) { 
            currentChar = e.key - 1; 
            document.getElementById('char-tag').innerText = "Pahlawan: " + squad[currentChar];
        }
        if(e.code === 'Space' || e.code === 'KeyF') shoot();
        if(e.code === 'KeyW' && player.grounded) { player.dy = -15; player.grounded = false; }
    };

    function shoot() {
        // Peluru Gede Biar Gampang Kena
        bullets.push({ x: player.x + 40, y: player.y + 30, vx: 10, r: 12 });
    }

    function createExplosion(x, y) {
        for(let i=0; i<10; i++) {
            fx.push({ x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10, life: 1, c: colors[Math.floor(Math.random()*6)] });
        }
    }

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, 800, 400);

        // Langit & Rumput
        ctx.fillStyle = "#7cfc00"; ctx.fillRect(0, 320, 800, 80);

        // Player Stickman Lucu
        ctx.strokeStyle = "#333"; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(player.x+20, player.y+30); ctx.lineTo(player.x+20, player.y+60); // Badan
        ctx.moveTo(player.x+20, player.y+60); ctx.lineTo(player.x+10, player.y+80); // Kaki
        ctx.moveTo(player.x+20, player.y+60); ctx.lineTo(player.x+30, player.y+80);
        ctx.stroke();

        try {
            ctx.drawImage(headImgs[currentChar], player.x, player.y, 40, 40);
        } catch(e) {
            ctx.fillStyle = colors[currentChar]; ctx.beginPath(); ctx.arc(player.x+20, player.y+20, 20, 0, Math.PI*2); ctx.fill();
        }

        // Loncat
        player.y += player.dy; player.dy += 0.8;
        if(player.y > 240) { player.y = 240; player.dy = 0; player.grounded = true; }

        // Musuh (Monster Lucu)
        if(time % 100 === 0) {
            enemies.push({ x: 850, y: 260, w: 50, h: 50, c: colors[Math.floor(Math.random()*6)] });
        }

        enemies.forEach((e, i) => {
            e.x -= (2 + wave*0.2); // Pelan-pelan jalannya
            ctx.fillStyle = e.c;
            ctx.beginPath(); ctx.roundRect(e.x, e.y, e.w, e.h, 15); ctx.fill();
            // Mata monster
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(e.x+15, e.y+15, 8, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(e.x+15, e.y+15, 3, 0, Math.PI*2); ctx.fill();

            // Tabrakan
            if(Math.hypot(e.x-player.x, e.y-player.y) < 40) {
                enemies.splice(i, 1);
                hp--; updateHearts();
                if(hp <= 0) hp = 5; // Kasih nyawa lagi biar ga tamat-tamat
            }
        });

        // Peluru
        bullets.forEach((b, i) => {
            b.x += b.vx;
            ctx.fillStyle = "#FFD700";
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            
            enemies.forEach((e, ei) => {
                if(b.x > e.x && b.x < e.x+50 && b.y > e.y && b.y < e.y+50) {
                    createExplosion(e.x+25, e.y+25);
                    enemies.splice(ei, 1);
                    bullets.splice(i, 1);
                    score += 10;
                    document.getElementById('score').innerText = score;
                }
            });
        });

        // Efek Ledakan
        fx.forEach((f, i) => {
            f.x += f.vx; f.y += f.vy; f.life -= 0.02;
            ctx.fillStyle = f.c; ctx.globalAlpha = f.life;
            ctx.fillRect(f.x, f.y, 6, 6);
            if(f.life <= 0) fx.splice(i, 1);
        });
        ctx.globalAlpha = 1;

        // Auto Next Stage
        if(score > wave * 100) {
            wave++;
            document.getElementById('wave-num').innerText = wave;
        }

        time++;
        requestAnimationFrame(update);
    }

    function updateHearts() {
        let h = ""; for(let i=0; i<hp; i++) h += "❤️";
        document.getElementById('hearts-container').innerText = h;
    }

    update();
</script>
</body>
</html>
