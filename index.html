<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA SQUAD | FIX TOTAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; height: 100vh; display: flex; overflow: hidden; }
        
        #game-container { display: none; width: 100%; height: 100%; padding: 15px; gap: 15px; }
        #board-area { flex: 1; position: relative; background: #0f172a; border: 4px solid #1e293b; border-radius: 20px; overflow: hidden; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        
        .cell { border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; position: relative; }
        .cell span { font-size: 14px; opacity: 0.15; font-weight: 800; }

        .svg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* VISUAL TANGGA */
        .ladder-rail { stroke: #78350f; stroke-width: 10; fill: none; stroke-linecap: round; }
        .ladder-step { stroke: #d97706; stroke-width: 4; }

        /* VISUAL ULAR MAX LEVEL */
        .snake-body { stroke: #991b1b; stroke-width: 16; fill: none; stroke-linecap: round; }
        .snake-stripes { stroke: #ef4444; stroke-width: 5; fill: none; stroke-linecap: round; stroke-dasharray: 8, 12; }
        .snake-head { fill: #b91c1c; }
        .snake-tongue { stroke: #f472b6; stroke-width: 2; fill: none; }

        /* PION FOTO SQUAD - FIX DISINI */
        .pawn { 
            width: 55px; height: 55px; position: absolute; z-index: 50; 
            transition: all 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); 
            border-radius: 50%; border: 3px solid #fff; 
            background-size: cover; background-position: center; background-repeat: no-repeat;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5); background-color: #1e293b;
        }
        .pawn-name { position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); background: #fbbf24; color: #000; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 900; white-space: nowrap; }

        /* UI SIDEBAR */
        #sidebar { width: 280px; display: flex; flex-direction: column; gap: 10px; }
        .ui-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 15px; padding: 15px; }

        .dice { width: 80px; height: 80px; background: #fff; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto; color: #000; font-size: 35px; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .rolling { animation: spin 0.1s infinite linear; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #chat-list { flex: 1; overflow-y: auto; font-size: 12px; scroll-behavior: smooth; }
    </style>
</head>
<body>

<div id="setup" class="fixed inset-0 bg-slate-950 z-[100] flex flex-col items-center justify-center p-4">
    <h1 class="text-5xl font-black text-yellow-500 mb-8 italic tracking-tighter">SNAKE MAGA</h1>
    <div class="bg-slate-900 p-8 rounded-3xl border border-slate-800 w-full max-w-sm shadow-2xl">
        <input id="room-id" type="text" placeholder="KODE ROOM" class="w-full bg-slate-950 border border-slate-700 p-4 rounded-xl text-center text-xl font-bold mb-4 uppercase text-yellow-500 outline-none">
        <div id="hero-select" class="grid grid-cols-3 gap-2 mb-6"></div>
        <button onclick="joinGame()" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-xl font-black text-white transition-all shadow-lg uppercase">Masuk Arena</button>
    </div>
</div>

<div id="game-container">
    <div id="board-area">
        <svg id="svg-layer" class="svg-layer"></svg>
        <div id="board"></div>
    </div>

    <div id="sidebar">
        <div class="ui-card text-center">
            <p id="turn-info" class="text-yellow-500 font-bold text-xs mb-3 uppercase tracking-widest">CONNECTING...</p>
            <div id="dice-btn" class="dice shadow-xl" onclick="rollDice()">1</div>
            <p class="text-[10px] text-slate-500 mt-2 font-bold uppercase">Klik Dadu</p>
        </div>
        
        <div class="ui-card flex-1 flex flex-col overflow-hidden">
            <div id="chat-list" class="space-y-1 mb-3"></div>
            <input id="chat-in" type="text" placeholder="Bacotan..." class="w-full bg-slate-950 border border-slate-800 p-2 rounded-lg text-xs outline-none" onkeypress="if(event.key==='Enter') sendChat()">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    
    let user = '', room = '', isMoving = false;

    // Build Hero Selector
    const hSelect = document.getElementById('hero-select');
    squad.forEach(s => {
        const btn = document.createElement('button');
        btn.innerText = s;
        btn.className = "bg-slate-800 p-2 rounded-lg border-2 border-transparent text-[10px] font-bold uppercase hover:bg-slate-700 transition-colors";
        btn.onclick = () => {
            document.querySelectorAll('#hero-select button').forEach(b => b.classList.remove('border-yellow-500', 'bg-slate-700'));
            btn.classList.add('border-yellow-500', 'bg-slate-700');
            user = s;
        };
        hSelect.appendChild(btn);
    });

    function joinGame() {
        room = document.getElementById('room-id').value.toUpperCase() || 'SQUAD';
        if(!user) return alert("Pilih Karakter Dulu Bre!");
        
        db.ref('rooms/'+room).once('value', snap => {
            let data = snap.val();
            if(!data) {
                db.ref('rooms/'+room).set({
                    players: [{name:user, pos:1, img: `${user.toLowerCase()}.png`}],
                    turn: 0, last: 1, moving: false
                }).then(startUI);
            } else {
                let pList = data.players || [];
                if(!pList.find(p => p.name === user)) {
                    pList.push({name:user, pos:1, img: `${user.toLowerCase()}.png`});
                    db.ref('rooms/'+room).update({players: pList, moving: false}).then(startUI);
                } else {
                    db.ref('rooms/'+room).update({moving: false}).then(startUI);
                }
            }
        });
    }

    function startUI() {
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        initBoard(); listenGame();
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r=9; r>=0; r--) {
            for (let c=0; c<10; c++) {
                let n = (r%2===0) ? (r*10+c+1) : (r*10+(10-c));
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `cell-${n}`;
                cell.innerHTML = `<span>${n}</span>`;
                b.appendChild(cell);
            }
        }
        setTimeout(drawAssets, 600);
    }

    function drawAssets() {
        const svg = document.getElementById('svg-layer'); svg.innerHTML = '';
        const bRect = document.getElementById('board-area').getBoundingClientRect();

        Object.keys(jumps).forEach(start => {
            const s = parseInt(start); const e = jumps[s];
            const sEl = document.getElementById(`cell-${s}`).getBoundingClientRect();
            const eEl = document.getElementById(`cell-${e}`).getBoundingClientRect();
            const x1 = sEl.left - bRect.left + sEl.width/2;
            const y1 = sEl.top - bRect.top + sEl.height/2;
            const x2 = eEl.left - bRect.left + eEl.width/2;
            const y2 = eEl.top - bRect.top + eEl.height/2;

            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            if (e > s) { // TANGGA KAYU
                const rail = document.createElementNS("http://www.w3.org/2000/svg", "path");
                rail.setAttribute("d", `M${x1-10},${y1} L${x2-10},${y2} M${x1+10},${y1} L${x2+10},${y2}`);
                rail.setAttribute("class", "ladder-rail"); g.appendChild(rail);
                for(let i=1; i<5; i++) {
                    const lx = x1 + (x2-x1)*(i/5); const ly = y1 + (y2-y1)*(i/5);
                    const stp = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    stp.setAttribute("x1", lx-15); stp.setAttribute("y1", ly); stp.setAttribute("x2", lx+15); stp.setAttribute("y2", ly);
                    stp.setAttribute("class", "ladder-step"); g.appendChild(stp);
                }
            } else { // ULAR LEVEL MAX
                const midX = (x1 + x2) / 2 + (x1 > x2 ? 50 : -50);
                const midY = (y1 + y2) / 2;
                const d = `M${x1},${y1} Q${midX},${midY} ${x2},${y2}`;

                const body = document.createElementNS("http://www.w3.org/2000/svg", "path");
                body.setAttribute("d", d); body.setAttribute("class", "snake-body"); g.appendChild(body);
                
                const stripes = document.createElementNS("http://www.w3.org/2000/svg", "path");
                stripes.setAttribute("d", d); stripes.setAttribute("class", "snake-stripes"); g.appendChild(stripes);

                const head = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                head.setAttribute("cx", x1); head.setAttribute("cy", y1); head.setAttribute("rx", 12); head.setAttribute("ry", 15);
                head.setAttribute("class", "snake-head");
                const angle = Math.atan2(y1-y2, x1-x2) * 180 / Math.PI;
                head.setAttribute("transform", `rotate(${angle}, ${x1}, ${y1})`); g.appendChild(head);

                // Mata & Lidah
                const eye = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                eye.setAttribute("cx", x1); eye.setAttribute("cy", y1); eye.setAttribute("r", 2); eye.setAttribute("fill", "yellow"); g.appendChild(eye);

                const tongue = document.createElementNS("http://www.w3.org/2000/svg", "path");
                tongue.setAttribute("d", `M${x1},${y1-15} L${x1},${y1-25} M${x1},${y1-25} L${x1-4},${y1-30} M${x1},${y1-25} L${x1+4},${y1-30}`);
                tongue.setAttribute("class", "snake-tongue"); tongue.setAttribute("transform", `rotate(${angle}, ${x1}, ${y1})`); g.appendChild(tongue);
            }
            svg.appendChild(g);
        });
    }

    function listenGame() {
        window.onresize = drawAssets;
        db.ref('rooms/'+room).on('value', snap => {
            const data = snap.val(); if(!data) return;
            const active = data.players[data.turn];
            document.getElementById('turn-info').innerText = active.name === user ? "🔥 GILIRAN LO!" : `${active.name.toUpperCase()} JALAN`;
            document.getElementById('dice-val').innerText = data.last;
            isMoving = data.moving;

            document.querySelectorAll('.pawn').forEach(p => p.remove());
            data.players.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`).getBoundingClientRect();
                const br = document.getElementById('board-area').getBoundingClientRect();
                const div = document.createElement('div');
                div.className = 'pawn';
                // FIX: Path gambar dipastikan terpanggil
                div.style.backgroundImage = `url('${p.img}')`;
                div.style.left = `${(cell.left - br.left) + (i*5)}px`;
                div.style.top = `${(cell.top - br.top) + (i*5)}px`;
                div.innerHTML = `<div class="pawn-name">${p.name}</div>`;
                document.getElementById('board-area').appendChild(div);
            });
        });

        db.ref('chats/'+room).limitToLast(12).on('value', s => {
            const box = document.getElementById('chat-list'); box.innerHTML = '';
            s.forEach(c => { box.innerHTML += `<div><b class="text-yellow-500">${c.val().u}:</b> ${c.val().t}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function rollDice() {
        const snap = await db.ref('rooms/'+room).get();
        const data = snap.val();
        if(!data || isMoving || data.players[data.turn].name !== user) return;

        const res = Math.floor(Math.random()*6)+1;
        document.getElementById('dice-btn').classList.add('rolling');
        await db.ref('rooms/'+room).update({moving: true, last: res});

        setTimeout(async () => {
            document.getElementById('dice-btn').classList.remove('rolling');
            let pList = [...data.players];
            let p = pList[data.turn];
            let target = Math.min(p.pos + res, 100);

            for(let i = p.pos + 1; i <= target; i++) {
                p.pos = i;
                await db.ref('rooms/'+room+'/players').set(pList);
                await new Promise(r => setTimeout(r, 200));
            }

            if(jumps[p.pos]) {
                await new Promise(r => setTimeout(r, 600));
                p.pos = jumps[p.pos];
                await db.ref('rooms/'+room+'/players').set(pList);
            }

            if(p.pos === 100) { confetti(); alert("MENANG BRE!"); }
            db.ref('rooms/'+room).update({turn: (data.turn + 1) % pList.length, moving: false});
        }, 1000);
    }

    function sendChat() {
        const inp = document.getElementById('chat-in'); if(!inp.value) return;
        db.ref('chats/'+room).push({u:user, t:inp.value}); inp.value = '';
    }
</script>
</body>
</html>
