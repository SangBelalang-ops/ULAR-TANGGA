<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER: THE REAL BOARD GAME</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 20; color: white; }
        #setup { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .btn { padding: 20px 60px; font-size: 26px; cursor: pointer; background: #f1c40f; color: #000; border: 6px solid #fff; border-radius: 20px; font-weight: 900; box-shadow: 0 10px 0 #b8860b; transition: 0.1s; }
        .btn:active { transform: translateY(5px); box-shadow: 0 5px 0 #b8860b; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); box-shadow: none; }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 40px; color: #fff; text-shadow: 4px 4px 0 #e74c3c; -webkit-text-stroke: 1px black; }
        #dice-view { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 150px; height: 150px; background: white; border: 8px solid #ddd; border-radius: 25px; display: none; align-items: center; justify-content: center; font-size: 80px; color: black; box-shadow: 0 0 100px rgba(255,255,255,0.8); z-index: 50; }
        input { padding: 20px; width: 300px; border-radius: 15px; border: 4px solid #f1c40f; font-size: 20px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #f1c40f; font-size: 60px; margin: 0;">SQUAD LADDER</h1>
    <p style="color: #fff; margin-bottom: 30px;">REAL 3D BOARD FOR ALVIN PHANESTU</p>
    <input type="text" id="pName" placeholder="NAMA SQUAD">
    <button class="btn" onclick="startNow()">MAIN SEKARANG!</button>
</div>

<div id="ui">
    <div id="msg">GILIRAN: ---</div>
    <div id="dice-view">?</div>
    <div id="controls"><button id="rollBtn" class="btn" onclick="rollRealDice()" disabled>KOCOK DADU! 🎲</button></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'real_board_v14/state');

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false;

    const LADDERS = { 2: 21, 7: 30, 27: 83, 50: 66, 70: 90 };
    const SNAKES = { 16: 5, 46: 24, 61: 17, 94: 73, 97: 76 };

    window.startNow = () => {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("Woi! Nama!");
        document.getElementById('setup').style.display = 'none';
        initWorld();
        syncGame();
    };

    function initWorld() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 12); camera.lookAt(0, -1, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const amb = new THREE.AmbientLight(0xffffff, 1.2); scene.add(amb);
        const sun = new THREE.DirectionalLight(0xffffff, 1); sun.position.set(5, 15, 5); sun.castShadow = true;
        scene.add(sun);

        createBoard();
        createObstacles();
        animate();
    }

    function createBoard() {
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 512;
        const ctx = canvas.getContext('2d');

        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));

            // Papan Kayu Terang
            ctx.fillStyle = (row + col) % 2 === 0 ? '#f39c12' : '#e67e22';
            ctx.fillRect(0, 0, 512, 512);
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 20; ctx.strokeRect(0,0,512,512);
            
            // Nomor HD
            ctx.fillStyle = '#fff'; ctx.font = 'bold 200px Arial'; ctx.textAlign = 'center';
            ctx.strokeStyle = 'black'; ctx.lineWidth = 15; ctx.strokeText(i + 1, 256, 330);
            ctx.fillText(i + 1, 256, 330);

            const tex = new THREE.CanvasTexture(canvas.cloneNode(true));
            const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.4, 1.2), new THREE.MeshStandardMaterial({map: tex}));
            tile.position.set(col * 1.3 - 5.8, 0, row * 1.3 - 5.8);
            tile.receiveShadow = true;
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createObstacles() {
        // ULAR (Tube Merah Melengkung)
        Object.entries(SNAKES).forEach(([s, e]) => {
            const curve = new THREE.QuadraticBezierCurve3(boardPos[s], new THREE.Vector3((boardPos[s].x+boardPos[e].x)/2, 3, (boardPos[s].z+boardPos[e].z)/2), boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 30, 0.15, 8), new THREE.MeshStandardMaterial({color: 0xc0392b})));
        });
        // TANGGA (Kayu Hijau)
        Object.entries(LADDERS).forEach(([s, e]) => {
            const curve = new THREE.LineCurve3(boardPos[s].clone().add(new THREE.Vector3(0,0.3,0)), boardPos[e].clone().add(new THREE.Vector3(0,0.3,0)));
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 2, 0.1, 4), new THREE.MeshStandardMaterial({color: 0x27ae60})));
        });
    }

    function syncGame() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, won: false, color: '#e74c3c'}] });

            const sP = data.players || [];
            let found = false;
            sP.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
                if(!playerModels[idx]) {
                    const g = new THREE.Group();
                    const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 1, 16), new THREE.MeshStandardMaterial({color: p.color}));
                    body.position.y = 0.5; body.castShadow = true; g.add(body);
                    const loader = new THREE.TextureLoader();
                    const face = new THREE.Sprite(new THREE.SpriteMaterial({map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}`)}));
                    face.position.y = 1.6; face.scale.set(1.2, 1.2, 1); g.add(face);
                    scene.add(g); playerModels[idx] = g;
                }
                playerModels[idx].position.lerp(boardPos[p.pos].clone().add(new THREE.Vector3(0, 0, 0)), 0.1);
            });

            if(!found) {
                sP.push({name: myName, pos: 0, won: false, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players: sP });
            }
            document.getElementById('msg').innerText = `GILIRAN: ${sP[data.turn].name.toUpperCase()}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving || sP[myId].won);
            if(sP[myId].won) document.getElementById('msg').innerText = "MENANG BOSS! 🏆";
        });
    }

    window.rollRealDice = async () => {
        isMoving = true;
        const diceVal = Math.floor(Math.random() * 6) + 1;
        const diceUI = document.getElementById('dice-view');
        diceUI.style.display = 'flex'; diceUI.innerText = "🎲";
        
        setTimeout(async () => {
            diceUI.innerText = diceVal;
            setTimeout(async () => {
                diceUI.style.display = 'none';
                const snap = await get(gameRef);
                const data = snap.val();
                let nPos = data.players[myId].pos + diceVal;

                if(nPos >= 99) { nPos = 99; data.players[myId].won = true; }
                if(LADDERS[nPos]) nPos = LADDERS[nPos];
                if(SNAKES[nPos]) nPos = SNAKES[nPos];

                data.players[myId].pos = nPos;
                update(gameRef, { turn: (data.turn + 1) % data.players.length, players: data.players });
                isMoving = false;
            }, 1000);
        }, 800);
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
