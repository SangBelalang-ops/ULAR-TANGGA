<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA | PRO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        
        #game-view { width: 100vw; height: 60vh; overflow: auto; position: relative; background: #0f172a; border-bottom: 2px solid #334155; scroll-behavior: smooth; }
        #board-container { position: relative; width: 900px; height: 900px; background: #1e293b; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        
        .cell { border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; padding: 10px; font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.05); }
        .cell:nth-child(even) { background: rgba(255,255,255,0.01); }

        /* SVG OVERLAY & VISUALS */
        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* DESAIN TANGGA (PROPER) */
        .ladder-group path { stroke: #22c55e; stroke-width: 4; fill: none; opacity: 0.7; filter: drop-shadow(0 0 5px #22c55e); }
        .ladder-group line { stroke: #22c55e; stroke-width: 3; opacity: 0.7; }

        /* DESAIN ULAR (zigzag + kepala) */
        .snake-group path { stroke: #ef4444; stroke-width: 6; fill: none; opacity: 0.7; stroke-linecap: round; filter: drop-shadow(0 0 8px #ef4444); animation: snake-pulse 2s infinite; }
        .snake-head { fill: #ef4444; opacity: 0.8; filter: drop-shadow(0 0 5px #ef4444); }
        @keyframes snake-pulse { 0%, 100% { opacity: 0.5; stroke-width: 6; } 50% { opacity: 0.8; stroke-width: 7; } }

        /* PION */
        .pawn { width: 60px; height: 60px; position: absolute; z-index: 50; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background-size: cover; background-position: center; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .pawn-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; white-space: nowrap; }
        .pawn.finished { opacity: 0.5; filter: grayscale(1); border-color: #94a3b8; }

        /* DICE & CONTROLS */
        .dice { width: 90px; height: 90px; background: #fff; color: #000; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer; box-shadow: 0 8px 0 #94a3b8; }
        .dice-rolling { animation: roll 0.1s infinite; }
        @keyframes roll { 0% { transform: rotate(0); } 100% { transform: rotate(15deg); } }

        #chat-box::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div id="setup-screen" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6">
    <h1 class="text-7xl font-black italic text-yellow-500 mb-2 tracking-tighter drop-shadow-2xl">SNAKE <span class="text-white">MAGA</span></h1>
    <p class="text-[10px] text-slate-500 mb-8 tracking-[0.5em] font-bold uppercase">Pro Edition</p>
    <div class="w-full max-w-sm space-y-4">
        <div id="name-selector" class="grid grid-cols-3 gap-2"></div>
        <button onclick="handleEntry('join')" class="w-full bg-yellow-600 py-5 rounded-2xl font-black uppercase text-white shadow-xl hover:scale-105 transition-all">GAS MAIN</button>
        <button onclick="handleEntry('spectate')" class="w-full border-2 border-slate-700 py-3 rounded-xl font-black uppercase text-slate-500 text-[10px]">Nonton Doang</button>
    </div>
</div>

<div id="game-ui" class="hidden flex flex-col h-screen">
    <div class="bg-slate-950 p-4 flex justify-between items-center border-b border-white/10 z-20">
        <div class="flex flex-col"><span class="text-slate-500 text-[9px] font-black italic">LAST WINNER</span><span id="last-winner" class="text-yellow-500 font-black uppercase text-sm">-</span></div>
        <div class="text-white text-3xl font-black italic tracking-tighter">SNAKE MAGA</div>
        <div class="flex flex-col items-end"><span class="text-slate-500 text-[9px] font-black italic">MOST WINS</span><span id="most-winner" class="text-green-500 font-black uppercase text-sm">-</span></div>
    </div>

    <div id="game-view">
        <div id="board-container">
            <svg id="svg-connections" class="svg-overlay"></svg>
            <div id="board"></div>
        </div>
    </div>

    <div class="bg-slate-900 p-4 flex gap-4 h-[32vh] border-t border-white/5">
        <div class="flex flex-col items-center justify-center gap-2 w-1/4">
            <div id="dice" class="dice" onclick="handleRoll()">🎲</div>
            <div id="status-text" class="text-[10px] font-black text-yellow-500 uppercase text-center mt-2 leading-tight">Menghubungkan...</div>
        </div>
        <div class="flex-1 flex flex-col bg-black/50 rounded-2xl border border-white/5 p-3">
            <div id="chat-box" class="flex-1 overflow-y-auto text-[11px] font-medium mb-3"></div>
            <div class="flex gap-2">
                <button onclick="sendEmote('😂')" class="bg-slate-800 p-2 rounded-lg">😂</button>
                <button onclick="sendEmote('💩')" class="bg-slate-800 p-2 rounded-lg">💩</button>
                <input id="chat-input" type="text" placeholder="Bacotin temen..." class="flex-1 bg-slate-800 rounded-lg px-3 text-xs outline-none border border-slate-700" onkeypress="if(event.key==='Enter') sendMessage()">
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc",
        measurementId: "G-QQY0R81JJ6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    
    let myName = '', roomCode = 'SNAKE-MAGA-PRO', isSpectator = false;

    const selector = document.getElementById('name-selector');
    squad.forEach(n => {
        const b = document.createElement('button'); b.innerText = n;
        b.className = "name-btn bg-slate-800 border-2 border-slate-700 py-3 rounded-xl text-[10px] font-black uppercase";
        b.onclick = () => {
            document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('border-yellow-500', 'bg-yellow-600', 'text-white'));
            b.classList.add('border-yellow-500', 'bg-yellow-600', 'text-white');
            myName = n;
        };
        selector.appendChild(b);
    });

    function handleEntry(type) {
        if (type !== 'spectate' && !myName) return alert("Pilih Nama!");
        if (type === 'spectate') { isSpectator = true; myName = "Penonton"; startGame(); return; }

        const ref = db.ref('rooms/' + roomCode);
        ref.once('value', s => {
            let d = s.val();
            if (!d) {
                ref.set({ players: [{ name: myName, pos: 1, img: `${myName.toLowerCase()}.png`, finished: false }], turnIndex: 0, moving: false, lastRoll: 1 }).then(startGame);
            } else {
                let pList = d.players || [];
                if (!pList.find(p => p.name === myName)) pList.push({ name: myName, pos: 1, img: `${myName.toLowerCase()}.png`, finished: false });
                ref.update({ players: pList }).then(startGame);
            }
        });
    }

    function startGame() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        initBoard(); syncGame(); syncStats();
        if(isSpectator) document.getElementById('dice').style.opacity = "0.2";
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r = 9; r >= 0; r--) {
            for (let c = 0; c < 10; c++) {
                let num = (r % 2 === 0) ? (r * 10 + c + 1) : (r * 10 + (10 - c));
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `cell-${num}`; cell.innerHTML = `<span>${num}</span>`;
                b.appendChild(cell);
            }
        }
    }

    // FUNGSI DESAIN ULAR & TANGGA (PROPER)
    function drawConnections() {
        const svg = document.getElementById('svg-connections'); svg.innerHTML = '';
        const bRect = document.getElementById('board-container').getBoundingClientRect();

        Object.keys(jumps).forEach(sKey => {
            const start = parseInt(sKey); const end = jumps[start];
            const sEl = document.getElementById(`cell-${start}`).getBoundingClientRect();
            const eEl = document.getElementById(`cell-${end}`).getBoundingClientRect();
            
            const x1 = sEl.left - bRect.left + sEl.width/2;
            const y1 = sEl.top - bRect.top + sEl.height/2;
            const x2 = eEl.left - bRect.left + eEl.width/2;
            const y2 = eEl.top - bRect.top + eEl.height/2;

            if (end > start) {
                // DESAIN TANGGA HD
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "ladder-group");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const dx = x2 - x1; const dy = y2 - y1; const off = 10;
                path.setAttribute("d", `M${x1-off},${y1} L${x2-off},${y2} M${x1+off},${y1} L${x2+off},${y2}`);
                g.appendChild(path);
                // Gambar anak tangga
                const steps = 6;
                for (let i = 1; i < steps; i++) {
                    const lx = x1 + dx * (i/steps); const ly = y1 + dy * (i/steps);
                    const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    line.setAttribute("x1", lx-off); line.setAttribute("y1", ly); line.setAttribute("x2", lx+off); line.setAttribute("y2", ly); g.appendChild(line);
                }
                svg.appendChild(g);
            } else {
                // DESAIN ULAR HD (Zigzag)
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g"); g.setAttribute("class", "snake-group");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                const midX = (x1+x2)/2; const midY = (y1+y2)/2;
                const curve = 30; // Kebencian zigzag
                path.setAttribute("d", `M${x1},${y1} Q${midX+curve},${midY-curve} ${midX},${midY} T${x2},${y2}`);
                g.appendChild(path);
                // Gambar Kepala Ular
                const head = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                head.setAttribute("cx", x1); head.setAttribute("cy", y1); head.setAttribute("r", 8); head.setAttribute("class", "snake-head");
                g.appendChild(head);
                svg.appendChild(g);
            }
        });
    }

    function syncGame() {
        // Redraw connections on resize/load
        setTimeout(drawConnections, 1000);
        window.addEventListener('resize', drawConnections);

        db.ref('rooms/' + roomCode).on('value', s => {
            const data = s.val(); if (!data) return;
            const players = data.players; const turnIndex = data.turnIndex;
            const turnP = players[turnIndex];
            
            // Cek giliran (skip yang udah finish)
            document.getElementById('status-text').innerText = turnP.name === myName ? "GILIRAN LO, GAS!" : turnP.name.toUpperCase() + " JALAN";
            if (turnP.finished && turnP.name === myName) {
                document.getElementById('status-text').innerText = "LO UDAH FINISH! NONGKRONG AJA.";
            }

            document.getElementById('dice').innerHTML = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][data.lastRoll || 0];
            
            document.querySelectorAll('.pawn').forEach(p => p.remove());
            players.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect(); const bRect = document.getElementById('board-container').getBoundingClientRect();
                const pawn = document.createElement('div'); pawn.className = 'pawn' + (p.finished ? ' finished' : '');
                pawn.style.backgroundImage = `url('${p.img}')`;
                pawn.style.left = `${(rect.left - bRect.left) + (i * 6)}px`; pawn.style.top = `${(rect.top - bRect.top) + (i * 6)}px`;
                pawn.innerHTML = `<div class="pawn-label">${p.name} ${p.finished ? '✅' : ''}</div>`;
                document.getElementById('board-container').appendChild(pawn);
                if (p.name === turnP.name && !turnP.finished) pawn.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });

            // CEK APAKAH SEMUA UDAH FINISH
            if (players.every(p => p.finished)) {
                setTimeout(() => {
                    alert("GAME SELESAI! SEMUA SQUAD UDAH DI 100.");
                    db.ref('rooms/' + roomCode).remove(); location.reload();
                }, 2000);
            }
        });
        
        db.ref('chats/' + roomCode).limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(child => {
                const m = child.val();
                box.innerHTML += `<div class="mb-1"><span class="text-yellow-500 font-black uppercase text-[9px] mr-1">${m.user}:</span><span class="text-slate-200">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function syncStats() {
        db.ref('stats/lastWinner').on('value', s => document.getElementById('last-winner').innerText = s.val() || '-');
        db.ref('stats/mostWins').on('value', s => {
            const wins = s.val() || {};
            let top = Object.entries(wins).sort((a,b) => b[1]-a[1])[0];
            document.getElementById('most-winner').innerText = top ? `${top[0]} (${top[1]}X)` : '-';
        });
    }

    async function handleRoll() {
        if (isSpectator) return;
        const snap = await db.ref('rooms/' + roomCode).get();
        const data = snap.val();
        const players = data.players;
        const pIdx = data.turnIndex;
        const turnP = players[pIdx];

        if (turnP.name !== myName || data.moving || turnP.finished) return;

        const roll = Math.floor(Math.random() * 6) + 1;
        db.ref('rooms/' + roomCode).update({ moving: true, lastRoll: roll });
        document.getElementById('dice').classList.add('dice-rolling');
        
        setTimeout(async () => {
            document.getElementById('dice').classList.remove('dice-rolling');
            let pList = [...players]; let p = pList[pIdx];
            
            // Gerak Satu-satu
            for (let i = p.pos + 1; i <= Math.min(p.pos + roll, 100); i++) {
                p.pos = i; db.ref('rooms/' + roomCode + '/players').set(pList);
                await new Promise(r => setTimeout(r, 250));
            }

            // Ular/Tangga
            if (jumps[p.pos]) { 
                await new Promise(r => setTimeout(r, 600)); 
                p.pos = jumps[p.pos]; db.ref('rooms/' + roomCode + '/players').set(pList); 
            }

            // Cek Menang tapi Lanjut
            if (p.pos === 100 && !p.finished) {
                confetti(); p.finished = true;
                db.ref('stats/lastWinner').set(myName);
                db.ref('stats/mostWins/' + myName).transaction(curr => (curr || 0) + 1);
                db.ref('chats/' + roomCode).push({ user: "SISTEM", text: `👑 ${myName} TELAH FINISH!` });
            }

            // OPER GILIRAN (Cari pemain berikutnya yang belum finish)
            let nextTurn = (pIdx + 1) % pList.length;
            // Loop maksimal sebanyak jumlah pemain biar nggak infinite
            for(let i=0; i<pList.length; i++) {
                if(!pList[nextTurn].finished) break;
                nextTurn = (nextTurn + 1) % pList.length;
            }

            db.ref('rooms/' + roomCode).update({ turnIndex: nextTurn, moving: false });

        }, 800);
    }

    function sendMessage() {
        const inp = document.getElementById('chat-input'); if (!inp.value) return;
        db.ref('chats/' + roomCode).push({ user: myName, text: inp.value }); inp.value = '';
    }
    function sendEmote(e) { db.ref('chats/' + roomCode).push({ user: myName, text: e }); }
</script>
</body>
</html>
