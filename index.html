<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER - MSI STABLE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 20; color: white; }
        #setup { position: absolute; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: #fff; color: #000; border: 4px solid #00d4ff; border-radius: 15px; font-weight: 900; transition: 0.2s; box-shadow: 0 0 20px rgba(0, 212, 255, 0.4); }
        .btn:hover:not(:disabled) { transform: scale(1.1); background: #00d4ff; color: #fff; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }
        #msg { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 30px; font-weight: 900; color: #ffd700; text-shadow: 3px 3px #000; }
        #dice-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130px; height: 130px; background: white; border: 5px solid #00d4ff; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 70px; color: black; font-weight: bold; box-shadow: 0 0 60px white; z-index: 50; }
        input { padding: 15px; width: 280px; border-radius: 10px; border: 3px solid #00d4ff; font-size: 18px; margin-bottom: 20px; text-align: center; background: #111; color: #fff; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff; font-size: 50px; margin-bottom: 10px;">SQUAD LADDER FINAL</h1>
    <p style="color: #aaa; margin-bottom: 30px;">RESTORASI KODE STABLE - MSI i7 READY</p>
    <input type="text" id="playerName" placeholder="Nama Kamu (Alvin/Tegar/Meggy...)">
    <button class="btn" onclick="letsGo()">MASUK GAME</button>
</div>

<div id="ui">
    <div id="msg">GILIRAN: ---</div>
    <div id="dice-box">?</div>
    <div id="controls"><button id="rollBtn" class="btn" onclick="kocokDadu()" disabled>KOCOK DADU! 🎲</button></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder_v15/state');

    const GITHUB_BASE = "https://raw.githubusercontent.com/Alvinphanestu/ular-tangga/main/assets/";

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false;

    const LADDERS = { 2: 21, 7: 30, 27: 83, 50: 66, 70: 90 };
    const SNAKES = { 16: 5, 46: 24, 61: 17, 94: 73, 97: 76 };

    window.letsGo = () => {
        myName = document.getElementById('playerName').value.trim();
        if(!myName) return alert("Isi nama dulu, Vin!");
        document.getElementById('setup').style.display = 'none';
        init3D();
        syncData();
    };

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 14, 11); camera.lookAt(0, -1, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5)); // Cahaya Terang!
        createBoard();
        createObstacles();
        animate();
    }

    function createBoard() {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');

        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));

            ctx.fillStyle = (row + col) % 2 === 0 ? '#4e342e' : '#3e2723';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 10; ctx.strokeRect(0,0,256,256);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 100px Arial'; ctx.textAlign = 'center';
            ctx.fillText(i + 1, 128, 165);

            const tex = new THREE.CanvasTexture(canvas.cloneNode(true));
            const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.2), new THREE.MeshStandardMaterial({map: tex}));
            tile.position.set(col * 1.3 - 5.8, 0, row * 1.3 - 5.8);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createObstacles() {
        Object.entries(SNAKES).forEach(([s, e]) => {
            const curve = new THREE.QuadraticBezierCurve3(boardPos[s], new THREE.Vector3((boardPos[s].x+boardPos[e].x)/2, 2.5, (boardPos[s].z+boardPos[e].z)/2), boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.12, 8), new THREE.MeshStandardMaterial({color: 0xff0000})));
        });
        Object.entries(LADDERS).forEach(([s, e]) => {
            const curve = new THREE.LineCurve3(boardPos[s], boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 2, 0.08, 8), new THREE.MeshStandardMaterial({color: 0x00ff00})));
        });
    }

    function syncData() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, won: false, color: '#00d4ff'}] });

            const players = data.players || [];
            let found = false;
            players.forEach((p, idx) => {
                if(p.name.toLowerCase() === myName.toLowerCase()) { myId = idx; found = true; }
                if(!playerModels[idx]) {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: p.color})));
                    const loader = new THREE.TextureLoader();
                    const photoUrl = `${GITHUB_BASE}${p.name.toLowerCase()}.png`;
                    const faceMat = new THREE.SpriteMaterial({ map: loader.load(photoUrl, undefined, undefined, () => {
                        faceMat.map = loader.load("https://api.dicebear.com/7.x/avataaars/svg?seed=" + p.name);
                    })});
                    const face = new THREE.Sprite(faceMat);
                    face.position.y = 1.2; face.scale.set(1, 1, 1);
                    g.add(face);
                    scene.add(g); playerModels[idx] = g;
                }
                playerModels[idx].position.lerp(boardPos[p.pos].clone().add(new THREE.Vector3(0, 0.6, 0)), 0.1);
            });

            if(!found && players.length < 6) {
                players.push({name: myName, pos: 0, won: false, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players });
            }

            document.getElementById('msg').innerText = `GILIRAN: ${players[data.turn].name.toUpperCase()}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving || players[myId].won);
        });
    }

    window.kocokDadu = async () => {
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        const diceUI = document.getElementById('dice-box');
        diceUI.style.display = 'flex'; diceUI.innerText = "🎲";
        
        setTimeout(async () => {
            diceUI.innerText = roll;
            setTimeout(async () => {
                diceUI.style.display = 'none';
                const snap = await get(gameRef);
                const data = snap.val();
                let nPos = data.players[myId].pos + roll;

                if(nPos >= 99) { nPos = 99; data.players[myId].won = true; }
                if(LADDERS[nPos]) nPos = LADDERS[nPos];
                if(SNAKES[nPos]) nPos = SNAKES[nPos];

                data.players[myId].pos = nPos;
                update(gameRef, { turn: (data.turn + 1) % data.players.length, players: data.players });
                isMoving = false;
            }, 1000);
        }, 600);
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
