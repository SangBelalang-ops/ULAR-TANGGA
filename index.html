<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA | FINAL SQUAD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;}
        
        #game-ui { display: none; width: 100vw; height: 100vh; flex-direction: row; padding: 20px; gap: 20px; }
        #board-section { flex: 1; position: relative; background: #020617; border-radius: 15px; border: 3px solid #1e293b; overflow: hidden; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        #control-section { width: 300px; display: flex; flex-direction: column; gap: 15px; }

        #board-container { position: relative; width: 100%; height: 100%; background: #020617; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        
        /* WARNA NOMOR NYAMAN DI MATA */
        .cell { border: 1px solid rgba(51, 65, 85, 0.4); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: #92400e; position: relative; }
        .cell:nth-child(even) { background: #070a13; }
        .cell span { opacity: 0.6; }

        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ladder-group path { stroke: #78350f; stroke-width: 8; fill: none; opacity: 0.6; stroke-linecap: round; }
        .ladder-group line { stroke: #d97706; stroke-width: 3; opacity: 0.5; }
        .snake-group path { stroke: #991b1b; stroke-width: 10; fill: none; opacity: 0.6; stroke-linecap: round; filter: drop-shadow(0 0 5px #991b1b); }

        .pawn { width: 55px; height: 55px; position: absolute; z-index: 50; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background-size: cover; background-position: center; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 8px 20px rgba(0,0,0,0.6); }
        .pawn-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; font-size: 8px; padding: 1px 4px; border-radius: 3px; font-weight: 900; }

        /* DADU AREA */
        .dice-area { background: #0f172a; border-radius: 20px; padding: 15px; display: flex; flex-direction: column; align-items: center; border: 2px solid #1e293b; transition: all 0.3s; }
        .dice-view { width: 100px; height: 100px; perspective: 1000px; margin: 15px 0; cursor: pointer; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s ease-out; }
        .cube-face { position: absolute; width: 100px; height: 100px; background: #fff; border: 4px solid #e2e8f0; border-radius: 15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 12px; }
        .dot { background: #1e293b; border-radius: 50%; width: 16px; height: 16px; align-self: center; justify-self: center; visibility: hidden; }
        .dot.show { visibility: visible; }
        
        .front { transform: rotateY(0deg) translateZ(50px); } .back { transform: rotateY(180deg) translateZ(50px); }
        .right { transform: rotateY(90deg) translateZ(50px); } .left { transform: rotateY(-90deg) translateZ(50px); }
        .top { transform: rotateX(90deg) translateZ(50px); } .bottom { transform: rotateX(-90deg) translateZ(50px); }
        .cube-rolling { animation: roll-3d 0.2s infinite linear; }
        @keyframes roll-3d { 0% { transform: rotateX(0deg) rotateY(0deg); } 100% { transform: rotateX(360deg) rotateY(360deg); } }

        #chat-box { flex: 1; overflow-y: auto; font-size: 12px; margin-bottom: 5px; }
        #chat-box::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div id="setup-screen" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6 text-center">
    <h1 class="text-6xl font-black italic text-amber-600 mb-2">SNAKE <span class="text-white">MAGA</span></h1>
    <div class="w-full max-w-sm space-y-3 mt-8">
        <input id="room-input" type="text" placeholder="KODE ROOM" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-700 text-center font-bold text-amber-500 uppercase outline-none">
        <div id="name-selector" class="grid grid-cols-3 gap-2"></div>
        <button onclick="handleEntry()" class="w-full bg-amber-700 py-4 rounded-xl font-black text-white hover:bg-amber-600 transition-all">MASUK ARENA</button>
    </div>
</div>

<div id="game-ui">
    <div id="board-section"><div id="board-container"><svg id="svg-connections" class="svg-overlay"></svg><div id="board"></div></div></div>
    <div id="control-section">
        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
            <p id="status-text" class="text-[10px] font-black text-amber-500 uppercase tracking-tighter">Menunggu...</p>
        </div>
        <div id="dice-area" class="dice-area">
            <div class="dice-view" onclick="handleRoll()"><div id="cube" class="cube">
                <div class="cube-face front"><div class="dot show" style="grid-area: 2/2"></div></div>
                <div class="cube-face back"><div class="dot show"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                <div class="cube-face right"><div class="dot show"></div><div class="dot show" style="grid-area: 2/2"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                <div class="cube-face left"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                <div class="cube-face top"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 2/2"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                <div class="cube-face bottom"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 2/1"></div><div class="dot show" style="grid-area: 2/3"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
            </div></div>
        </div>
        <div class="flex-1 bg-slate-900 p-4 rounded-xl border border-slate-800 flex flex-col">
            <div id="chat-box"></div>
            <input id="chat-input" type="text" placeholder="Ketik bacot..." class="w-full bg-slate-800 p-2 rounded text-xs outline-none" onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    
    let myName = '', roomCode = '', isLocalRolling = false;

    const selector = document.getElementById('name-selector');
    squad.forEach(n => {
        const b = document.createElement('button'); b.innerText = n;
        b.className = "name-btn bg-slate-800 border border-slate-700 p-2 rounded-lg text-[10px] font-bold uppercase";
        b.onclick = () => {
            document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('border-amber-500', 'bg-amber-900'));
            b.classList.add('border-amber-500', 'bg-amber-900');
            myName = n;
        };
        selector.appendChild(b);
    });

    function handleEntry() {
        roomCode = document.getElementById('room-input').value.toUpperCase() || 'SQUAD';
        if (!roomCode || !myName) return alert("Pilih Nama & Room!");
        db.ref('rooms/' + roomCode).once('value', s => {
            let d = s.val();
            if (!d) {
                db.ref('rooms/' + roomCode).set({ players: [{ name: myName, pos: 1, img: `${myName.toLowerCase()}.png`, finished: false }], turnIndex: 0, moving: false, lastRoll: 1 }).then(startGame);
            } else {
                let pList = d.players || [];
                if (!pList.find(p => p.name === myName)) {
                    pList.push({ name: myName, pos: 1, img: `${myName.toLowerCase()}.png`, finished: false });
                    db.ref('rooms/' + roomCode).update({ players: pList }).then(startGame);
                } else { startGame(); }
            }
        });
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        initBoard(); syncGame();
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r = 9; r >= 0; r--) {
            for (let c = 0; c < 10; c++) {
                let num = (r % 2 === 0) ? (r * 10 + c + 1) : (r * 10 + (10 - c));
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `cell-${num}`; cell.innerHTML = `<span>${num}</span>`;
                b.appendChild(cell);
            }
        }
        setTimeout(drawConnections, 600);
    }

    function drawConnections() {
        const svg = document.getElementById('svg-connections'); svg.innerHTML = '';
        const bRect = document.getElementById('board-container').getBoundingClientRect();
        Object.keys(jumps).forEach(k => {
            const start = parseInt(k); const end = jumps[k];
            const sEl = document.getElementById(`cell-${start}`).getBoundingClientRect();
            const eEl = document.getElementById(`cell-${end}`).getBoundingClientRect();
            const x1 = sEl.left - bRect.left + sEl.width/2; const y1 = sEl.top - bRect.top + sEl.height/2;
            const x2 = eEl.left - bRect.left + eEl.width/2; const y2 = eEl.top - bRect.top + eEl.height/2;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            if (end > start) {
                g.setAttribute("class", "ladder-group");
                path.setAttribute("d", `M${x1-8},${y1} L${x2-8},${y2} M${x1+8},${y1} L${x2+8},${y2}`);
                g.appendChild(path);
                for(let i=1; i<5; i++){
                    const lx = x1+(x2-x1)*(i/5); const ly = y1+(y2-y1)*(i/5);
                    const ln = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    ln.setAttribute("x1", lx-10); ln.setAttribute("y1", ly); ln.setAttribute("x2", lx+10); ln.setAttribute("y2", ly); g.appendChild(ln);
                }
            } else {
                g.setAttribute("class", "snake-group");
                path.setAttribute("d", `M${x1},${y1} Q${(x1+x2)/2+40},${(y1+y2)/2-40} ${x2},${y2}`);
                g.appendChild(path);
            }
            svg.appendChild(g);
        });
    }

    function rotateCube(n) {
        const cube = document.getElementById('cube');
        const rots = { 1:'rotateX(0deg) rotateY(0deg)', 2:'rotateX(0deg) rotateY(-180deg)', 3:'rotateX(0deg) rotateY(-90deg)', 4:'rotateX(0deg) rotateY(90deg)', 5:'rotateX(-90deg) rotateY(0deg)', 6:'rotateX(90deg) rotateY(0deg)' };
        cube.style.transform = rots[n] || rots[1];
    }

    function syncGame() {
        db.ref('rooms/' + roomCode).on('value', s => {
            const d = s.val(); if(!d) return;
            const ps = d.players; const turnIdx = d.turnIndex;
            const turnP = ps[turnIdx];

            const area = document.getElementById('dice-area');
            const isMyTurn = (turnP.name === myName && !turnP.finished && !d.moving);
            area.style.opacity = isMyTurn ? "1" : "0.3";
            area.style.pointerEvents = isMyTurn ? "auto" : "none";
            document.getElementById('status-text').innerText = turnP.name === myName ? "GILIRAN LO, GAS!" : turnP.name + " LAGI JALAN";

            if(!isLocalRolling) rotateCube(d.lastRoll || 1);

            document.querySelectorAll('.pawn').forEach(p => p.remove());
            ps.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect(); const br = document.getElementById('board-container').getBoundingClientRect();
                const div = document.createElement('div'); div.className = 'pawn' + (p.finished ? ' opacity-20':'');
                div.style.backgroundImage = `url('${p.img}')`;
                div.style.left = `${(rect.left - br.left) + (i*4)}px`; div.style.top = `${(rect.top - br.top) + (i*4)}px`;
                div.innerHTML = `<div class="pawn-label">${p.name}</div>`;
                document.getElementById('board-container').appendChild(div);
                if(p.name === turnP.name && !d.moving && p.name === myName) div.scrollIntoView({behavior:'smooth', block:'center'});
            });
        });
        db.ref('chats/' + roomCode).limitToLast(8).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(c => { box.innerHTML += `<div class='mb-1'><b class='text-amber-600'>${c.val().user}:</b> ${c.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function handleRoll() {
        if(isLocalRolling) return;
        const snap = await db.ref('rooms/' + roomCode).get(); const data = snap.val();
        if(!data || data.moving) return;

        isLocalRolling = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        db.ref('rooms/' + roomCode).update({ moving: true, lastRoll: roll });
        document.getElementById('cube').classList.add('cube-rolling');

        setTimeout(async () => {
            document.getElementById('cube').classList.remove('cube-rolling');
            rotateCube(roll);
            let pList = [...data.players]; let p = pList[data.turnIndex];
            let target = Math.min(p.pos + roll, 100);

            for(let i = p.pos + 1; i <= target; i++){
                p.pos = i;
                await db.ref('rooms/' + roomCode + '/players').set(pList);
                await new Promise(r => setTimeout(r, 200));
            }

            if(jumps[p.pos]){
                await new Promise(r => setTimeout(r, 500));
                p.pos = jumps[p.pos];
                await db.ref('rooms/' + roomCode + '/players').set(pList);
            }

            if(p.pos === 100){ confetti(); p.finished = true; }

            let next = (data.turnIndex + 1) % pList.length;
            while(pList[next].finished && pList.some(x => !x.finished)) next = (next + 1) % pList.length;
            
            db.ref('rooms/' + roomCode).update({ turnIndex: next, moving: false });
            isLocalRolling = false;
        }, 1200);
    }

    function sendMessage() {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        db.ref('chats/' + roomCode).push({user: myName, text: i.value}); i.value = '';
    }
</script>
</body>
</html>
