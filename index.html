<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HORROR V4 - FIX & AMBIENCE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
        /* Efek Grain/Noise biar kayak CCTV */
        #noise { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUqnW3Fe/giphy.gif'); opacity: 0.03; pointer-events: none; z-index: 6; }
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 20%, black 150%); pointer-events: none; z-index: 5; }
        
        #ui { position: absolute; bottom: 30px; left: 30px; color: #800; font-size: 16px; z-index: 10; letter-spacing: 1px; }
        #notes-count { position: absolute; top: 30px; right: 30px; color: #fff; font-size: 20px; z-index: 10; border-left: 5px solid #600; padding-left: 10px; }
        
        /* FIX: Jumpscare Tanpa Gambar Luar */
        #jumpscare { 
            position: absolute; inset: 0; background: #000; display: none; z-index: 1000; 
            align-items: center; justify-content: center; overflow: hidden;
        }
        .scare-text { color: #f00; font-size: 100px; font-weight: 900; animation: shake 0.1s infinite; }
        
        @keyframes shake {
            0% { transform: translate(5px, 5px) scale(1.1); filter: blur(2px); }
            50% { transform: translate(-5px, -5px) scale(1.2); filter: blur(0px); }
            100% { transform: translate(2px, -2px) scale(1.1); }
        }

        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: #fff; font-size: 18px; opacity: 0; z-index: 10; transition: 1s; }
    </style>
</head>
<body>

<div id="vignette"></div>
<div id="noise"></div>
<div id="notes-count">OBJECTIVE: <span id="nc">0</span>/5 DATA</div>
<div id="ui">
    SYSTEM: [ONLINE]<br>
    POWER: <span id="percent">100</span>%<br>
    HEARTBEAT: <span id="hr">72</span> BPM
</div>
<div id="msg">KLIK UNTUK MASUK KE AREA...</div>

<div id="jumpscare">
    <div class="scare-text">MATI KAU!</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, flashLight, player, clock, audioCtx;
    let keys = {}, battery = 100, isDead = false, notesFound = 0;
    let enemy, enemyActive = false;
    let items = [], ambientOsc;

    window.onclick = () => {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            startAmbience(); // Cicil Audio: Suara Angin
        }
        document.getElementById('msg').style.opacity = 1;
        document.getElementById('msg').innerText = "CARI 5 DATA SEBELUM DIA MENEMUKANMU...";
        setTimeout(() => document.getElementById('msg').style.opacity = 0, 4000);
        if(!isPlaying) init();
    };

    let isPlaying = false;
    function init() {
        isPlaying = true;
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 12);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        player = new THREE.Group();
        player.add(camera);
        player.position.set(0, 1.6, 25); // Posisi awal aman
        scene.add(player);

        flashLight = new THREE.SpotLight(0xfff5ee, 12, 18, Math.PI/6, 1, 2);
        player.add(flashLight);
        player.add(flashLight.target);
        flashLight.target.position.set(0, 0, -1);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        
        createMaze();
        spawnEnemy();
        spawnDataPads();
        animate();
    }

    // --- CICIL KODE: AUDIO AMBIENCE ---
    function startAmbience() {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'brown'; // Suara angin/low noise
        osc.frequency.setValueAtTime(40, audioCtx.currentTime);
        g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
    }

    function createMaze() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x080808 });
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x020202}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Labirin lebih rapat (2000 lines cicilan part 1)
        for(let i=0; i<60; i++) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 0.5), wallMat);
            wall.position.set(Math.floor(Math.random()*40-20), 3, Math.floor(Math.random()*40-20));
            if(Math.random() > 0.5) wall.rotation.y = Math.PI/2;
            scene.add(wall);
        }
    }

    function spawnEnemy() {
        const stalkerGeo = new THREE.CylinderGeometry(0.5, 0.5, 3, 8);
        const stalkerMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
        enemy = new THREE.Mesh(stalkerGeo, stalkerMat);
        enemy.position.set(-25, 1.5, -25);
        scene.add(enemy);
        setTimeout(() => { enemyActive = true; }, 8000); // 8 detik waktu buat lari
    }

    function spawnDataPads() {
        const dataGeo = new THREE.BoxGeometry(0.4, 0.1, 0.6);
        const dataMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, emissive: 0x00d4ff });
        for(let i=0; i<5; i++) {
            const pad = new THREE.Mesh(dataGeo, dataMat);
            pad.position.set(Math.random()*40-20, 0.2, Math.random()*40-20);
            scene.add(pad);
            items.push(pad);
        }
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function handleMovement() {
        if(isDead) return;
        const speed = 0.08;
        if(keys['KeyW']) player.translateZ(-speed);
        if(keys['KeyS']) player.translateZ(speed);
        if(keys['KeyA']) player.translateX(-speed);
        if(keys['KeyD']) player.translateX(speed);
        if(keys['KeyQ']) player.rotation.y += 0.04;
        if(keys['KeyE']) player.rotation.y -= 0.04;

        // Ambil Data
        items.forEach((pad, idx) => {
            if(player.position.distanceTo(pad.position) < 1.5) {
                scene.remove(pad);
                items.splice(idx, 1);
                notesFound++;
                document.getElementById('nc').innerText = notesFound;
                if(notesFound === 5) { alert("SQUAD SURVIVED! SEMUA DATA DIAMANKAN."); location.reload(); }
            }
        });
    }

    function handleEnemy() {
        if(!enemyActive || isDead) return;
        const dist = player.position.distanceTo(enemy.position);
        const dir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
        
        // AI: Makin banyak data, makin gila ngejarnya
        enemy.position.add(dir.multiplyScalar(0.03 + (notesFound * 0.015)));
        
        document.getElementById('hr').innerText = Math.floor(70 + (12/dist)*30);

        if(dist < 1.4) {
            isDead = true;
            document.getElementById('jumpscare').style.display = 'flex';
            // Suara Teriak Statis (Cicil Audio Part 2)
            const osc = audioCtx.createOscillator();
            osc.type = 'sawtooth'; osc.frequency.value = 100;
            osc.connect(audioCtx.destination); osc.start();
            setTimeout(() => location.reload(), 3000);
        }
    }

    function animate() {
        if(!isDead) requestAnimationFrame(animate);
        handleMovement();
        handleEnemy();
        
        // Battery Flicker
        battery -= 0.015;
        document.getElementById('percent').innerText = Math.max(0, Math.floor(battery));
        if(battery > 0) flashLight.intensity = (Math.random() > 0.98) ? 0 : 12;
        else flashLight.intensity = 0;

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
