<!DOCTYPE html>
<html>
<head>
    <title>SQUAD HARVEST: PS1 EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border: 3px solid #fff; pointer-events: none; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: yellow; font-size: 24px; text-align: center; display: none; background: rgba(0,0,0,0.9); padding: 20px; border: 4px solid #f00; }
        #crosshair { position: absolute; top: 50%; left: 50%; color: white; font-size: 20px; transform: translate(-50%, -50%); pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0; color: #7cfc00;">SQUAD HARVEST</h2>
        <hr>
        HARI: <span id="day">1</span>/10<br>
        GOLD: <span id="gold">0</span><br>
        STATUS: <span id="stat">PETANI PEMULA</span>
        <p style="font-size: 10px; color: #aaa;">*Klik Kiri: Cangkul/Tanam | Masuk Rumah: Tidur</p>
    </div>
    <div id="msg"></div>
    <div id="crosshair">+</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- GAME STATE ---
        let gold = 0, day = 1, resources = 0;
        const plots = []; // Lahan tanah

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // --- LIGHTING ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(new THREE.AmbientLight(0x404040), light);

        // --- WORLD BUILDING ---
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const matGrass = new THREE.MeshLambertMaterial({ color: 0x2d5a27 });
        const matDirt = new THREE.MeshLambertMaterial({ color: 0x5d3a1a });
        const matCrop = new THREE.MeshLambertMaterial({ color: 0xffff00 });

        // Buat Lahan (Grid 10x10)
        for(let x=-5; x<5; x++) {
            for(let z=-5; z<5; z++) {
                const land = new THREE.Mesh(geo, matGrass);
                land.position.set(x, 0, z);
                land.userData = { tilled: false, planted: false, age: 0 };
                scene.add(land);
                plots.push(land);
            }
        }

        // Rumah (Tempat Tidur)
        const house = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshLambertMaterial({ color: 0xffffff }));
        house.position.set(0, 1, -8);
        scene.add(house);

        camera.position.set(0, 2, 5);

        // --- INTERAKSI ---
        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', (e) => {
            if(!controls.isLocked || e.button !== 0) return;
            raycaster.setFromCamera(new THREE.Vector2(), camera);
            const intersects = raycaster.intersectObjects(plots);
            
            if(intersects.length > 0) {
                const p = intersects[0].object;
                if(!p.userData.tilled) {
                    p.material = matDirt;
                    p.userData.tilled = true;
                } else if(!p.userData.planted) {
                    const plant = new THREE.Mesh(new THREE.SphereGeometry(0.2), matCrop);
                    plant.position.set(p.position.x, 0.6, p.position.z);
                    scene.add(plant);
                    p.userData.planted = true;
                    p.userData.cropObj = plant;
                }
            }
        });

        // --- GAME LOOP ---
        let moveF = false, moveB = false, moveL = false, moveR = false;
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true;
            if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false;
            if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
        });

        function animate() {
            requestAnimationFrame(animate);
            if(controls.isLocked) {
                const spd = 0.1;
                if(moveF) controls.moveForward(spd); if(moveB) controls.moveForward(-spd);
                if(moveL) controls.moveRight(-spd); if(moveR) controls.moveRight(spd);

                // Cek Masuk Rumah (Ganti Hari)
                if(camera.position.distanceTo(house.position) < 2) {
                    nextDay();
                }
            }
            renderer.render(scene, camera);
        }

        function nextDay() {
            day++;
            camera.position.set(0, 2, 5); // Reset ke depan kebun
            controls.unlock();
            
            // Panen Otomatis & Update UI
            plots.forEach(p => {
                if(p.userData.planted) {
                    gold += 150;
                    scene.remove(p.userData.cropObj);
                    p.material = matGrass;
                    p.userData.tilled = false;
                    p.userData.planted = false;
                }
            });

            document.getElementById('day').innerText = day;
            document.getElementById('gold').innerText = gold;

            if(day > 10) endGame();
            else alert("Selamat Pagi! Hari ke-" + day + ". Waktunya bekerja!");
        }

        function endGame() {
            const m = document.getElementById('msg');
            m.style.display = 'block';
            if(gold >= 1000) {
                m.innerHTML = "<h1>HAPPY ENDING</h1><p>Kebun sukses! Walikota bangga dan lo jadi juragan sayur di pulau!</p>";
            } else {
                m.innerHTML = "<h1>SAD ENDING</h1><p>Emas lo dikit banget. Kebun disita buat jadi tempat parkir motor.</p>";
            }
        }

        animate();
    </script>
</body>
</html>
