<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD CHICKEN: BOSS INVASION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #0f172a; border: 4px solid #334155; border-radius: 12px; box-shadow: 0 0 60px rgba(239, 68, 68, 0.2); }
        .hud { position: absolute; top: 20px; width: 780px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .stat { background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 8px; border: 1px solid #475569; min-width: 150px; }
        #boss-hp-container { position: absolute; bottom: 80px; width: 600px; display: none; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Squad Status</p>
            <p id="lives" class="text-xl">❤️❤️❤️</p>
            <div class="w-full h-2 bg-slate-700 mt-2 rounded-full overflow-hidden border border-slate-600"><div id="hp" class="h-full bg-green-500 transition-all duration-200"></div></div>
        </div>
        <div class="stat text-center">
            <p id="wave-display" class="text-yellow-500 text-2xl font-black italic tracking-tighter">WAVE 1</p>
            <p id="score" class="text-white text-[10px] font-bold">SCORE: 0</p>
        </div>
        <div class="stat text-right">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Special Weapon</p>
            <p id="weapon-name" class="text-sm text-red-500 font-black italic uppercase">Pistol Egg</p>
            <div id="w-timer" class="w-full h-1 bg-red-900 mt-1 rounded-full overflow-hidden"><div id="w-progress" class="h-full bg-red-500 w-0"></div></div>
        </div>
    </div>

    <div id="boss-hp-container" class="flex flex-col items-center">
        <p class="text-red-500 font-black italic mb-1 uppercase tracking-widest text-sm">Gigantic Chef Boss</p>
        <div class="w-full h-4 bg-slate-900 border-2 border-red-600 rounded-full overflow-hidden">
            <div id="boss-hp-fill" class="h-full bg-red-600 w-full transition-all"></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // CONFIG
    let score = 0, wave = 1, lives = 3, hp = 100, gameActive = true;
    let isBossWave = false;
    const gravity = 0.8, friction = 0.8, groundY = 350;
    const keys = {};

    // PLAYER
    const player = {
        x: 100, y: 310, w: 40, h: 40, dx: 0, dy: 0, 
        speed: 6, jump: 15, grounded: false,
        weapon: 'NORMAL', weaponTimer: 0, maxWeaponTimer: 300,
        draw() {
            ctx.fillStyle = this.weapon === 'NORMAL' ? "#fbbf24" : "#ef4444";
            ctx.beginPath(); ctx.roundRect(this.x, this.y, this.w, this.h, 8); ctx.fill();
            // Jengger & Paruh
            ctx.fillStyle = "#ff0000"; ctx.fillRect(this.x + 25, this.y - 6, 12, 12);
            ctx.fillStyle = "#f59e0b"; ctx.beginPath(); ctx.moveTo(this.x + 40, this.y + 15); ctx.lineTo(this.x + 50, this.y + 20); ctx.lineTo(this.x + 40, this.y + 25); ctx.fill();
        }
    };

    let enemies = [], bullets = [], eBullets = [], items = [], boss = null;

    // INPUT
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => { 
        keys[e.code] = false;
        if(e.code === 'KeyF' && gameActive) shoot();
        if(e.code === 'KeyF' && !gameActive) location.reload();
    };

    function shoot() {
        const bSpeed = 14;
        const bY = player.y + 20;
        if(player.weapon === 'NORMAL') bullets.push({x: player.x+40, y: bY, vx: bSpeed, vy: 0, type: 'NORMAL', r: 5});
        else if(player.weapon === 'LASER') bullets.push({x: player.x+40, y: bY, vx: 22, vy: 0, type: 'LASER', r: 3});
        else if(player.weapon === 'GRENADE') bullets.push({x: player.x+40, y: bY, vx: 8, vy: -10, type: 'GRENADE', r: 10});
        else if(player.weapon === 'SPREAD') {
            bullets.push({x: player.x+40, y: bY, vx: bSpeed, vy: -3, type: 'NORMAL', r: 5});
            bullets.push({x: player.x+40, y: bY, vx: bSpeed, vy: 0, type: 'NORMAL', r: 5});
            bullets.push({x: player.x+40, y: bY, vx: bSpeed, vy: 3, type: 'NORMAL', r: 5});
        }
    }

    function spawnNextWave() {
        if(wave % 5 === 0) {
            isBossWave = true;
            boss = { x: 850, y: 150, w: 120, h: 200, hp: 500 + (wave * 50), maxHp: 500 + (wave * 50), speed: 1.5, lastShot: 0 };
            document.getElementById('boss-hp-container').style.display = 'flex';
        } else {
            isBossWave = false;
            let count = 3 + wave;
            for(let i=0; i<count; i++) {
                enemies.push({ x: 900 + (i*200), y: groundY - 40, w: 40, h: 40, hp: 20 + (wave*5), speed: 2 + (wave*0.1), lastShot: 0 });
            }
        }
        // Random Item
        if(Math.random() > 0.4) {
            const types = ['LASER', 'GRENADE', 'SPREAD'];
            items.push({ x: 800, y: 200, w: 35, h: 35, type: types[Math.floor(Math.random()*3)] });
        }
    }

    function update() {
        if(!gameActive) return;

        // WASD Movement
        if(keys['KeyA'] || keys['ArrowLeft']) player.dx = -player.speed;
        if(keys['KeyD'] || keys['ArrowRight']) player.dx = player.speed;
        if((keys['KeyW'] || keys['Space'] || keys['ArrowUp']) && player.grounded) { player.dy = -player.jump; player.grounded = false; }

        player.x += player.dx; player.y += player.dy;
        player.dy += gravity; player.dx *= friction;

        // Ground/Wall Constraints
        if(player.y > groundY - player.h) { player.y = groundY - player.h; player.dy = 0; player.grounded = true; }
        if(player.x < 0) player.x = 0; if(player.x > canvas.width - player.w) player.x = canvas.width - player.w;

        // HUD Updates
        if(player.weaponTimer > 0) {
            player.weaponTimer--;
            document.getElementById('w-progress').style.width = (player.weaponTimer / player.maxWeaponTimer * 100) + "%";
            if(player.weaponTimer <= 0) { player.weapon = 'NORMAL'; document.getElementById('weapon-name').innerText = "Pistol Egg"; }
        }

        ctx.clearRect(0,0,800,400);
        ctx.fillStyle = "#334155"; ctx.fillRect(0, groundY, 800, 50); // Floor

        player.draw();

        // WAVE CHECK
        if(enemies.length === 0 && boss === null) {
            wave++;
            document.getElementById('wave-display').innerText = `WAVE ${wave}`;
            spawnNextWave();
        }

        // BOSS LOGIC
        if(boss) {
            if(boss.x > 600) boss.x -= boss.speed;
            ctx.fillStyle = "#f8fafc"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); // Boss Body
            ctx.fillStyle = "#ef4444"; ctx.fillRect(boss.x, boss.y, 20, 20); // Boss Eye
            
            if(Date.now() - boss.lastShot > 1500) {
                eBullets.push({x: boss.x, y: boss.y + 50, vx: -7, vy: 2}, {x: boss.x, y: boss.y + 100, vx: -7, vy: 0}, {x: boss.x, y: boss.y + 150, vx: -7, vy: -2});
                boss.lastShot = Date.now();
            }

            bullets.forEach((b, bi) => {
                if(checkCol(b, boss)) {
                    boss.hp -= (b.type === 'LASER' ? 5 : 15);
                    if(b.type !== 'LASER') bullets.splice(bi, 1);
                    document.getElementById('boss-hp-fill').style.width = (boss.hp / boss.maxHp * 100) + "%";
                    if(boss.hp <= 0) { boss = null; score += 1000; document.getElementById('boss-hp-container').style.display = 'none'; }
                }
            });
        }

        // ENEMIES LOGIC
        enemies.forEach((e, i) => {
            e.x -= e.speed;
            ctx.fillStyle = "#94a3b8"; ctx.fillRect(e.x, e.y, e.w, e.h);
            if(Date.now() - e.lastShot > 2500) { eBullets.push({x: e.x, y: e.y + 20, vx: -5, vy: 0}); e.lastShot = Date.now(); }

            bullets.forEach((b, bi) => {
                if(checkCol(b, e)) {
                    e.hp -= (b.type === 'LASER' ? 10 : 20);
                    if(b.type !== 'LASER') bullets.splice(bi, 1);
                    if(e.hp <= 0) { enemies.splice(i, 1); score += 150; document.getElementById('score').innerText = `SCORE: ${score}`; }
                }
            });

            if(checkCol(player, e)) { takeDamage(0.5); }
            if(e.x < -50) enemies.splice(i, 1); // Remove if out of screen
        });

        // BULLETS & ITEMS
        bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.type === 'GRENADE') b.vy += 0.5; ctx.fillStyle = b.type === 'LASER' ? "#22d3ee" : "#fff"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); if(b.x > 850 || b.y > groundY) bullets.splice(i, 1); });
        
        eBullets.forEach((eb, i) => { eb.x += eb.vx; eb.y += (eb.vy || 0); ctx.fillStyle = "#fbbf24"; ctx.fillRect(eb.x, eb.y, 10, 5); if(checkCol(eb, player)) { eBullets.splice(i, 1); takeDamage(20); } if(eb.x < -20) eBullets.splice(i, 1); });
        
        items.forEach((it, i) => { it.x -= 2; ctx.fillStyle = "#ef4444"; ctx.fillRect(it.x, it.y, it.w, it.h); ctx.fillStyle = "#fff"; ctx.font = "bold 16px Arial"; ctx.fillText(it.type[0], it.x+10, it.y+23); if(checkCol(player, it)) { player.weapon = it.type; player.weaponTimer = player.maxWeaponTimer; document.getElementById('weapon-name').innerText = it.type; items.splice(i, 1); } });

        requestAnimationFrame(update);
    }

    function checkCol(a, b) { return a.x < b.x + (b.w||b.r) && a.x + (a.w||a.r) > b.x && a.y < b.y + (b.h||b.r) && a.y + (a.h||a.r) > b.y; }

    function takeDamage(amt) {
        hp -= amt;
        document.getElementById('hp').style.width = hp + "%";
        if(hp <= 0) { lives--; hp = 100; updateLivesUI(); if(lives <= 0) gameOver(); }
    }

    function updateLivesUI() { let l = ""; for(let i=0; i<lives; i++) l += "❤️"; document.getElementById('lives').innerText = l; }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = "rgba(15, 23, 42, 0.9)"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "#ef4444"; ctx.font = "black 60px Plus Jakarta Sans"; ctx.textAlign = "center"; ctx.fillText("MODYAR!", 400, 200);
        ctx.fillStyle = "#fff"; ctx.font = "20px Plus Jakarta Sans"; ctx.fillText("Press F to Respawn", 400, 260);
    }

    spawnNextWave();
    update();
</script>
</body>
</html>
