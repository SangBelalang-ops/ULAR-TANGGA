<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER V10: THE PRO EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; color: white; z-index: 20; }
        #setup { position: absolute; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; pointer-events: auto; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #fff; border: 3px solid #00d4ff; border-radius: 12px; font-weight: bold; color: #000; transition: 0.3s; box-shadow: 0 0 15px rgba(0,212,255,0.3); }
        .btn:hover:not(:disabled) { transform: scale(1.05); background: #00d4ff; color: #fff; }
        .btn:disabled { background: #444; border-color: #222; cursor: not-allowed; color: #888; }
        #log { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; width: 260px; border-left: 5px solid #00d4ff; height: 160px; overflow-y: auto; font-size: 14px; }
        .status { position: absolute; top: 20px; right: 20px; font-size: 26px; font-weight: 900; color: #fbbf24; text-shadow: 2px 2px #000; }
        input { padding: 15px; width: 250px; margin: 15px; border-radius: 8px; border: none; font-size: 18px; text-align: center; background: #333; color: #fff; }
        #dice-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: #fff; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 80px; font-weight: 900; color: #000; box-shadow: 0 0 50px rgba(255,255,255,0.5); opacity: 0; transition: 0.3s; pointer-events: none; border: 4px solid #ddd; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff; font-size: 50px; margin-bottom: 0;">SQUAD LADDER V10</h1>
    <p style="color: #888; letter-spacing: 3px;">REAL-TIME DATABASE & POV CAMERA</p>
    <input type="text" id="playerName" placeholder="Nama SQUAD (Alvin/Tegar...)">
    <button class="btn" onclick="startGame()">MASUK SERVER</button>
</div>

<div id="ui">
    <div id="log"><b>GAME LOG:</b><br><span id="msg">Menghubungkan...</span></div>
    <div class="status" id="turnInfo">GILIRAN: ---</div>
    <div id="dice-box" id="diceDisplay">?</div>
    <div id="controls">
        <button id="rollBtn" class="btn" onclick="handleRoll()" disabled>KOCOK DADU! 🎲</button>
    </div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder/state');

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false, targetCamPos = new THREE.Vector3(0, 16, 14);
    let targetLookAt = new THREE.Vector3(0, 0, 0);

    const LADDERS = { 3: 22, 12: 40, 28: 55, 45: 70, 72: 91 };
    const SNAKES = { 25: 5, 52: 20, 65: 35, 88: 40, 98: 10 };

    window.startGame = () => {
        myName = document.getElementById('playerName').value.trim();
        if(!myName) return alert("Isi nama dulu bre!");
        document.getElementById('setup').style.display = 'none';
        initThree();
        syncFirebase();
    };

    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        createBoard();
        createUlarTanggaVisual();
        animate();
    }

    function createBoard() {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');

        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = row % 2 === 0 ? (i % 10) : (9 - (i % 10));
            
            // Texture Kayu Custom
            ctx.fillStyle = (row + col) % 2 === 0 ? '#5d4037' : '#4e342e';
            ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 50px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(i + 1, 64, 80);

            const tex = new THREE.CanvasTexture(canvas.cloneNode(true));
            const tile = new THREE.Mesh(
                new THREE.BoxGeometry(1.1, 0.2, 1.1),
                new THREE.MeshStandardMaterial({ map: tex })
            );
            tile.position.set(col * 1.2 - 5.4, 0, row * 1.2 - 5.4);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createUlarTanggaVisual() {
        // ULAR (Tube Merah)
        Object.entries(SNAKES).forEach(([s, e]) => {
            const curve = new THREE.QuadraticBezierCurve3(boardPos[s], new THREE.Vector3((boardPos[s].x+boardPos[e].x)/2, 2, (boardPos[s].z+boardPos[e].z)/2), boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.08, 8, false), new THREE.MeshStandardMaterial({color: 0xff0000})));
        });
        // TANGGA (Tube Hijau)
        Object.entries(LADDERS).forEach(([s, e]) => {
            const curve = new THREE.LineCurve3(boardPos[s], boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 2, 0.05, 8, false), new THREE.MeshStandardMaterial({color: 0x00ff00})));
        });
    }

    function syncFirebase() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, color: '#00d4ff', won: false}] });

            const serverP = data.players || [];
            let found = false;
            serverP.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
                if(!playerModels[idx]) createPlayerModel(idx, p);
                playerModels[idx].position.lerp(boardPos[p.pos].clone().add(new THREE.Vector3(0,0.6,0)), 0.1);
            });

            if(!found) {
                serverP.push({name: myName, pos: 0, color: '#'+Math.floor(Math.random()*16777215).toString(16), won: false});
                update(gameRef, { players: serverP });
            }

            const currentTurnP = serverP[data.turn];
            document.getElementById('turnInfo').innerText = `GILIRAN: ${currentTurnP.name}`;
            
            // LOGIKA PEMENANG: Jika giliran jatuh ke orang yang sudah menang, skip otomatis
            if(currentTurnP.won && data.turn === myId) {
                const next = (data.turn + 1) % serverP.length;
                update(gameRef, { turn: next });
            }

            // Button Aktif cuma buat yang belum menang & gilirannya
            const me = serverP[myId];
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving || me.won);
            if(me.won) document.getElementById('turnInfo').innerText = "ANDA SUDAH FINISH! 🎉";
        });
    }

    function createPlayerModel(id, data) {
        const g = new THREE.Group();
        g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: data.color})));
        const loader = new THREE.TextureLoader();
        const face = new THREE.Sprite(new THREE.SpriteMaterial({map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${data.name}`)}));
        face.position.y = 1; g.add(face);
        scene.add(g); playerModels[id] = g;
    }

    window.handleRoll = async () => {
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        
        // Show Dadu Putih
        const dice = document.getElementById('dice-box');
        dice.innerText = roll; dice.style.opacity = "1";
        setTimeout(() => dice.style.opacity = "0", 1200);

        const snap = await get(gameRef);
        const data = snap.val();
        let p = data.players[myId];
        let newPos = p.pos + roll;

        // POV Camera
        targetCamPos.set(playerModels[myId].position.x, 4, playerModels[myId].position.z + 4);
        targetLookAt.copy(playerModels[myId].position);

        setTimeout(() => {
            if(newPos >= 99) {
                newPos = 99; p.won = true;
                addLog("SELAMAT! Kamu Finish!");
            }
            if(LADDERS[newPos]) newPos = LADDERS[newPos];
            if(SNAKES[newPos]) newPos = SNAKES[newPos];

            const updated = data.players;
            updated[myId].pos = newPos;
            updated[myId].won = p.won;
            
            const nextTurn = (data.turn + 1) % updated.length;
            update(gameRef, { turn: nextTurn, players: updated });

            targetCamPos.set(0, 16, 14);
            targetLookAt.set(0, 0, 0);
            isMoving = false;
        }, 1500);
    };

    function addLog(m) { document.getElementById('msg').innerHTML = `> ${m}<br>` + document.getElementById('msg').innerHTML; }

    function animate() {
        requestAnimationFrame(animate);
        camera.position.lerp(targetCamPos, 0.05);
        camera.lookAt(targetLookAt);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
