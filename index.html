<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HORROR V2 - THE VOID</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; cursor: none; }
        #vignette { position: absolute; inset: 0; background: radial-gradient(circle, transparent 30%, black 100%); pointer-events: none; z-index: 5; }
        #static { position: absolute; inset: 0; background: url('https://media.giphy.com/media/oEI9uWUqnW3Fe/giphy.gif'); opacity: 0.05; pointer-events: none; z-index: 6; }
        #ui { position: absolute; bottom: 30px; left: 30px; color: #800; font-size: 18px; z-index: 10; letter-spacing: 2px; }
        #msg { position: absolute; top: 10%; width: 100%; text-align: center; color: #fff; font-size: 14px; opacity: 0; z-index: 10; }
        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; align-items: center; justify-content: center; }
        #jumpscare img { height: 100vh; filter: invert(1) contrast(2); }
    </style>
</head>
<body>

<div id="vignette"></div>
<div id="static"></div>
<div id="ui">
    BATTERY: [<span id="bat">||||||||||</span>] <span id="percent">100</span>%<br>
    HEART RATE: <span id="hr">72</span> BPM
</div>
<div id="msg">JANGAN BERHENTI BERJALAN...</div>
<div id="jumpscare"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=stare" id="scare-img"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, flashLight, player, clock, audioCtx;
    let keys = {}, battery = 100, isDead = false, hr = 72;
    let enemy, enemySpeed = 0.045;
    let walls = [];

    // --- SOUND ENGINE ---
    function playBeep(freq, vol, dur) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = freq;
        osc.type = 'sine';
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    window.onclick = () => {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('msg').style.opacity = 1;
        setTimeout(() => document.getElementById('msg').style.opacity = 0, 3000);
        init();
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 12);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        player = new THREE.Group();
        player.add(camera);
        player.position.set(0, 1.6, 10);
        scene.add(player);

        flashLight = new THREE.SpotLight(0xfff0dd, 8, 18, Math.PI/5, 0.6, 2);
        player.add(flashLight);
        player.add(flashLight.target);
        flashLight.target.position.set(0, 0, -5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        
        buildMaze();
        spawnStalker();
        animate();
    }

    function buildMaze() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 1 });
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floor = new THREE.Mesh(floorGeo, new THREE.MeshStandardMaterial({color: 0x020202}));
        floor.rotation.x = -Math.PI/2;
        scene.add(floor);

        // Grid Labirin
        for(let x=-20; x<20; x+=5) {
            for(let z=-20; z<20; z+=5) {
                if(Math.random() > 0.6) {
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(4, 5, 0.5), wallMat);
                    wall.position.set(x, 2.5, z);
                    scene.add(wall);
                    walls.push(wall);
                }
            }
        }
    }

    function spawnStalker() {
        const stalkerGeo = new THREE.CylinderGeometry(0.3, 0.5, 2.5, 8);
        const stalkerMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.9 });
        enemy = new THREE.Mesh(stalkerGeo, stalkerMat);
        enemy.position.set(20, 1.25, -20);
        scene.add(enemy);
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;

    function handlePlayer() {
        if(isDead) return;
        const delta = clock.getDelta();
        const moveSpeed = 4 * delta;
        const rotSpeed = 2 * delta;

        if(keys['ArrowUp'] || keys['KeyW']) player.translateZ(-moveSpeed);
        if(keys['ArrowDown'] || keys['KeyS']) player.translateZ(moveSpeed);
        if(keys['ArrowLeft'] || keys['KeyA']) player.translateX(-moveSpeed);
        if(keys['ArrowRight'] || keys['KeyD']) player.translateX(moveSpeed);
        if(keys['KeyQ']) player.rotation.y += rotSpeed;
        if(keys['KeyE']) player.rotation.y -= rotSpeed;

        // Battery Logic
        if(battery > 0) {
            battery -= 0.02;
            document.getElementById('percent').innerText = Math.floor(battery);
            document.getElementById('bat').innerText = "|".repeat(Math.floor(battery/10));
            // Flicker
            if(Math.random() > 0.99) flashLight.intensity = 0;
            else flashLight.intensity = 8;
        } else {
            flashLight.intensity = 0;
        }
    }

    function handleEnemy() {
        if(isDead || !enemy) return;
        
        const dist = player.position.distanceTo(enemy.position);
        
        // Heartbeat Sound Logic
        hr = 70 + Math.max(0, (15 - dist) * 15);
        document.getElementById('hr').innerText = Math.floor(hr);
        
        if(Math.random() * 100 < (hr/100) && dist < 12) {
            playBeep(60, 0.2, 0.1); // Low Heartbeat thump
        }

        // AI Movement
        const dir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
        enemy.position.add(dir.multiplyScalar(enemySpeed));
        
        if(dist < 1.5) triggerJumpscare();
    }

    function triggerJumpscare() {
        isDead = true;
        playBeep(100, 1, 2); // Static scream
        document.getElementById('jumpscare').style.display = 'flex';
        setTimeout(() => location.reload(), 4000);
    }

    function animate() {
        if(!isDead) requestAnimationFrame(animate);
        handlePlayer();
        handleEnemy();
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
