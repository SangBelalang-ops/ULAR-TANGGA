<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA | ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        
        #game-view { width: 100vw; height: 60vh; overflow: auto; position: relative; background: #0f172a; border-bottom: 2px solid #334155; scroll-behavior: smooth; }
        #board-container { position: relative; width: 900px; height: 900px; background: #1e293b; margin: 0 auto; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        
        .cell { border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; padding: 10px; font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.05); }
        .cell:nth-child(even) { background: rgba(255,255,255,0.01); }

        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .line-ladder { stroke: #22c55e; stroke-width: 12; stroke-linecap: round; opacity: 0.5; stroke-dasharray: 15; filter: drop-shadow(0 0 10px #22c55e); animation: pulse 2s infinite; }
        .line-snake { stroke: #ef4444; stroke-width: 12; stroke-linecap: round; opacity: 0.5; filter: drop-shadow(0 0 15px #ef4444); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.7; } }

        .pawn { width: 60px; height: 60px; position: absolute; z-index: 50; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); background-size: cover; background-position: center; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .pawn-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; white-space: nowrap; }

        .dice { width: 90px; height: 90px; background: #fff; color: #000; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer; box-shadow: 0 8px 0 #94a3b8; transition: transform 0.1s; }
        .dice:active { transform: translateY(4px); box-shadow: 0 4px 0 #94a3b8; }
        .dice-rolling { animation: roll 0.1s infinite; }
        @keyframes roll { 0% { transform: rotate(0); } 100% { transform: rotate(15deg); } }

        #chat-box::-webkit-scrollbar { width: 0px; }
        .msg { margin-bottom: 4px; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup-screen" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6 overflow-y-auto">
    <h1 class="text-7xl font-black italic text-yellow-500 mb-2 tracking-tighter drop-shadow-2xl">SNAKE <span class="text-white">MAGA</span></h1>
    <p class="text-[10px] text-slate-500 mb-8 tracking-[0.5em] font-bold uppercase">Ultimate Squad Edition</p>
    
    <div class="w-full max-w-sm space-y-4">
        <input id="room-input" type="text" placeholder="KODE ROOM" class="w-full bg-slate-900 p-5 rounded-2xl border border-slate-700 text-center font-black text-yellow-500 uppercase text-2xl outline-none focus:border-yellow-500 shadow-inner">
        
        <div id="name-selector" class="grid grid-cols-3 gap-2"></div>

        <div class="flex flex-col gap-3 pt-4">
            <button onclick="handleEntry('join')" class="w-full bg-yellow-600 py-5 rounded-2xl font-black uppercase tracking-widest text-white shadow-lg hover:scale-[1.02] active:scale-95 transition-all">MAIN SEKARANG</button>
            <div class="flex gap-2">
                <button onclick="handleEntry('spectate')" class="flex-1 bg-slate-800 py-4 rounded-xl font-black uppercase text-[10px] text-slate-400 border border-slate-700">Nonton Doang</button>
                <button onclick="handleEntry('create')" class="flex-1 bg-slate-800 py-4 rounded-xl font-black uppercase text-[10px] text-slate-400 border border-slate-700">Bikin Room</button>
            </div>
        </div>
    </div>
</div>

<!-- GAME UI -->
<div id="game-ui" class="hidden flex flex-col h-screen">
    <div class="bg-slate-950 p-4 flex justify-between items-center border-b border-white/10 shadow-2xl z-20">
        <div class="flex flex-col"><span class="text-slate-500 text-[9px] font-black italic">LAST WINNER</span><span id="last-winner" class="text-yellow-500 font-black uppercase tracking-tighter text-sm">-</span></div>
        <div class="text-white text-3xl font-black italic tracking-tighter">SNAKE MAGA</div>
        <div class="flex flex-col items-end"><span class="text-slate-500 text-[9px] font-black italic">MOST WINS</span><span id="most-winner" class="text-green-500 font-black uppercase tracking-tighter text-sm">-</span></div>
    </div>

    <div id="game-view">
        <div id="board-container">
            <svg id="svg-connections" class="svg-overlay"></svg>
            <div id="board"></div>
        </div>
    </div>

    <div class="bg-slate-900 p-4 flex gap-4 h-[32vh] border-t border-white/5">
        <div class="flex flex-col items-center justify-center gap-2 w-1/4">
            <div id="dice" class="dice" onclick="handleRoll()">🎲</div>
            <div id="status-text" class="text-[10px] font-black text-yellow-500 uppercase text-center mt-2 leading-tight">Menghubungkan...</div>
        </div>

        <div class="flex-1 flex flex-col bg-black/50 rounded-2xl border border-white/5 p-3">
            <div id="chat-box" class="flex-1 overflow-y-auto text-[11px] font-medium mb-3"></div>
            <div class="flex gap-2">
                <div class="flex gap-1">
                    <button onclick="sendEmote('😂')" class="bg-slate-800 w-8 h-8 rounded-lg flex items-center justify-center">😂</button>
                    <button onclick="sendEmote('🤡')" class="bg-slate-800 w-8 h-8 rounded-lg flex items-center justify-center">🤡</button>
                </div>
                <input id="chat-input" type="text" placeholder="Bacotin temen..." class="flex-1 bg-slate-800 rounded-lg px-3 text-xs outline-none border border-slate-700" onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="bg-blue-600 px-4 rounded-lg font-black text-[10px] uppercase">Kirim</button>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc",
        measurementId: "G-QQY0R81JJ6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    
    let myName = '', roomCode = '', isSpectator = false;

    // AUDIO CONTEXT FOR SFX
    const playSound = (freq, type = 'sine', duration = 0.1) => {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.connect(gain); gain.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + duration);
    };

    const selector = document.getElementById('name-selector');
    squad.forEach(n => {
        const b = document.createElement('button'); b.innerText = n;
        b.className = "name-btn bg-slate-800 border-2 border-slate-700 py-3 rounded-xl text-[10px] font-black uppercase transition-all";
        b.onclick = () => {
            document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('border-yellow-500', 'bg-yellow-600', 'text-white'));
            b.classList.add('border-yellow-500', 'bg-yellow-600', 'text-white');
            myName = n;
        };
        selector.appendChild(b);
    });

    function handleEntry(type) {
        roomCode = document.getElementById('room-input').value.toUpperCase();
        if (!roomCode) return alert("Isi Kode Room!");
        if (type !== 'spectate' && !myName) return alert("Pilih Nama Dulu!");

        if (type === 'spectate') { isSpectator = true; myName = "👀 Nonton"; startGame(); return; }

        const ref = db.ref('rooms/' + roomCode);
        ref.once('value', s => {
            let d = s.val();
            if (type === 'create' && !d) {
                ref.set({ players: [{ name: myName, pos: 1, img: `${myName.toLowerCase()}.png` }], turnIndex: 0, moving: false, lastRoll: 1 }).then(startGame);
            } else if (type === 'join' && d) {
                let pList = d.players || [];
                if (!pList.find(p => p.name === myName)) pList.push({ name: myName, pos: 1, img: `${myName.toLowerCase()}.png` });
                ref.update({ players: pList }).then(startGame);
            } else alert("Room Error!");
        });
    }

    function startGame() {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        initBoard(); drawConnections(); syncGame(); syncStats();
        if(isSpectator) document.getElementById('dice').style.opacity = "0.2";
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r = 9; r >= 0; r--) {
            for (let c = 0; c < 10; c++) {
                let num = (r % 2 === 0) ? (r * 10 + c + 1) : (r * 10 + (10 - c));
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `cell-${num}`; cell.innerHTML = `<span>${num}</span>`;
                b.appendChild(cell);
            }
        }
    }

    function drawConnections() {
        const svg = document.getElementById('svg-connections'); svg.innerHTML = '';
        setTimeout(() => {
            Object.keys(jumps).forEach(sKey => {
                const start = parseInt(sKey); const end = jumps[start];
                const sEl = document.getElementById(`cell-${start}`).getBoundingClientRect();
                const eEl = document.getElementById(`cell-${end}`).getBoundingClientRect();
                const bRect = document.getElementById('board-container').getBoundingClientRect();
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", sEl.left - bRect.left + sEl.width/2);
                line.setAttribute("y1", sEl.top - bRect.top + sEl.height/2);
                line.setAttribute("x2", eEl.left - bRect.left + eEl.width/2);
                line.setAttribute("y2", eEl.top - bRect.top + eEl.height/2);
                line.setAttribute("class", end > start ? "line-ladder" : "line-snake");
                svg.appendChild(line);
            });
        }, 1000);
    }

    function syncGame() {
        db.ref('rooms/' + roomCode).on('value', s => {
            const data = s.val(); if (!data) return;
            const players = data.players; const turnP = players[data.turnIndex];
            document.getElementById('status-text').innerText = turnP.name === myName ? "GILIRAN LO!" : turnP.name.toUpperCase() + " JALAN";
            document.getElementById('dice').innerHTML = ['🎲','⚀','⚁','⚂','⚃','⚄','⚅'][data.lastRoll || 0];
            
            document.querySelectorAll('.pawn').forEach(p => p.remove());
            players.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect(); const bRect = document.getElementById('board-container').getBoundingClientRect();
                const pawn = document.createElement('div'); pawn.className = 'pawn';
                pawn.style.backgroundImage = `url('${p.img}')`;
                pawn.style.left = `${(rect.left - bRect.left) + (i * 6)}px`; pawn.style.top = `${(rect.top - bRect.top) + (i * 6)}px`;
                pawn.innerHTML = `<div class="pawn-label">${p.name}</div>`;
                document.getElementById('board-container').appendChild(pawn);
                if (p.name === turnP.name) pawn.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
            });
        });
        
        db.ref('chats/' + roomCode).limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(child => {
                const m = child.val();
                box.innerHTML += `<div class="msg"><span class="text-yellow-500 font-black uppercase text-[9px] mr-1">${m.user}:</span><span class="text-slate-200">${m.text}</span></div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function syncStats() {
        db.ref('stats/lastWinner').on('value', s => document.getElementById('last-winner').innerText = s.val() || '-');
        db.ref('stats/mostWins').on('value', s => {
            const wins = s.val() || {};
            let top = Object.entries(wins).sort((a,b) => b[1]-a[1])[0];
            document.getElementById('most-winner').innerText = top ? `${top[0]} (${top[1]}X)` : '-';
        });
    }

    async function handleRoll() {
        if (isSpectator) return;
        const snap = await db.ref('rooms/' + roomCode).get();
        const data = snap.val();
        if (data.players[data.turnIndex].name !== myName || data.moving) return;
        
        playSound(440, 'square');
        const roll = Math.floor(Math.random() * 6) + 1;
        db.ref('rooms/' + roomCode).update({ moving: true, lastRoll: roll });
        document.getElementById('dice').classList.add('dice-rolling');
        
        setTimeout(async () => {
            document.getElementById('dice').classList.remove('dice-rolling');
            let pList = data.players; let p = pList[data.turnIndex];
            for (let i = p.pos + 1; i <= Math.min(p.pos + roll, 100); i++) {
                p.pos = i; db.ref('rooms/' + roomCode).update({ players: pList });
                playSound(660, 'sine', 0.05);
                await new Promise(r => setTimeout(r, 200));
            }
            if (jumps[p.pos]) { 
                await new Promise(r => setTimeout(r, 500)); 
                p.pos = jumps[p.pos]; 
                playSound(p.pos > p.pos ? 880 : 220, 'sawtooth', 0.2);
                db.ref('rooms/' + roomCode).update({ players: pList }); 
            }
            if (p.pos === 100) {
                confetti(); playSound(523, 'sine', 0.5);
                db.ref('stats/lastWinner').set(p.name);
                db.ref('stats/mostWins/' + p.name).transaction(curr => (curr || 0) + 1);
                db.ref('rooms/' + roomCode).remove(); location.reload();
            } else db.ref('rooms/' + roomCode).update({ turnIndex: (data.turnIndex + 1) % pList.length, moving: false });
        }, 800);
    }

    function sendMessage() {
        const inp = document.getElementById('chat-input'); if (!inp.value) return;
        db.ref('chats/' + roomCode).push({ user: myName, text: inp.value }); inp.value = '';
    }
    function sendEmote(e) { db.ref('chats/' + roomCode).push({ user: myName, text: e }); }
</script>
</body>
</html>
