<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA SQUAD | ULTIMATE 2D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center;}
        
        #game-ui { display: none; width: 100vw; height: 100vh; flex-direction: row; padding: 20px; gap: 20px; }
        #board-section { flex: 1; position: relative; background: #0f172a; border-radius: 20px; border: 4px solid #334155; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #control-section { width: 300px; display: flex; flex-direction: column; gap: 15px; }

        #board-container { position: relative; width: 100%; height: 100%; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        
        .cell { border: 1px solid rgba(255,255,255,0.02); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 800; color: #1e293b; position: relative; }
        .cell:nth-child(even) { background: rgba(255,255,255,0.01); }
        .cell span { opacity: 0.2; }

        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* TANGGA KAYU SOLID (YANG LO SUKA) */
        .ladder-group path { stroke: #78350f; stroke-width: 10; fill: none; stroke-linecap: round; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .ladder-group line { stroke: #b45309; stroke-width: 4; stroke-linecap: round; }

        /* ULAR 2D BERDAGING (RED SNAKE) */
        .snake-body-base { stroke: #7f1d1d; stroke-width: 16; fill: none; stroke-linecap: round; stroke-linejoin: round; filter: drop-shadow(0 0 8px rgba(0,0,0,0.5)); }
        .snake-body-top { stroke: #ef4444; stroke-width: 6; fill: none; stroke-linecap: round; stroke-dasharray: 12, 8; }
        .snake-head-circle { fill: #b91c1c; filter: drop-shadow(0 0 5px #ef4444); }

        /* PION SQUAD */
        .pawn { width: 55px; height: 55px; position: absolute; z-index: 50; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); background-size: cover; background-position: center; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .pawn-label { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); background: #fbbf24; color: #000; font-size: 9px; padding: 1px 5px; border-radius: 4px; font-weight: 900; white-space: nowrap; }

        /* DADU PUTIH BERSIH */
        .dice-view { width: 90px; height: 90px; perspective: 1000px; margin: 10px 0; cursor: pointer; }
        .cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s ease-out; }
        .cube-face { position: absolute; width: 90px; height: 90px; background: #fff; border: 3px solid #cbd5e1; border-radius: 12px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; padding: 10px; }
        .dot { background: #000; border-radius: 50%; width: 15px; height: 15px; align-self: center; justify-self: center; visibility: hidden; }
        .dot.show { visibility: visible; }
        .cube-rolling { animation: roll-3d 0.1s infinite linear; }
        @keyframes roll-3d { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(360deg); } }
        
        /* POSISI SISI DADU */
        .front { transform: rotateY(0deg) translateZ(45px); } .back { transform: rotateY(180deg) translateZ(45px); }
        .right { transform: rotateY(90deg) translateZ(45px); } .left { transform: rotateY(-90deg) translateZ(45px); }
        .top { transform: rotateX(90deg) translateZ(45px); } .bottom { transform: rotateX(-90deg) translateZ(45px); }

        #chat-box { flex: 1; overflow-y: auto; font-size: 12px; color: #cbd5e1; }
        #chat-box::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body>

<div id="setup-screen" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6">
    <h1 class="text-6xl font-black text-yellow-500 mb-6 italic tracking-tighter">SNAKE <span class="text-white">MAGA</span></h1>
    <div class="w-full max-w-sm space-y-4">
        <input id="room-input" type="text" placeholder="KODE ROOM" class="w-full bg-slate-900 p-4 rounded-2xl border-2 border-slate-700 text-center font-black text-yellow-500 uppercase text-2xl outline-none">
        <div id="name-selector" class="grid grid-cols-3 gap-2"></div>
        <button onclick="handleEntry()" class="w-full bg-yellow-600 py-5 rounded-2xl font-black uppercase text-white shadow-xl">START GAME</button>
    </div>
</div>

<div id="game-ui">
    <div id="board-section">
        <div id="board-container">
            <svg id="svg-connections" class="svg-overlay"></svg>
            <div id="board"></div>
        </div>
    </div>

    <div id="control-section">
        <div class="bg-slate-900 p-4 rounded-2xl border border-white/5">
            <p id="status-text" class="text-xs font-black text-yellow-500 uppercase text-center">Menunggu Giliran...</p>
        </div>

        <div class="bg-slate-900 p-5 rounded-2xl border border-white/5 flex flex-col items-center">
            <div class="dice-view" onclick="handleRoll()">
                <div id="cube" class="cube">
                    <div class="cube-face front"><div class="dot show" style="grid-area: 2/2"></div></div>
                    <div class="cube-face back"><div class="dot show"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                    <div class="cube-face right"><div class="dot show"></div><div class="dot show" style="grid-area: 2/2"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                    <div class="cube-face left"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                    <div class="cube-face top"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 2/2"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                    <div class="cube-face bottom"><div class="dot show"></div><div class="dot show" style="grid-area: 1/3"></div><div class="dot show" style="grid-area: 2/1"></div><div class="dot show" style="grid-area: 2/3"></div><div class="dot show" style="grid-area: 3/1"></div><div class="dot show" style="grid-area: 3/3"></div></div>
                </div>
            </div>
        </div>

        <div class="flex-1 bg-slate-900 p-4 rounded-2xl border border-white/5 flex flex-col overflow-hidden">
            <div id="chat-box"></div>
            <input id="chat-input" type="text" placeholder="Ketik bacotan..." class="w-full bg-slate-800 rounded-lg px-3 py-2 text-xs outline-none" onkeypress="if(event.key==='Enter') sendMessage()">
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    
    let myName = '', roomCode = '';

    const selector = document.getElementById('name-selector');
    squad.forEach(n => {
        const b = document.createElement('button'); b.innerText = n;
        b.className = "name-btn bg-slate-800 border-2 border-slate-700 p-3 rounded-xl text-[10px] font-black uppercase";
        b.onclick = () => {
            document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('border-yellow-500', 'bg-yellow-900'));
            b.classList.add('border-yellow-500', 'bg-yellow-900');
            myName = n;
        };
        selector.appendChild(b);
    });

    function handleEntry() {
        roomCode = document.getElementById('room-input').value.toUpperCase() || 'SQUAD';
        if (!myName) return alert("Pilih Karakter!");
        db.ref('rooms/'+roomCode).once('value', s => {
            let d = s.val();
            if(!d) {
                db.ref('rooms/'+roomCode).set({ players: [{name:myName, pos:1, img: `${myName.toLowerCase()}.png`, finished:false}], turnIndex:0, moving:false, lastRoll:1 }).then(startGame);
            } else {
                let pList = d.players || [];
                if(!pList.find(p=>p.name===myName)) {
                    pList.push({name:myName, pos:1, img: `${myName.toLowerCase()}.png`, finished:false});
                    db.ref('rooms/'+roomCode).update({players:pList}).then(startGame);
                } else { startGame(); }
            }
        });
    }

    function startGame() {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-ui').style.display = 'flex';
        initBoard(); syncGame();
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r=9; r>=0; r--) {
            for (let c=0; c<10; c++) {
                let num = (r%2===0) ? (r*10+c+1) : (r*10+(10-c));
                const cell = document.createElement('div');
                cell.className = 'cell'; cell.id = `cell-${num}`; cell.innerHTML = `<span>${num}</span>`;
                b.appendChild(cell);
            }
        }
        setTimeout(drawConnections, 600);
    }

    // FUNGSI VISUAL BARU: ULAR 2D BERDAGING
    function drawConnections() {
        const svg = document.getElementById('svg-connections'); svg.innerHTML = '';
        const bRect = document.getElementById('board-container').getBoundingClientRect();

        Object.keys(jumps).forEach(k => {
            const start = parseInt(k); const end = jumps[k];
            const sEl = document.getElementById(`cell-${start}`).getBoundingClientRect();
            const eEl = document.getElementById(`cell-${end}`).getBoundingClientRect();
            const x1 = sEl.left - bRect.left + sEl.width/2; const y1 = sEl.top - bRect.top + sEl.height/2;
            const x2 = eEl.left - bRect.left + eEl.width/2; const y2 = eEl.top - bRect.top + eEl.height/2;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");

            if (end > start) {
                // TANGGA KAYU SOLID (DOUBLE RAIL)
                g.setAttribute("class", "ladder-group");
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M${x1-12},${y1} L${x2-12},${y2} M${x1+12},${y1} L${x2+12},${y2}`);
                g.appendChild(path);
                for(let i=1; i<6; i++){
                    const lx = x1+(x2-x1)*(i/6); const ly = y1+(y2-y1)*(i/6);
                    const ln = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    ln.setAttribute("x1", lx-18); ln.setAttribute("y1", ly); ln.setAttribute("x2", lx+18); ln.setAttribute("y2", ly); g.appendChild(ln);
                }
            } else {
                // ULAR 2D SOLID BODY
                const midX = (x1 + x2) / 2 + (x1 > x2 ? 40 : -40); const midY = (y1 + y2) / 2;
                
                // Lapisan Bawah (Badan Merah Tua)
                const bodyBase = document.createElementNS("http://www.w3.org/2000/svg", "path");
                bodyBase.setAttribute("d", `M${x1},${y1} Q${midX},${midY} ${x2},${y2}`);
                bodyBase.setAttribute("class", "snake-body-base");
                g.appendChild(bodyBase);

                // Lapisan Atas (Corak Sisik)
                const bodyTop = document.createElementNS("http://www.w3.org/2000/svg", "path");
                bodyTop.setAttribute("d", `M${x1},${y1} Q${midX},${midY} ${x2},${y2}`);
                bodyTop.setAttribute("class", "snake-body-top");
                g.appendChild(bodyTop);

                // Kepala Ular (2D Oval)
                const head = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                head.setAttribute("cx", x1); head.setAttribute("cy", y1);
                head.setAttribute("rx", "12"); head.setAttribute("ry", "15");
                head.setAttribute("class", "snake-head-circle");
                const angle = Math.atan2(y1-y2, x1-x2) * 180 / Math.PI;
                head.setAttribute("transform", `rotate(${angle}, ${x1}, ${y1})`);
                g.appendChild(head);

                // Mata Kuning
                const eye = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                eye.setAttribute("cx", x1); eye.setAttribute("cy", y1);
                eye.setAttribute("r", "3"); eye.setAttribute("fill", "yellow");
                g.appendChild(eye);
            }
            svg.appendChild(g);
        });
    }

    function rotateCube(n) {
        const cube = document.getElementById('cube');
        const rots = { 1:'rotateX(0deg) rotateY(0deg)', 2:'rotateX(0deg) rotateY(-180deg)', 3:'rotateX(0deg) rotateY(-90deg)', 4:'rotateX(0deg) rotateY(90deg)', 5:'rotateX(-90deg) rotateY(0deg)', 6:'rotateX(90deg) rotateY(0deg)' };
        cube.style.transform = rots[n] || rots[1];
    }

    function syncGame() {
        window.addEventListener('resize', drawConnections);
        db.ref('rooms/'+roomCode).on('value', s => {
            const d = s.val(); if(!d) return;
            const turnP = d.players[d.turnIndex];
            document.getElementById('status-text').innerText = turnP.name === myName ? "GILIRAN LO!" : turnP.name.toUpperCase() + " JALAN";
            rotateCube(d.lastRoll || 1);

            document.querySelectorAll('.pawn').forEach(p => p.remove());
            d.players.forEach((p, i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect(); const br = document.getElementById('board-container').getBoundingClientRect();
                const div = document.createElement('div'); div.className = 'pawn';
                div.style.backgroundImage = `url('${p.img}')`;
                div.style.left = `${(rect.left - br.left) + (i*6)}px`; div.style.top = `${(rect.top - br.top) + (i*6)}px`;
                div.innerHTML = `<div class="pawn-label">${p.name}</div>`;
                document.getElementById('board-container').appendChild(div);
                if(p.name === turnP.name && p.name === myName) div.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        });
        db.ref('chats/'+roomCode).limitToLast(15).on('value', s => {
            const box = document.getElementById('chat-box'); box.innerHTML = '';
            s.forEach(c => { box.innerHTML += `<div><b class="text-yellow-500">${c.val().user}:</b> ${c.val().text}</div>`; });
            box.scrollTop = box.scrollHeight;
        });
    }

    async function handleRoll() {
        const snap = await db.ref('rooms/'+roomCode).get(); const data = snap.val();
        if(!data || data.players[data.turnIndex].name !== myName || data.moving) return;

        const roll = Math.floor(Math.random()*6)+1;
        db.ref('rooms/'+roomCode).update({moving:true, lastRoll:roll});
        document.getElementById('cube').classList.add('cube-rolling');

        setTimeout(async () => {
            document.getElementById('cube').classList.remove('cube-rolling');
            rotateCube(roll);
            let pList = [...data.players]; let p = pList[data.turnIndex];
            let target = Math.min(p.pos + roll, 100);

            for(let i=p.pos+1; i<=target; i++) {
                p.pos = i;
                await db.ref('rooms/'+roomCode+'/players').set(pList);
                await new Promise(r => setTimeout(r, 220));
            }
            if(jumps[p.pos]) {
                await new Promise(r => setTimeout(r, 600));
                p.pos = jumps[p.pos];
                await db.ref('rooms/'+roomCode+'/players').set(pList);
            }
            if(p.pos === 100) { confetti(); alert(p.name + " MENANG!"); }

            let next = (data.turnIndex + 1) % pList.length;
            db.ref('rooms/'+roomCode).update({turnIndex:next, moving:false});
        }, 1200);
    }

    function sendMessage() {
        const i = document.getElementById('chat-input'); if(!i.value) return;
        db.ref('chats/'+roomCode).push({user:myName, text:i.value}); i.value = '';
    }
</script>
</body>
</html>
