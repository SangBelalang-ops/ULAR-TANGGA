<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HORROR V10 - BUG FIXED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 100; color: #f00; padding: 20px; font-weight: bold; }
        .bar { width: 200px; height: 10px; background: #222; border: 1px solid #444; margin: 5px 0; }
        #stam-bar { width: 100%; height: 100%; background: #0f0; transition: 0.1s; }
        #msg { position: absolute; top: 40%; width: 100%; text-align: center; color: white; font-size: 20px; z-index: 100; }
        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; align-items: center; justify-content: center; color: red; font-size: 50px; font-weight: 900; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } }
    </style>
</head>
<body>

<div id="hud">
    DATA COLLECTED: <span id="dc">0</span>/5<br>
    STAMINA: <div class="bar"><div id="stam-bar"></div></div>
    BATTERY: <span id="bat">100</span>%<br>
    BPM: <span id="bpm">72</span>
</div>

<div id="msg">KLIK LAYAR UNTUK START (STABILIZED)</div>
<div id="jumpscare">ERROR: SYSTEM BREACHED</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, clock, player, flashLight, audioCtx;
    let yaw = new THREE.Object3D(), pitch = new THREE.Object3D();
    let keys = {}, items = [], wallBoxes = [];
    let battery = 100, stamina = 100, dataFound = 0, isDead = false;
    let enemy, enemyActive = false, canToggle = true;

    // --- START ENGINE ---
    window.onclick = () => {
        if(!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('msg').style.display = 'none';
            init();
        }
        document.body.requestPointerLock();
    };

    function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        player = new THREE.Group();
        player.position.set(0, 1.6, 20);
        scene.add(player);
        player.add(yaw); yaw.add(pitch); pitch.add(camera);

        // Flashlight (Stronger Beam)
        flashLight = new THREE.SpotLight(0xffffff, 0, 20, Math.PI/6, 0.5, 1);
        pitch.add(flashLight);
        flashLight.target.position.set(0, 0, -1);
        pitch.add(flashLight.target);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        clock = new THREE.Clock();
        
        // --- FIX: BETTER COLLISION BOXES ---
        buildMaze();
        spawnData();
        spawnStalker();

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body && !isDead) {
                yaw.rotation.y -= e.movementX * 0.002;
                pitch.rotation.x -= e.movementY * 0.002;
                pitch.rotation.x = Math.max(-1.4, Math.min(1.4, pitch.rotation.x));
            }
        });

        animate();
    }

    function buildMaze() {
        // Lantai
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x050505}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);
        scene.add(new THREE.AmbientLight(0xffffff, 0.02));

        const wallGeo = new THREE.BoxGeometry(4, 5, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x111111 });

        for(let i=0; i<45; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            const rx = Math.floor(Math.random()*40-20);
            const rz = Math.floor(Math.random()*40-20);
            
            // JANGAN SPAWN DEKET PLAYER (Fix Bug Awal Mati)
            if(Math.abs(rx) < 5 && Math.abs(rz - 20) < 5) continue;

            wall.position.set(rx, 2.5, rz);
            scene.add(wall);
            // Simpan box collision
            const box = new THREE.Box3().setFromObject(wall);
            wallBoxes.push(box);
        }
    }

    // --- FIX: PERGERAKAN ANTI-TEMBUS ---
    function movePlayer(dir) {
        const nextPos = player.position.clone().add(dir);
        const playerBox = new THREE.Box3().setFromCenterAndSize(
            nextPos, new THREE.Vector3(0.7, 1.8, 0.7)
        );

        let collision = false;
        for(let box of wallBoxes) {
            if(playerBox.intersectsBox(box)) {
                collision = true; break;
            }
        }
        if(!collision) player.position.copy(nextPos);
    }

    function spawnData() {
        const geo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
        const mat = new THREE.MeshBasicMaterial({ color: 0x00d4ff });
        for(let i=0; i<5; i++) {
            const p = new THREE.Mesh(geo, mat);
            p.position.set(Math.random()*30-15, 1, Math.random()*30-15);
            scene.add(p);
            items.push(p);
        }
    }

    function spawnStalker() {
        enemy = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 3), new THREE.MeshBasicMaterial({color: 0x000000}));
        enemy.position.set(-20, 1.5, -20);
        scene.add(enemy);
        setTimeout(() => enemyActive = true, 5000);
    }

    function update() {
        if(isDead) return;
        const delta = clock.getDelta();

        // Stamina & Speed logic
        const sprinting = keys['ShiftLeft'] && stamina > 0 && keys['KeyW'];
        const speed = sprinting ? 0.2 : 0.08;
        if(sprinting) stamina -= 0.6; else stamina = Math.min(100, stamina + 0.2);
        document.getElementById('stam-bar').style.width = stamina + "%";

        const dir = new THREE.Vector3();
        if(keys['KeyW']) dir.z -= 1; if(keys['KeyS']) dir.z += 1;
        if(keys['KeyA']) dir.x -= 1; if(keys['KeyD']) dir.x += 1;

        if(dir.length() > 0) {
            dir.normalize().applyQuaternion(yaw.quaternion).multiplyScalar(speed);
            movePlayer(dir);
        }

        // FIX: Toggle Flashlight 'E' Anti-Double Click
        if(keys['KeyE']) {
            if(canToggle) {
                const on = flashLight.intensity > 0;
                flashLight.intensity = on ? 0 : 15;
                canToggle = false;
                setTimeout(() => canToggle = true, 300); // Cooldown 300ms
            }
        }

        if(flashLight.intensity > 0) {
            battery -= 0.01;
            document.getElementById('bat').innerText = Math.floor(battery);
            if(battery <= 0) flashLight.intensity = 0;
        }

        // Ambil Item
        items.forEach((it, i) => {
            it.rotation.y += 0.05;
            if(player.position.distanceTo(it.position) < 1.5) {
                scene.remove(it); items.splice(i, 1);
                dataFound++; document.getElementById('dc').innerText = dataFound;
            }
        });

        // Enemy AI
        if(enemyActive) {
            const dist = player.position.distanceTo(enemy.position);
            const eDir = new THREE.Vector3().subVectors(player.position, enemy.position).normalize();
            enemy.position.add(eDir.multiplyScalar(0.04));
            document.getElementById('bpm').innerText = Math.floor(70 + (10/dist)*30);
            if(dist < 1.3) {
                isDead = true;
                document.getElementById('jumpscare').style.display = 'flex';
                setTimeout(() => location.reload(), 3000);
            }
        }
    }

    function animate() {
        if(!isDead) requestAnimationFrame(animate);
        update();
        renderer.render(scene, camera);
    }

    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => keys[e.code] = false;
</script>
</body>
</html>
