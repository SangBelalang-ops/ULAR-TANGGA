<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAUST PURE-PHYSICS PIANO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        .studio-header { background: #0f172a; padding: 20px 40px; border-bottom: 2px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .piano-outer { flex: 1; overflow-x: auto; display: flex; align-items: center; padding: 20px; }
        .piano-body { display: flex; position: relative; height: 320px; margin: 0 auto; background: #000; padding: 5px; border-radius: 12px; border-top: 20px solid #1e293b; box-shadow: 0 40px 80px rgba(0,0,0,0.8); }
        .key { cursor: pointer; user-select: none; position: relative; transition: all 0.05s; }
        .white-key { width: 50px; height: 300px; background: linear-gradient(to bottom, #fff 0%, #cbd5e1 100%); border: 1px solid #94a3b8; border-radius: 0 0 8px 8px; z-index: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; }
        .white-key.active { background: #fbbf24 !important; transform: translateY(6px); }
        .black-key { width: 32px; height: 180px; background: linear-gradient(to bottom, #334155 0%, #000 100%); border-radius: 0 0 5px 5px; z-index: 2; margin-left: -16px; margin-right: -16px; border: 1px solid #000; }
        .black-key.active { background: #f59e0b !important; transform: translateY(4px); }
        .key-label { position: absolute; bottom: 35px; font-size: 11px; color: #f59e0b; font-weight: 900; z-index: 10; pointer-events: none; }
        .sustain-btn { background: #1e293b; padding: 10px 25px; border-radius: 10px; font-size: 14px; font-weight: 800; border: 2px solid #334155; }
        .sustain-btn.active { background: #f59e0b; color: #000; border-color: #fbbf24; box-shadow: 0 0 20px rgba(245,158,11,0.5); }
    </style>
</head>
<body>

<div class="studio-header">
    <div>
        <h1 class="text-3xl font-black italic text-white tracking-tighter">FLAUST <span class="text-yellow-500 underline">PHYSICS</span></h1>
        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">No-Latency Engine // 88 Keys Hybrid</p>
    </div>
    <button id="sus-btn" class="sustain-btn" onclick="toggleSustain()">SUSTAIN OFF</button>
</div>

<div class="piano-outer">
    <div class="piano-body" id="piano"></div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const mainGain = audioCtx.createGain();
    mainGain.connect(audioCtx.destination);
    mainGain.gain.value = 0.5;

    // Mapping Keyboard Lengkap
    const keyMap = {
        '1':'C5', '2':'C#5', '3':'D5', '4':'D#5', '5':'E5', '6':'F5', '7':'F#5', '8':'G5', '9':'G#5', '0':'A5',
        'Q':'C4', 'W':'C#4', 'E':'D4', 'R':'D#4', 'T':'E4', 'Y':'F4', 'U':'F#4', 'I':'G4', 'O':'G#4', 'P':'A4',
        'A':'C3', 'S':'C#3', 'D':'D3', 'F':'D#3', 'G':'E3', 'H':'F3', 'J':'F#3', 'K':'G3', 'L':'G#3',
        'Z':'C2', 'X':'C#2', 'C':'D2', 'V':'D#2', 'B':'E2', 'N':'F2', 'M':'F#2'
    };

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    let sustain = false;
    let activeOscs = {};

    // Build Piano
    const piano = document.getElementById('piano');
    for (let i = 0; i < 88; i++) {
        const nIdx = (i + 9) % 12;
        const oct = Math.floor((i + 9) / 12);
        const name = notes[nIdx] + oct;
        const isBlack = notes[nIdx].includes('#');

        const keyDiv = document.createElement('div');
        keyDiv.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
        keyDiv.id = `note-${name}`;
        
        for (let char in keyMap) {
            if (keyMap[char] === name) {
                const label = document.createElement('div');
                label.className = 'key-label';
                label.innerText = char;
                keyDiv.appendChild(label);
            }
        }
        
        keyDiv.onmousedown = () => play(name);
        keyDiv.onmouseup = () => stop(name);
        piano.appendChild(keyDiv);
    }

    function getFreq(note) {
        const name = note.slice(0, -1);
        const oct = parseInt(note.slice(-1));
        const idx = notes.indexOf(name);
        return 440 * Math.pow(2, (idx - 9 + (oct - 4) * 12) / 12);
    }

    function play(n) {
        if (activeOscs[n]) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const freq = getFreq(n);
        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        // Hybrid Sound Modeling (Campuran Triangle & Sine biar suara piano tebel)
        osc.type = 'triangle'; 
        osc2.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc2.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc2.detune.setValueAtTime(2, audioCtx.currentTime); // Efek resonansi kayu

        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.01); // Attack instan
        
        // Peluruhan suara alami
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);

        osc.connect(g);
        osc2.connect(g);
        g.connect(mainGain);

        osc.start();
        osc2.start();

        activeOscs[n] = { osc, osc2, g };
        const el = document.getElementById(`note-${n}`);
        if(el) el.classList.add('active');
    }

    function stop(n) {
        if (!activeOscs[n] || sustain) return;
        const { osc, osc2, g } = activeOscs[n];
        const now = audioCtx.currentTime;
        g.gain.cancelScheduledValues(now);
        g.gain.setValueAtTime(g.gain.value, now);
        g.gain.exponentialRampToValueAtTime(0.0001, now + 0.1);
        
        setTimeout(() => {
            osc.stop();
            osc2.stop();
            delete activeOscs[n];
        }, 100);

        const el = document.getElementById(`note-${n}`);
        if(el) el.classList.remove('active');
    }

    function toggleSustain() {
        sustain = !sustain;
        const btn = document.getElementById('sus-btn');
        btn.innerText = sustain ? "SUSTAIN ON" : "SUSTAIN OFF";
        btn.classList.toggle('active');
        if (!sustain) {
            Object.keys(activeOscs).forEach(n => stop(n));
        }
    }

    window.addEventListener('keydown', (e) => {
        const char = e.key.toUpperCase();
        if (e.code === 'Space') { e.preventDefault(); toggleSustain(); return; }
        const note = keyMap[char];
        if (note) play(note);
    });

    window.addEventListener('keyup', (e) => {
        const char = e.key.toUpperCase();
        const note = keyMap[char];
        if (note) stop(note);
    });
</script>
</body>
</html>
