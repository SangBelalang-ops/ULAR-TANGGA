<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NEON RAIDER: CYBER-SURGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #000; border: 2px solid #06b6d4; box-shadow: 0 0 30px #06b6d444; cursor: none; }
        .ui { position: absolute; pointer-events: none; color: #fff; width: 800px; height: 500px; }
        .bar { height: 6px; background: #1e293b; border-radius: 3px; overflow: hidden; border: 1px solid #334155; }
        .glow-text { text-shadow: 0 0 10px #06b6d4; }
        #level-up { display: none; background: rgba(0,0,0,0.9); position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; pointer-events: all; }
    </style>
</head>
<body>

    <div class="ui p-6 flex flex-col justify-between">
        <div class="flex justify-between items-start">
            <div class="w-48">
                <p class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest mb-1">Integrity</p>
                <div class="bar"><div id="hp-fill" class="h-full bg-cyan-500 w-full shadow-[0_0_10px_#06b6d4]"></div></div>
                <p class="text-[10px] text-fuchsia-400 font-bold uppercase tracking-widest mt-3 mb-1">Energy Core</p>
                <div class="bar"><div id="energy-fill" class="h-full bg-fuchsia-500 w-full shadow-[0_0_10px_#d946ef]"></div></div>
            </div>
            <div class="text-right">
                <h1 class="text-2xl font-black italic glow-text">CYBER-SURGE</h1>
                <p id="score-val" class="text-cyan-400 text-sm">DATA: 000000</p>
            </div>
        </div>
        
        <div id="level-up" class="z-50 border-2 border-cyan-500 rounded-lg m-20">
            <h2 class="text-2xl font-black mb-6 text-cyan-400">UPGRADE DETECTED</h2>
            <div class="flex gap-4">
                <button onclick="applyUpgrade('speed')" class="bg-cyan-900/50 border border-cyan-500 p-4 hover:bg-cyan-500 hover:text-black transition">ACCELERATION</button>
                <button onclick="applyUpgrade('damage')" class="bg-fuchsia-900/50 border border-fuchsia-500 p-4 hover:bg-fuchsia-500 hover:text-black transition">OVERLOAD</button>
                <button onclick="applyUpgrade('shield')" class="bg-blue-900/50 border border-blue-500 p-4 hover:bg-blue-500 hover:text-black transition">REINFORCE</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // GAME STATE
    let state = {
        score: 0, level: 1, xp: 0, 
        hp: 100, energy: 100, 
        active: true, time: 0,
        shake: 0, slow: 1
    };

    const player = {
        x: 100, y: 250, r: 15, 
        speed: 5, fireRate: 15, timer: 0,
        stats: { dmg: 1, spd: 5, shield: 0 }
    };

    let bullets = [], enemies = [], particles = [], beams = [];

    // CORE LOGIC
    function createParticle(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x, y, color,
                vx: (Math.random()-0.5)*10,
                vy: (Math.random()-0.5)*10,
                life: 1, decay: 0.02 + Math.random()*0.02
            });
        }
    }

    function shoot() {
        if(state.energy > 5) {
            bullets.push({ x: player.x+20, y: player.y, vx: 15, vy: 0, dmg: player.stats.dmg });
            state.energy -= 2;
            state.shake = 3;
        }
    }

    function spawnEnemy() {
        const type = Math.random() > 0.8 ? 'HEAVY' : 'SCOUT';
        enemies.push({
            x: 850, y: Math.random() * 450 + 25,
            hp: type === 'HEAVY' ? 5 : 2,
            type, speed: type === 'SCOUT' ? 3 + (state.level * 0.2) : 1.5,
            lastShot: 0
        });
    }

    function applyUpgrade(type) {
        if(type === 'speed') player.stats.spd += 1.5;
        if(type === 'damage') player.stats.dmg += 0.5;
        if(type === 'shield') player.stats.shield += 10;
        document.getElementById('level-up').style.display = 'none';
        state.slow = 1;
        state.active = true;
    }

    // MAIN LOOP
    function draw() {
        if(!state.active) return requestAnimationFrame(draw);
        
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0,0,800,500);

        // Screen Shake
        if(state.shake > 0) {
            ctx.translate(Math.random()*state.shake, Math.random()*state.shake);
            state.shake *= 0.9;
        }

        // Grid Background Effect
        ctx.strokeStyle = '#06b6d411';
        ctx.lineWidth = 1;
        for(let i=0; i<800; i+=40) {
            ctx.beginPath(); ctx.moveTo(i - (state.time%40), 0); ctx.lineTo(i - (state.time%40), 500); ctx.stroke();
        }

        // Player (Neon Triangle)
        ctx.shadowBlur = 15; ctx.shadowColor = '#06b6d4';
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(player.x + 20, player.y);
        ctx.lineTo(player.x - 10, player.y - 15);
        ctx.lineTo(player.x - 10, player.y + 15);
        ctx.fill();
        ctx.shadowBlur = 0;

        // Input Handle
        if(window.keys['KeyW'] && player.y > 20) player.y -= player.stats.spd;
        if(window.keys['KeyS'] && player.y < 480) player.y += player.stats.spd;
        if(window.keys['KeyA'] && player.x > 20) player.x -= player.stats.spd;
        if(window.keys['KeyD'] && player.x < 400) player.x += player.stats.spd;

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= p.decay;
            ctx.fillStyle = p.color + Math.floor(p.life*255).toString(16);
            ctx.fillRect(p.x, p.y, 3, 3);
            if(p.life <= 0) particles.splice(i, 1);
        });

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx;
            ctx.fillStyle = '#06b6d4';
            ctx.fillRect(b.x, b.y-2, 15, 4);
            if(b.x > 800) bullets.splice(i, 1);
        });

        // Enemies
        enemies.forEach((e, i) => {
            e.x -= e.speed;
            ctx.fillStyle = e.type === 'HEAVY' ? '#d946ef' : '#f43f5e';
            ctx.shadowBlur = 10; ctx.shadowColor = ctx.fillStyle;
            ctx.fillRect(e.x, e.y-15, 30, 30);
            
            // Collision Player
            if(Math.hypot(e.x - player.x, e.y - player.y) < 30) {
                state.hp -= 20; e.hp = 0; state.shake = 10;
            }

            // Bullet Collision
            bullets.forEach((b, bi) => {
                if(b.x > e.x && b.x < e.x+30 && b.y > e.y-15 && b.y < e.y+15) {
                    e.hp -= b.dmg;
                    bullets.splice(bi, 1);
                    createParticle(e.x, e.y, '#06b6d4');
                }
            });

            if(e.hp <= 0) {
                enemies.splice(i, 1);
                state.score += 100;
                state.xp += 20;
                state.energy = Math.min(100, state.energy + 10);
                createParticle(e.x, e.y, '#f43f5e');
                if(state.xp >= 100) {
                    state.level++; state.xp = 0;
                    document.getElementById('level-up').style.display = 'flex';
                    state.active = false;
                }
            }
        });

        // UI Update
        document.getElementById('hp-fill').style.width = state.hp + "%";
        document.getElementById('energy-fill').style.width = state.energy + "%";
        document.getElementById('score-val').innerText = "DATA: " + state.score.toString().padStart(6, '0');

        if(state.hp <= 0) {
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,500);
            ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.font = "bold 40px Orbitron";
            ctx.fillText("SYSTEM FAILURE", 400, 250);
            return;
        }

        state.time++;
        if(state.time % Math.max(20, 60 - state.level*2) === 0) spawnEnemy();
        state.energy = Math.min(100, state.energy + 0.1);

        ctx.setTransform(1, 0, 0, 1, 0, 0);
        requestAnimationFrame(draw);
    }

    // CONTROLS
    window.keys = {};
    window.onkeydown = (e) => { 
        window.keys[e.code] = true;
        if(e.code === 'Space' || e.code === 'KeyF') shoot();
    };
    window.onkeyup = (e) => window.keys[e.code] = false;

    draw();
</script>
</body>
</html>
