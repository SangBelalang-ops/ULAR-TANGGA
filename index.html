<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD HERO V2 - MSI REFIX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: #fff; }
        #setup { position: absolute; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 20px 50px; font-size: 25px; cursor: pointer; background: #f1c40f; border: none; border-radius: 15px; font-weight: 900; box-shadow: 0 8px 0 #b8860b; }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px 0 #b8860b; }
        #stats { position: absolute; top: 20px; left: 20px; font-size: 30px; text-shadow: 2px 2px #000; }
        #hit-msg { position: absolute; bottom: 150px; width: 100%; text-align: center; font-size: 60px; opacity: 0; transition: 0.1s; }
        input { padding: 15px; width: 300px; margin-bottom: 20px; border-radius: 10px; font-size: 18px; text-align: center; border: 4px solid #f1c40f; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #f1c40f; font-size: 50px;">SQUAD HERO V2</h1>
    <input type="text" id="pName" placeholder="NAMA SQUAD (Alvin/Tegar...)">
    <button class="btn" onclick="initGame()">PLAY & AUDIO ON 🎸</button>
</div>

<div id="ui">
    <div id="stats">SKOR: <span id="sc">0</span><br>COMBO: <span id="cb">0</span></div>
    <div id="hit-msg">PERFECT!</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, audioCtx, myName = "";
    let notes = [], score = 0, combo = 0, startTime = 0;
    let isPlaying = false;

    // --- TRACK LAGU (Detik, Tombol 0-3) ---
    const TRACK = [
        {t: 2, k: 0}, {t: 2.5, k: 1}, {t: 3, k: 2}, {t: 3.5, k: 3},
        {t: 4.5, k: 0}, {t: 4.7, k: 0}, {t: 5, k: 1}, {t: 5.5, k: 2},
        {t: 6.5, k: 3}, {t: 7, k: 2}, {t: 7.5, k: 1}, {t: 8, k: 0},
        {t: 9, k: 0}, {t: 9.2, k: 1}, {t: 9.4, k: 2}, {t: 9.6, k: 3},
        {t: 11, k: 0}, {t: 12, k: 2}, {t: 13, k: 1}, {t: 14, k: 3}
    ];

    const COLORS = [0x00ff00, 0xff0000, 0xffff00, 0x00aaff];
    const KEYS = ["KeyA", "KeyS", "KeyK", "KeyL"];

    window.initGame = () => {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("Nama jangan kosong, Vin!");
        
        // Start Audio Context (WAJIB ADA CLICK)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('setup').style.display = 'none';
        
        setup3D();
        spawnNotes();
        startTime = Date.now();
        isPlaying = true;
        animate();
    };

    function setup3D() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 10); camera.lookAt(0, -2, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // Papan Jalan
        const road = new THREE.Mesh(new THREE.PlaneGeometry(8, 100), new THREE.MeshStandardMaterial({color: 0x111111}));
        road.rotation.x = -Math.PI/2;
        scene.add(road);

        // Jalur Garis
        for(let i=0; i<5; i++) {
            const line = new THREE.Mesh(new THREE.PlaneGeometry(0.1, 100), new THREE.MeshBasicMaterial({color: 0x444444}));
            line.rotation.x = -Math.PI/2;
            line.position.set(i*2 - 4, 0.05, 0);
            scene.add(line);
        }

        // Garis Hit (Tempat pencet)
        const target = new THREE.Mesh(new THREE.PlaneGeometry(8, 0.5), new THREE.MeshBasicMaterial({color: 0xffffff}));
        target.rotation.x = -Math.PI/2;
        target.position.set(0, 0.1, 7); // Lokasi garis putih di bawah
        scene.add(target);
    }

    function spawnNotes() {
        TRACK.forEach(n => {
            const obj = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 16),
                new THREE.MeshStandardMaterial({color: COLORS[n.k], emissive: COLORS[n.k], emissiveIntensity: 1.5})
            );
            obj.position.set(n.k*2 - 3, 0.5, n.t * -20); // Spawn jauh di depan
            scene.add(obj);
            notes.push({mesh: obj, time: n.t, key: n.k, hit: false});
        });
    }

    // Input Handler
    window.addEventListener('keydown', (e) => {
        if(!isPlaying) return;
        const kIdx = KEYS.indexOf(e.code);
        if(kIdx === -1) return;

        playBeep(kIdx); // Suara Guitar Synth

        const now = (Date.now() - startTime) / 1000;
        let hit = false;

        for(let n of notes) {
            if(!n.hit && n.key === kIdx && Math.abs(n.time - now) < 0.2) {
                n.hit = true; hit = true;
                n.mesh.visible = false;
                updateStats(true);
                break;
            }
        }
        if(!hit) updateStats(false);
    });

    function playBeep(k) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        const freqs = [261.6, 329.6, 392.0, 523.3]; // C E G C2
        osc.frequency.setValueAtTime(freqs[k], audioCtx.currentTime);
        osc.type = 'square';
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.3);
    }

    function updateStats(isHit) {
        const hMsg = document.getElementById('hit-msg');
        hMsg.style.opacity = 1;
        if(isHit) {
            score += 100 + (combo * 10); combo++;
            hMsg.innerText = "PERFECT! 🔥"; hMsg.style.color = "#00ff00";
        } else {
            combo = 0;
            hMsg.innerText = "MISS! ❌"; hMsg.style.color = "#ff0000";
        }
        document.getElementById('sc').innerText = score;
        document.getElementById('cb').innerText = combo;
        setTimeout(() => hMsg.style.opacity = 0, 200);
    }

    function animate() {
        if(!isPlaying) return;
        requestAnimationFrame(animate);
        const now = (Date.now() - startTime) / 1000;

        notes.forEach(n => {
            if(!n.hit) {
                // Majuin nada ke arah camera (garis hit ada di z=7)
                // Rumus: SpawnPos + (WaktuSekarang * Kecepatan)
                n.mesh.position.z = (n.time * 20) - (now * 20) - 13; 
                
                // Missed
                if(n.mesh.position.z > 9 && !n.hit) {
                    n.hit = true; combo = 0;
                    document.getElementById('cb').innerText = combo;
                }
            }
        });
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
