<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD CHICKEN RUN | FLAUST EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { 
            margin: 0; 
            overflow: hidden; 
            background: linear-gradient(to bottom, #0f172a, #1e293b);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        #gameCanvas {
            background: #f1f5f9;
            border-bottom: 10px solid #fbbf24;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        .ui-panel {
            position: absolute;
            top: 20px;
            text-align: center;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="ui-panel">
        <h1 class="text-4xl font-black text-yellow-500 italic tracking-tighter">SQUAD <span class="text-white">RUN</span></h1>
        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">High Score: <span id="highScore">0</span></p>
    </div>

    <canvas id="gameCanvas" width="800" height="250"></canvas>

    <div class="mt-8 text-slate-500 text-xs font-bold uppercase tracking-widest animate-pulse">
        Press [Space] or Tap to Jump
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const highScoreEl = document.getElementById('highScore');

    let score = 0;
    let highScore = localStorage.getItem('squadRunHS') || 0;
    highScoreEl.innerText = highScore;

    let gameActive = true;
    let gravity = 0.6;
    
    // Objek Ayam
    const chicken = {
        x: 50,
        y: 200,
        width: 40,
        height: 40,
        dy: 0,
        jumpForce: 12,
        grounded: false,
        draw() {
            // Badan Ayam (Sederhana tapi lucu)
            ctx.fillStyle = "#fbbf24"; // Kuning
            ctx.beginPath();
            ctx.roundRect(this.x, this.y, this.width, this.height, 10);
            ctx.fill();
            
            // Jengger
            ctx.fillStyle = "#ef4444"; // Merah
            ctx.fillRect(this.x + 25, this.y - 5, 10, 10);
            
            // Mata
            ctx.fillStyle = "#000";
            ctx.fillRect(this.x + 30, this.y + 10, 4, 4);
            
            // Paruh
            ctx.fillStyle = "#f59e0b";
            ctx.beginPath();
            ctx.moveTo(this.x + 40, this.y + 15);
            ctx.lineTo(this.x + 48, this.y + 20);
            ctx.lineTo(this.x + 40, this.y + 25);
            ctx.fill();
        }
    };

    // Rintangan (Bambu/Pohon)
    const obstacles = [];
    let spawnTimer = 0;

    function spawnObstacle() {
        const height = Math.random() * (60 - 30) + 30;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height,
            width: 25,
            height: height,
            speed: 6 + (score / 500) // Semakin lama makin cepet
        });
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Gravitasi Ayam
        if (!chicken.grounded) {
            chicken.dy += gravity;
            chicken.y += chicken.dy;
        }

        if (chicken.y + chicken.height > canvas.height) {
            chicken.y = canvas.height - chicken.height;
            chicken.dy = 0;
            chicken.grounded = true;
        }

        chicken.draw();

        // Handle Rintangan
        spawnTimer++;
        if (spawnTimer > Math.max(60, 100 - (score / 10))) {
            spawnObstacle();
            spawnTimer = 0;
        }

        obstacles.forEach((obs, index) => {
            obs.x -= obs.speed;
            
            // Gambar Rintangan (Pohon Bambu)
            ctx.fillStyle = "#16a34a"; // Hijau
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.fillStyle = "#14532d";
            ctx.fillRect(obs.x + 10, obs.y, 5, obs.height);

            // Tabrakan (Collision)
            if (
                chicken.x < obs.x + obs.width &&
                chicken.x + chicken.width > obs.x &&
                chicken.y < obs.y + obs.height &&
                chicken.y + chicken.height > obs.y
            ) {
                gameOver();
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(index, 1);
                score += 10;
            }
        });

        // Score
        ctx.fillStyle = "#1e293b";
        ctx.font = "bold 20px Plus Jakarta Sans";
        ctx.fillText(`SCORE: ${score}`, 20, 30);

        requestAnimationFrame(update);
    }

    function gameOver() {
        gameActive = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('squadRunHS', highScore);
            highScoreEl.innerText = highScore;
        }
        
        ctx.fillStyle = "rgba(15, 23, 42, 0.8)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = "#fff";
        ctx.textAlign = "center";
        ctx.font = "bold 40px Plus Jakarta Sans";
        ctx.fillText("MODYAR, REK!", canvas.width / 2, canvas.height / 2);
        ctx.font = "bold 15px Plus Jakarta Sans";
        ctx.fillText("Press Space to Try Again", canvas.width / 2, canvas.height / 2 + 40);
    }

    function resetGame() {
        score = 0;
        obstacles.length = 0;
        chicken.y = 200;
        chicken.dy = 0;
        gameActive = true;
        update();
    }

    // Input Control
    window.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
            if (gameActive && chicken.grounded) {
                chicken.dy = -chicken.jumpForce;
                chicken.grounded = false;
            } else if (!gameActive) {
                resetGame();
            }
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (gameActive && chicken.grounded) {
            chicken.dy = -chicken.jumpForce;
            chicken.grounded = false;
        } else if (!gameActive) {
            resetGame();
        }
    });

    update();
</script>
</body>
</html>
