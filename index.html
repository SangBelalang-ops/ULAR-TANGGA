<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>CYBER SURGE: GOD MODE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Orbitron', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { filter: drop-shadow(0 0 10px #06b6d4); cursor: crosshair; }
        .ui-overlay { position: absolute; inset: 0; pointer-events: none; padding: 20px; color: #fff; }
        .upgrade-card { background: rgba(6, 182, 212, 0.1); border: 1px solid #06b6d4; padding: 10px; border-radius: 4px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(-100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <div class="ui-overlay flex flex-col justify-between">
        <div class="flex justify-between">
            <div class="w-64">
                <div class="text-[10px] text-cyan-400 mb-1">SYSTEM INTEGRITY</div>
                <div class="h-1 bg-slate-800 rounded-full overflow-hidden border border-slate-700">
                    <div id="hp-bar" class="h-full bg-cyan-500 w-full transition-all"></div>
                </div>
                <div id="upgrade-menu" class="mt-4 space-y-2 pointer-events-auto hidden">
                    <p class="text-[9px] text-yellow-400 animate-pulse">UPGRADE READY! [Press 1-3]</p>
                    <div class="upgrade-card text-[10px]" id="up-1">1. OVERDRIVE (+DMG)</div>
                    <div class="upgrade-card text-[10px]" id="up-2">2. REACTION (+SPEED)</div>
                    <div class="upgrade-card text-[10px]" id="up-3">3. REPAIR (RESTORE HP)</div>
                </div>
            </div>
            <div class="text-right">
                <p id="score-text" class="text-2xl font-black text-cyan-400 italic">000000</p>
                <p id="level-text" class="text-[10px] text-fuchsia-500">LEVEL 1</p>
            </div>
        </div>
        <div id="boss-warning" class="hidden text-center text-red-500 animate-ping font-black text-4xl">BOSS INCOMING</div>
    </div>

    <canvas id="gameCanvas" width="900" height="500"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // CONFIG & STATE
    let score = 0, level = 1, xp = 0, hp = 100, active = true, shake = 0, time = 0;
    let upAvailable = false, bossActive = false;
    const keys = {};

    const player = { x: 100, y: 250, w: 30, h: 20, spd: 5, dmg: 1 };
    let bullets = [], enemies = [], particles = [], boss = null;

    // INPUT
    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(upAvailable) {
            if(e.key === '1') applyUp('dmg');
            if(e.key === '2') applyUp('spd');
            if(e.key === '3') applyUp('hp');
        }
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function applyUp(type) {
        if(type === 'dmg') player.dmg += 0.5;
        if(type === 'spd') player.spd += 1;
        if(type === 'hp') hp = Math.min(100, hp + 40);
        upAvailable = false;
        document.getElementById('upgrade-menu').classList.add('hidden');
    }

    function spawnBoss() {
        bossActive = true;
        document.getElementById('boss-warning').classList.remove('hidden');
        setTimeout(() => {
            document.getElementById('boss-warning').classList.add('hidden');
            boss = { x: 1000, y: 100, w: 100, h: 300, hp: 1000 + (level*200), maxHp: 1000 + (level*200), lastShot: 0 };
        }, 2000);
    }

    function createExplosion(x, y, color) {
        for(let i=0; i<15; i++) {
            particles.push({ x, y, vx: (Math.random()-0.5)*12, vy: (Math.random()-0.5)*12, life: 1, c: color });
        }
    }

    function update() {
        if(!active) return;
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(0,0,900,500);

        // Grid Movement
        ctx.strokeStyle = '#06b6d411';
        for(let i=0; i<900; i+=50) {
            ctx.beginPath(); ctx.moveTo(i - (time%50), 0); ctx.lineTo(i - (time%50), 500); ctx.stroke();
        }

        // Screen Shake
        if(shake > 0) { ctx.translate(Math.random()*shake-shake/2, Math.random()*shake-shake/2); shake *= 0.9; }

        // Player Draw
        ctx.shadowBlur = 15; ctx.shadowColor = '#06b6d4';
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(player.x+25, player.y); ctx.lineTo(player.x-10, player.y-15); ctx.lineTo(player.x-10, player.y+15); ctx.fill();
        ctx.shadowBlur = 0;

        // Player Move
        if(keys['KeyW']) player.y -= player.spd;
        if(keys['KeyS']) player.y += player.spd;
        if(keys['KeyA']) player.x -= player.spd;
        if(keys['KeyD']) player.x += player.spd;

        // Shooting
        if(time % 10 === 0) bullets.push({ x: player.x+20, y: player.y, vx: 18, type: 'P' });

        // Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx;
            ctx.fillStyle = b.type === 'P' ? '#06b6d4' : '#f43f5e';
            ctx.fillRect(b.x, b.y-2, 20, 4);
            if(b.x > 900 || b.x < -50) bullets.splice(i, 1);
        });

        // Boss Logic
        if(boss) {
            if(boss.x > 750) boss.x -= 2;
            ctx.fillStyle = '#1e293b'; ctx.strokeStyle = '#f43f5e'; ctx.lineWidth = 4;
            ctx.strokeRect(boss.x, boss.y, boss.w, boss.h);
            ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
            
            // Boss Shoot
            if(time % 40 === 0) bullets.push({ x: boss.x, y: boss.y + Math.random()*boss.h, vx: -10, type: 'E' });

            bullets.forEach((b, bi) => {
                if(b.type === 'P' && b.x > boss.x && b.y > boss.y && b.y < boss.y+boss.h) {
                    boss.hp -= player.dmg * 5; bullets.splice(bi, 1);
                    if(boss.hp <= 0) { 
                        createExplosion(boss.x+50, boss.y+150, '#f43f5e');
                        boss = null; bossActive = false; score += 2000; shake = 40;
                    }
                }
            });
        }

        // Enemies
        if(!bossActive && time % 40 === 0) {
            enemies.push({ x: 950, y: Math.random()*450+25, hp: 2 + level, spd: 3 + Math.random()*3 });
        }

        enemies.forEach((e, i) => {
            e.x -= e.spd;
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.moveTo(e.x, e.y); ctx.lineTo(e.x+20, e.y-15); ctx.lineTo(e.x+40, e.y); ctx.lineTo(e.x+20, e.y+15); ctx.fill();

            bullets.forEach((b, bi) => {
                if(b.type === 'P' && Math.hypot(b.x-e.x, b.y-e.y) < 25) {
                    e.hp -= player.dmg; bullets.splice(bi, 1);
                    if(e.hp <= 0) {
                        createExplosion(e.x, e.y, '#f43f5e');
                        enemies.splice(i, 1); score += 100; xp += 20;
                    }
                }
            });

            if(Math.hypot(e.x-player.x, e.y-player.y) < 30) { hp -= 10; enemies.splice(i, 1); shake = 10; }
        });

        // XP & Level Up
        if(xp >= 100) {
            level++; xp = 0; upAvailable = true;
            document.getElementById('upgrade-menu').classList.remove('hidden');
            if(score > 0 && score % 2000 === 0) spawnBoss();
        }

        // Particles
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy; p.life -= 0.02;
            ctx.fillStyle = p.c + Math.floor(p.life*255).toString(16);
            ctx.fillRect(p.x, p.y, 4, 4);
            if(p.life <= 0) particles.splice(i, 1);
        });

        // UI
        document.getElementById('hp-bar').style.width = hp + "%";
        document.getElementById('score-text').innerText = score.toString().padStart(6, '0');
        document.getElementById('level-text').innerText = "LEVEL " + level;

        if(hp <= 0) {
            active = false;
            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,900,500);
            ctx.fillStyle = "#f43f5e"; ctx.textAlign = "center"; ctx.font = "bold 50px Orbitron";
            ctx.fillText("FATAL ERROR", 450, 250);
        }

        time++;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
