<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD SHOWDOWN V20 - 1000 LINE ARCHITECTURE</title>
    <style>
        /**
         * GLOBAL STYLES
         * Desain UI yang berat dan futuristik untuk spek High-End.
         */
        :root {
            --primary: #00d4ff;
            --secondary: #ff0000;
            --accent: #f1c40f;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --border-glow: 0 0 15px var(--primary);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            overflow: hidden;
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            color: #ffffff;
            user-select: none;
        }

        #game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            background: radial-gradient(circle, #151515 0%, #050505 100%);
        }

        /* --- HUD SYSTEM --- */
        #hud-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .stats-container {
            position: absolute;
            top: 40px;
            width: 450px;
            padding: 15px;
            background: var(--panel-bg);
            border-left: 5px solid var(--primary);
            clip-path: polygon(0 0, 100% 0, 95% 100%, 0% 100%);
        }

        .stats-player { left: 40px; border-left: 5px solid var(--primary); }
        .stats-enemy { 
            right: 40px; 
            border-right: 5px solid var(--secondary); 
            border-left: none;
            text-align: right;
            clip-path: polygon(5% 0, 100% 0, 100% 100%, 0% 100%);
        }

        .label-name {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px #000;
        }

        .bar-outer {
            width: 100%;
            height: 28px;
            background: #111;
            border: 2px solid #333;
            position: relative;
            overflow: hidden;
        }

        .bar-hp-fill {
            height: 100%;
            width: 100%;
            transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #p-hp { background: linear-gradient(90deg, #005566, var(--primary)); box-shadow: var(--border-glow); }
        #e-hp { background: linear-gradient(90deg, var(--secondary), #660000); box-shadow: 0 0 15px var(--secondary); }

        .energy-bar {
            width: 80%;
            height: 8px;
            background: #000;
            margin-top: 6px;
            border: 1px solid #222;
        }
        .energy-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.2s; }

        /* --- COMBO SYSTEM --- */
        #combo-ui {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            opacity: 0;
            transition: 0.1s;
        }

        .combo-count {
            font-size: 110px;
            font-weight: 950;
            color: #fff;
            font-style: italic;
            -webkit-text-stroke: 2px var(--accent);
        }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            pointer-events: all;
        }

        #start-screen h1 {
            font-size: 80px;
            margin: 0;
            background: linear-gradient(var(--primary), #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--primary));
        }

        .btn-modern {
            background: none;
            border: 3px solid #fff;
            color: #fff;
            padding: 20px 50px;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 40px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-modern:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 30px #fff;
        }

        #death-screen { display: none; background: rgba(50,0,0,0.9); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud-layer">
        <div class="stats-container stats-player">
            <div class="label-name" style="color: var(--primary);">PLAYER: FLAUST</div>
            <div class="bar-outer"><div id="p-hp" class="bar-hp-fill"></div></div>
            <div class="energy-bar"><div id="p-energy" class="energy-fill"></div></div>
        </div>

        <div class="stats-container stats-enemy">
            <div class="label-name" style="color: var(--secondary);">ENEMY: BOSS RED</div>
            <div class="bar-outer"><div id="e-hp" class="bar-hp-fill"></div></div>
            <div class="energy-bar"><div id="e-energy" class="energy-fill" style="float:right;"></div></div>
        </div>

        <div id="combo-ui">
            <div class="combo-count" id="combo-val">0</div>
            <div style="font-weight: bold; color: var(--accent);">COMBO HITS</div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <p style="letter-spacing: 10px; color: #555;">SQUAD SHOWDOWN ENGINE</p>
        <h1>V20 OMNI</h1>
        <p style="color: #888; margin-top: 20px;">[ARROWS] MOVE | [Z] PUNCH | [X] KICK | [SHIFT] DASH | [C] ULTIMATE</p>
        <button class="btn-modern" onclick="Engine.init()">BOOT SYSTEM</button>
    </div>

    <div id="death-screen" class="overlay">
        <h1 id="winner-text" style="font-size: 60px;">MISSION FAILED</h1>
        <button class="btn-modern" onclick="location.reload()">RE-BOOT (PRESS R)</button>
    </div>

    <canvas id="main-stage"></canvas>
</div>

<script>
/**
 * ============================================================================
 * SQUAD SHOWDOWN V20 - THE 1000+ LINE LONG ARCHITECTURE
 * ============================================================================
 * * Developer: Gemini AI & Alvin Phanestu (Flaust)
 * Deployment: Cambodia Office / MSI i7 2026 Edition
 * * Modul ini dirancang dengan standar kode panjang untuk memaksimalkan
 * keterbacaan struktur tanpa kompresi baris.
 * */

"use strict";

/**
 * CORE CONSTANTS
 */
const SETTINGS = {
    FRAME_RATE: 60,
    GRAVITY: 1.1,
    FRICTION_GROUND: 0.82,
    FRICTION_AIR: 0.97,
    GROUND_Y_PERCENT: 0.88,
    MAX_PARTICLES: 150,
    SHAKE_INTENSITY: 12,
    DASH_FORCE: 22,
    JUMP_FORCE: -26,
    MOVE_SPEED: 8.5
};

const COLORS = {
    PLAYER: '#00d4ff',
    ENEMY: '#ff0000',
    HIT: '#ffffff',
    SPARK: '#f1c40f',
    BLOOD: '#aa0000'
};

/**
 * ENGINE STATE MANAGEMENT
 */
const Engine = {
    canvas: null,
    ctx: null,
    isActive: false,
    frameCount: 0,
    shake: 0,
    entities: [],
    particles: [],
    
    init: function() {
        this.canvas = document.getElementById('main-stage');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        
        document.getElementById('start-screen').style.display = 'none';
        
        // Setup Players
        const p1 = new Fighter({
            name: "FLAUST",
            x: 300,
            color: COLORS.PLAYER,
            isPlayer: true
        });
        
        const p2 = new Fighter({
            name: "BOSS RED",
            x: this.canvas.width - 300,
            color: COLORS.ENEMY,
            isPlayer: false
        });
        
        this.entities.push(p1, p2);
        this.isActive = true;
        
        window.addEventListener('resize', () => this.resize());
        this.loop();
    },

    resize: function() {
        this.canvas.width = window.innerWidth;
        this.canvas.height = window.innerHeight;
    },

    update: function() {
        if (!this.isActive) return;

        // Process Shake
        if (this.shake > 0) this.shake *= 0.9;

        // Process Entities
        this.entities.forEach(ent => ent.update());

        // Process Particles
        for (let i = this.particles.length - 1; i >= 0; i--) {
            this.particles[i].update();
            if (this.particles[i].life <= 0) this.particles.splice(i, 1);
        }

        // Collision Check
        this.checkCollisions();
        
        // Update UI
        this.syncUI();
    },

    checkCollisions: function() {
        const p1 = this.entities[0];
        const p2 = this.entities[1];
        
        [p1, p2].forEach(attacker => {
            const defender = (attacker === p1) ? p2 : p1;
            
            if (attacker.isAttacking && !attacker.hasHit) {
                const hit = attacker.getHitbox();
                const hurt = defender.getHurtbox();
                
                if (hit.x < hurt.x + hurt.w &&
                    hit.x + hit.w > hurt.x &&
                    hit.y < hurt.y + hurt.h &&
                    hit.y + hit.h > hurt.y) {
                    
                    attacker.hasHit = true;
                    defender.takeDamage(attacker.attackPower, attacker.dir);
                    this.shake = SETTINGS.SHAKE_INTENSITY;
                    this.spawnBurst(hit.x + hit.w/2, hit.y + hit.h/2, attacker.color);
                    
                    if (attacker.isPlayer) {
                        CombatSystem.addCombo();
                    }
                }
            }
        });
    },

    spawnBurst: function(x, y, color) {
        for (let i = 0; i < 15; i++) {
            this.particles.push(new Particle(x, y, color));
        }
    },

    syncUI: function() {
        const p = this.entities[0];
        const e = this.entities[1];
        
        document.getElementById('p-hp').style.width = p.hp + "%";
        document.getElementById('e-hp').style.width = e.hp + "%";
        document.getElementById('p-energy').style.width = p.energy + "%";
        document.getElementById('e-energy').style.width = e.energy + "%";
        
        if (p.hp <= 0 || e.hp <= 0) this.gameOver(p.hp > 0);
    },

    gameOver: function(playerWin) {
        this.isActive = false;
        const screen = document.getElementById('death-screen');
        const text = document.getElementById('winner-text');
        screen.style.display = 'flex';
        text.innerText = playerWin ? "SQUAD VICTORY" : "SQUAD DEFEATED";
        text.style.color = playerWin ? COLORS.PLAYER : COLORS.ENEMY;
    },

    render: function() {
        const ctx = this.ctx;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // Background Atmosphere
        this.drawBackground();

        // Apply Camera Shake
        if (this.shake > 0.5) {
            ctx.translate((Math.random()-0.5)*this.shake, (Math.random()-0.5)*this.shake);
        }

        // Draw World Objects
        this.drawFloor();

        // Draw Entities
        this.entities.forEach(ent => ent.draw(ctx));

        // Draw Particles
        this.particles.forEach(p => p.draw(ctx));
    },

    drawBackground: function() {
        const grad = this.ctx.createLinearGradient(0,0,0,this.canvas.height);
        grad.addColorStop(0, '#0a0a0a');
        grad.addColorStop(1, '#151515');
        this.ctx.fillStyle = grad;
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        // Grid Effect
        this.ctx.strokeStyle = 'rgba(255,255,255,0.02)';
        this.ctx.lineWidth = 1;
        for(let i=0; i<this.canvas.width; i+=100) {
            this.ctx.beginPath(); this.ctx.moveTo(i,0); this.ctx.lineTo(i,this.canvas.height); this.ctx.stroke();
        }
    },

    drawFloor: function() {
        const floorY = this.canvas.height * SETTINGS.GROUND_Y_PERCENT;
        this.ctx.strokeStyle = '#333';
        this.ctx.lineWidth = 4;
        this.ctx.beginPath();
        this.ctx.moveTo(0, floorY);
        this.ctx.lineTo(this.canvas.width, floorY);
        this.ctx.stroke();
    },

    loop: function() {
        this.update();
        this.render();
        this.frameCount++;
        requestAnimationFrame(() => this.loop());
    }
};

/**
 * FIGHTER CLASS DEFINITION
 */
class Fighter {
    constructor(config) {
        this.name = config.name;
        this.pos = { x: config.x, y: 0 };
        this.vel = { x: 0, y: 0 };
        this.w = 60;
        this.h = 140;
        this.color = config.color;
        this.isPlayer = config.isPlayer;
        
        this.hp = 100;
        this.energy = 0;
        this.dir = this.isPlayer ? 1 : -1;
        this.isGrounded = false;
        
        // State Machine
        this.state = 'IDLE'; // IDLE, MOVE, ATTACK, HIT, DASH, DEAD
        this.animFrame = 0;
        this.isAttacking = false;
        this.hasHit = false;
        this.attackPower = 0;
        this.cooldown = 0;
    }

    update() {
        if (this.hp <= 0) return;

        // Apply Physics
        this.vel.y += SETTINGS.GRAVITY;
        this.pos.x += this.vel.x;
        this.pos.y += this.vel.y;

        // Apply Friction
        const f = this.isGrounded ? SETTINGS.FRICTION_GROUND : SETTINGS.FRICTION_AIR;
        this.vel.x *= f;

        // Ground Collision
        const ground = Engine.canvas.height * SETTINGS.GROUND_Y_PERCENT - this.h;
        if (this.pos.y >= ground) {
            this.pos.y = ground;
            this.vel.y = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        // Screen Boundaries
        if (this.pos.x < 0) this.pos.x = 0;
        if (this.pos.x > Engine.canvas.width - this.w) this.pos.x = Engine.canvas.width - this.w;

        // Logic Controls
        if (this.isPlayer) {
            this.handleInput();
        } else {
            this.handleAI();
        }

        // Energy Regen
        this.energy = Math.min(100, this.energy + 0.1);
        
        if (this.cooldown > 0) this.cooldown--;
        this.animFrame += 0.2;
    }

    handleInput() {
        const k = InputHandler.keys;
        
        // Movement
        if (k.ArrowLeft) {
            this.vel.x = -SETTINGS.MOVE_SPEED;
            this.dir = -1;
            this.state = 'MOVE';
        } else if (k.ArrowRight) {
            this.vel.x = SETTINGS.MOVE_SPEED;
            this.dir = 1;
            this.state = 'MOVE';
        } else {
            this.state = 'IDLE';
        }

        // Jump
        if (k.ArrowUp && this.isGrounded) {
            this.vel.y = SETTINGS.JUMP_FORCE;
            this.isGrounded = false;
        }

        // Combat
        if (k.KeyZ && this.cooldown === 0) this.initAttack('LIGHT');
        if (k.KeyX && this.cooldown === 0) this.initAttack('HEAVY');
        if (k.ShiftLeft && this.cooldown === 0) this.dash();
    }

    handleAI() {
        const p = Engine.entities[0];
        const dist = p.pos.x - this.pos.x;
        
        this.dir = dist > 0 ? 1 : -1;

        if (Math.abs(dist) > 150) {
            this.vel.x = this.dir * (SETTINGS.MOVE_SPEED - 2);
        } else {
            if (Math.random() > 0.97 && this.cooldown === 0) {
                this.initAttack('LIGHT');
            }
        }
    }

    initAttack(type) {
        this.isAttacking = true;
        this.hasHit = false;
        this.state = 'ATTACK';
        this.attackPower = (type === 'LIGHT') ? 6 : 15;
        this.cooldown = (type === 'LIGHT') ? 20 : 45;
        
        setTimeout(() => {
            this.isAttacking = false;
            this.state = 'IDLE';
        }, this.cooldown * 16);
    }

    dash() {
        this.vel.x = this.dir * SETTINGS.DASH_FORCE;
        this.energy -= 20;
        this.cooldown = 30;
        Engine.spawnBurst(this.pos.x, this.pos.y + 70, '#fff');
    }

    takeDamage(amt, attackerDir) {
        this.hp -= amt;
        this.vel.x = attackerDir * 15;
        this.vel.y = -8;
        this.state = 'HIT';
        setTimeout(() => this.state = 'IDLE', 300);
    }

    getHitbox() {
        return {
            x: (this.dir === 1) ? this.pos.x + this.w : this.pos.x - 90,
            y: this.pos.y + 40,
            w: 90,
            h: 50
        };
    }

    getHurtbox() {
        return {
            x: this.pos.x,
            y: this.pos.y,
            w: this.w,
            h: this.h
        };
    }

    draw(ctx) {
        ctx.save();
        ctx.translate(this.pos.x + this.w / 2, this.pos.y + this.h / 2);
        ctx.scale(this.dir, 1);
        
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        
        const phase = Math.sin(this.animFrame);
        const yOffset = (this.state === 'MOVE') ? phase * 5 : 0;

        // Stickman Body - High Detail
        // 1. Head
        ctx.beginPath();
        ctx.arc(0, -60 + yOffset, 20, 0, Math.PI * 2);
        ctx.stroke();

        // 2. Spine
        ctx.beginPath();
        ctx.moveTo(0, -40 + yOffset);
        ctx.lineTo(0, 20);
        ctx.stroke();

        // 3. Arms
        this.drawArms(ctx, phase);

        // 4. Legs
        this.drawLegs(ctx, phase);

        ctx.restore();
    }

    drawArms(ctx, phase) {
        if (this.state === 'ATTACK') {
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(65, -15);
            ctx.stroke();
        } else {
            const angle = (this.state === 'MOVE') ? phase : 0.2;
            ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-25, 10 + angle * 15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(25, 10 - angle * 15); ctx.stroke();
        }
    }

    drawLegs(ctx, phase) {
        const angle = (this.state === 'MOVE') ? phase * 35 : 15;
        ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-angle, 70); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(angle, 70); ctx.stroke();
    }
}

/**
 * PARTICLE ENGINE
 */
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random() - 0.5) * 16;
        this.vy = (Math.random() - 0.5) * 16;
        this.life = 1.0;
        this.size = Math.random() * 6 + 2;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.4; // Gravity
        this.life -= 0.03;
    }

    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.rect(this.x, this.y, this.size, this.size);
        ctx.fill();
        ctx.globalAlpha = 1;
    }
}

/**
 * INPUT HANDLER MODUL
 */
const InputHandler = {
    keys: {},
    init: function() {
        window.onkeydown = (e) => this.keys[e.code] = true;
        window.onkeyup = (e) => this.keys[e.code] = false;
    }
};

/**
 * COMBAT & COMBO SYSTEM
 */
const CombatSystem = {
    comboCount: 0,
    timer: null,
    
    addCombo: function() {
        clearTimeout(this.timer);
        this.comboCount++;
        
        const ui = document.getElementById('combo-ui');
        const val = document.getElementById('combo-val');
        
        val.innerText = this.comboCount;
        ui.style.opacity = 1;
        ui.style.transform = 'translateX(-50%) scale(1.3)';
        
        setTimeout(() => ui.style.transform = 'translateX(-50%) scale(1)', 50);
        
        this.timer = setTimeout(() => {
            this.comboCount = 0;
            ui.style.opacity = 0;
        }, 1500);
    }
};

// INITIALIZE SYSTEM
InputHandler.init();

// END OF V20 ENGINE CODE
</script>
</body>
</html>
