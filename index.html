<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD SHOWDOWN V16 - OMNI REMASTER</title>
    <style>
        :root { --p-color: #00d4ff; --e-color: #ff0000; }
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        /* LAYERS */
        #game-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        #bg-parallax { position: absolute; inset: 0; background: linear-gradient(to bottom, #000 0%, #111 100%); z-index: -1; }
        canvas { display: block; image-rendering: pixelated; }

        /* UI OVERLAY */
        #ui-layer { position: absolute; inset: 0; pointer-events: none; padding: 30px; z-index: 10; }
        .stats-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .bar-outer { width: 350px; height: 25px; background: rgba(255,255,255,0.1); border: 2px solid #fff; position: relative; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .bar-inner { height: 100%; width: 100%; transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .mana-bar { height: 8px; width: 350px; background: rgba(0,0,0,0.5); margin-top: 5px; border: 1px solid #444; }
        .mana-fill { height: 100%; width: 0%; background: #f1c40f; transition: width 0.2s; }

        /* MENUS */
        #start-menu { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .char-select { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { padding: 20px; border: 2px solid #333; cursor: pointer; transition: 0.3s; text-align: center; width: 120px; }
        .card:hover { border-color: var(--p-color); background: rgba(0,212,255,0.1); transform: translateY(-10px); }
        .btn-play { margin-top: 40px; padding: 15px 50px; background: var(--p-color); color: #000; font-weight: bold; border: none; cursor: pointer; border-radius: 5px; }

        /* SCREEN FX */
        #flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 50; }
    </style>
</head>
<body>

<div id="start-menu">
    <h1 style="font-size: 3em; letter-spacing: 5px;">SQUAD SHOWDOWN <span style="color:var(--p-color)">V16</span></h1>
    <p>MSI i7 PERFORMANCE MODE: ENABLED</p>
    <div class="char-select" id="charGrid">
        </div>
    <button class="btn-play" onclick="initGame()">FIGHT!</button>
</div>

<div id="game-container">
    <div id="flash"></div>
    <div id="ui-layer">
        <div class="stats-row">
            <div id="p-stats">
                <div style="font-weight: bold;" id="p-name-label">PLAYER</div>
                <div class="bar-outer"><div id="p-hp" class="bar-inner" style="background: var(--p-color);"></div></div>
                <div class="mana-bar"><div id="p-mana" class="mana-fill"></div></div>
            </div>
            <div id="e-stats" style="text-align: right;">
                <div style="font-weight: bold;">TEAM MERAH AI</div>
                <div class="bar-outer"><div id="e-hp" class="bar-inner" style="background: var(--e-color);"></div></div>
                <div class="mana-bar"><div id="e-mana" class="mana-fill" style="float:right"></div></div>
            </div>
        </div>
        <div id="game-msg" style="text-align:center; font-size: 20px; color: #555;">[Z] PUNCH | [X] KICK | [C] SPECIAL | [SHIFT] DASH</div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/** * SQUAD SHOWDOWN V16 - ENGINE CORE
 * Designed for Alvin Phanestu (Flaust)
 */

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// --- GAME STATE ---
let gameState = 'MENU';
let player, enemy;
let particles = [];
let items = [];
let frame = 0;
let shakeAmount = 0;
let selectedHero = 'FLAUST';

const HEROES = {
    FLAUST: { color: '#00d4ff', hp: 100, speed: 8, power: 10, special: 'Sonic Blast' },
    IRON_ADM: { color: '#bdc3c7', hp: 150, speed: 4, power: 15, special: 'Audit Shield' },
    VINLESS: { color: '#9b59b6', hp: 90, speed: 12, power: 8, special: 'Ghost Dash' },
    RE_OK: { color: '#f1c40f', hp: 110, speed: 7, power: 12, special: 'Rock Scream' },
    PHAN_TOM: { color: '#2ecc71', hp: 100, speed: 6, power: 13, special: 'Market Crash' }
};

const WEAPONS = {
    SWORD: { damage: 15, range: 100, color: '#fff' },
    AXE: { damage: 25, range: 80, color: '#e67e22' },
    BAT: { damage: 10, range: 110, color: '#f1c40f' }
};

// --- CLASSES ---

class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 10;
        this.vy = (Math.random() - 0.5) * 10;
        this.life = 1.0;
        this.color = color;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.2; // Gravity
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, 4, 4);
        ctx.globalAlpha = 1;
    }
}

class Fighter {
    constructor(x, y, config, isPlayer) {
        this.x = x; this.y = y;
        this.w = 40; this.h = 120;
        this.config = config;
        this.isPlayer = isPlayer;
        this.hp = config.hp;
        this.maxHp = config.hp;
        this.mana = 0;
        this.vx = 0; this.vy = 0;
        this.grounded = false;
        this.dir = isPlayer ? 1 : -1;
        this.state = 'IDLE'; // IDLE, WALK, ATTACK, HIT, DEAD
        this.animFrame = 0;
        this.weapon = null;
        this.cooldown = 0;
    }

    update() {
        // Gravity & Physics
        this.vy += 0.8;
        this.x += this.vx;
        this.y += this.vy;

        if (this.y + this.h > canvas.height - 60) {
            this.y = canvas.height - 60 - this.h;
            this.vy = 0;
            this.grounded = true;
        }

        this.vx *= 0.8; // Friction
        if (this.cooldown > 0) this.cooldown--;
        this.mana = Math.min(100, this.mana + 0.05);

        // State machine logic
        if (this.hp <= 0) this.state = 'DEAD';
        this.animFrame++;
    }

    draw() {
        ctx.save();
        ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
        ctx.scale(this.dir, 1);
        ctx.strokeStyle = this.config.color;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';

        const bounce = Math.sin(this.animFrame * 0.1) * 2;

        // Head
        ctx.beginPath();
        ctx.arc(0, -50 + bounce, 12, 0, Math.PI * 2);
        ctx.stroke();

        // Body
        ctx.beginPath();
        ctx.moveTo(0, -38 + bounce);
        ctx.lineTo(0, 5);
        ctx.stroke();

        // Arms (Dynamic based on state)
        let armAngle = Math.sin(this.animFrame * 0.1) * 0.5;
        if (this.state === 'ATTACK_Z') armAngle = -1.5;
        if (this.state === 'ATTACK_X') armAngle = 0.5;

        // Arm L
        ctx.beginPath(); ctx.moveTo(0, -30); ctx.lineTo(-15, -10 + armAngle * 10); ctx.stroke();
        // Arm R
        ctx.beginPath(); ctx.moveTo(0, -30); 
        ctx.lineTo(25 * (this.state === 'ATTACK_Z' ? 1.5 : 1), -10 + armAngle * 20); 
        ctx.stroke();

        // Legs
        let legMove = Math.cos(this.animFrame * 0.1) * 20;
        if (Math.abs(this.vx) < 1) legMove = 5;
        
        ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(-legMove, 45); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 5); ctx.lineTo(legMove, 45); ctx.stroke();

        // Weapon
        if (this.weapon) {
            ctx.fillStyle = WEAPONS[this.weapon].color;
            ctx.fillRect(20, -20, 40, 5);
        }

        ctx.restore();
    }

    attack(type) {
        if (this.cooldown > 0) return;
        this.state = type === 'Z' ? 'ATTACK_Z' : 'ATTACK_X';
        this.cooldown = 20;

        let range = this.weapon ? WEAPONS[this.weapon].range : 70;
        let damage = (type === 'Z' ? 8 : 15) + (this.weapon ? WEAPONS[this.weapon].damage : 0);

        // Hit Detection
        let target = this.isPlayer ? enemy : player;
        let dist = Math.abs((this.x + this.w/2) - (target.x + target.w/2));
        
        if (dist < range && Math.abs(this.y - target.y) < 50) {
            target.takeDamage(damage);
            createBurst(target.x + target.w/2, target.y + 40, 15, '#ff0000');
            shakeAmount = 10;
        }

        setTimeout(() => this.state = 'IDLE', 200);
    }

    takeDamage(dmg) {
        this.hp -= dmg;
        this.vx += this.dir * -10; // Knockback
        this.mana += 5;
        if (this.hp < 0) this.hp = 0;
        updateUI();
    }
}

// --- CORE ENGINE ---

function initGame() {
    document.getElementById('start-menu').style.display = 'none';
    document.getElementById('p-name-label').innerText = selectedHero;
    
    player = new Fighter(100, 0, HEROES[selectedHero], true);
    enemy = new Fighter(canvas.width - 200, 0, HEROES.PHAN_TOM, false);
    
    gameState = 'PLAYING';
    requestAnimationFrame(mainLoop);
}

function mainLoop() {
    if (gameState !== 'PLAYING') return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Screen Shake
    if (shakeAmount > 0) {
        ctx.translate(Math.random() * shakeAmount, Math.random() * shakeAmount);
        shakeAmount *= 0.9;
    }

    handleInput();
    updateAI();
    spawnDrops();

    // Update & Draw Drops
    items.forEach((item, index) => {
        ctx.fillStyle = WEAPONS[item.type].color;
        ctx.fillRect(item.x, item.y, 20, 20);
        item.y += 2;
        if (item.y > canvas.height - 80) item.y = canvas.height - 80;
        
        // Pick up
        if (Math.abs(player.x - item.x) < 40 && Math.abs(player.y - item.y) < 40) {
            player.weapon = item.type;
            items.splice(index, 1);
        }
    });

    player.update();
    player.draw();
    
    enemy.update();
    enemy.draw();

    particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.life <= 0) particles.splice(i, 1);
    });

    frame++;
    updateUI();
    requestAnimationFrame(mainLoop);
}

function handleInput() {
    const keys = inputKeys;
    if (keys['ArrowLeft']) { player.vx = -player.config.speed; player.dir = -1; }
    if (keys['ArrowRight']) { player.vx = player.config.speed; player.dir = 1; }
    if (keys['ArrowUp'] && player.grounded) { player.vy = -15; player.grounded = false; }
    
    if (keys['KeyZ']) player.attack('Z');
    if (keys['KeyX']) player.attack('X');
    
    if (keys['ShiftLeft']) { // Dash
        player.vx = player.dir * 25;
        createBurst(player.x, player.y + 60, 5, player.config.color);
    }
}

function updateAI() {
    let dist = player.x - enemy.x;
    enemy.dir = dist > 0 ? 1 : -1;

    if (Math.abs(dist) > 80) {
        enemy.vx = enemy.dir * (enemy.config.speed - 1);
    } else {
        if (Math.random() > 0.95) enemy.attack(Math.random() > 0.5 ? 'Z' : 'X');
    }
}

function spawnDrops() {
    if (frame % 600 === 0) {
        const types = Object.keys(WEAPONS);
        items.push({
            x: Math.random() * (canvas.width - 100) + 50,
            y: -50,
            type: types[Math.floor(Math.random() * types.length)]
        });
    }
}

function createBurst(x, y, count, color) {
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color));
}

function updateUI() {
    document.getElementById('p-hp').style.width = (player.hp / player.maxHp * 100) + "%";
    document.getElementById('e-hp').style.width = (enemy.hp / enemy.maxHp * 100) + "%";
    document.getElementById('p-mana').style.width = player.mana + "%";
    document.getElementById('e-mana').style.width = enemy.mana + "%";
}

// --- INPUT HANDLER ---
const inputKeys = {};
window.onkeydown = (e) => inputKeys[e.code] = true;
window.onkeyup = (e) => inputKeys[e.code] = false;

// --- INIT SELECTION ---
const grid = document.getElementById('charGrid');
Object.keys(HEROES).forEach(key => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div style="font-size:30px; color:${HEROES[key].color}">★</div><h3>${key}</h3>`;
    card.onclick = () => {
        selectedHero = key;
        document.querySelectorAll('.card').forEach(c => c.style.borderColor = '#333');
        card.style.borderColor = HEROES[key].color;
    };
    grid.appendChild(card);
});

</script>
</body>
</html>
