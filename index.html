<!DOCTYPE html>
<html>
<head>
    <title>SQUAD FISHING - SIHANOUKVILLE EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #001a33; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        #setup { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #00d4ff; border: none; border-radius: 10px; font-weight: bold; }
        
        #tension-bar { 
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 300px; height: 30px; background: rgba(255,255,255,0.2); 
            border: 3px solid #fff; display: none; overflow: hidden;
        }
        #tension-fill { width: 0%; height: 100%; background: #2ecc71; transition: 0.1s; }
        
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; font-size: 40px; text-shadow: 2px 2px #000; opacity: 0; transition: 0.3s; }
        #stats { position: absolute; top: 20px; left: 20px; font-size: 24px; color: #00d4ff; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff;">SQUAD FISHING SIM</h1>
    <p style="color: #aaa;">LOKASI: SIHANOUKVILLE COAST</p>
    <button class="btn" onclick="startFishing()">LEMPAR KAIL! 🎣</button>
</div>

<div id="ui">
    <div id="stats">HASIL TANGKAPAN: <span id="count">0</span> kg</div>
    <div id="msg">STRIKE!!!</div>
    <div id="tension-bar"><div id="tension-fill"></div></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, water;
    let isFishing = false, isHooked = false, tension = 0;
    let fishCount = 0;

    function startFishing() {
        document.getElementById('setup').style.display = 'none';
        init();
    }
    window.startFishing = startFishing;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x001a33);
        scene.fog = new THREE.FogExp2(0x001a33, 0.02);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15); camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));

        // Permukaan Air
        const waterGeo = new THREE.PlaneGeometry(100, 100, 32, 32);
        const waterMat = new THREE.MeshStandardMaterial({ color: 0x0077be, transparent: true, opacity: 0.8, wireframe: false });
        water = new THREE.Mesh(waterGeo, waterMat);
        water.rotation.x = -Math.PI/2;
        scene.add(water);

        // Pelampung (Bobber)
        const bobber = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 16, 16),
            new THREE.MeshStandardMaterial({color: 0xff0000})
        );
        bobber.position.set(0, 0, 5);
        scene.add(bobber);

        animate();
        waitLevel();
    }

    function waitLevel() {
        // Simulasi nunggu ikan makan umpan
        setTimeout(() => {
            const hitMsg = document.getElementById('msg');
            hitMsg.innerText = "STRIKE! PENCET SPASI TERUS!";
            hitMsg.style.opacity = 1;
            document.getElementById('tension-bar').style.display = 'block';
            isHooked = true;
        }, 3000 + Math.random() * 5000);
    }

    // Input Control
    window.addEventListener('keydown', (e) => {
        if(e.code === 'Space' && isHooked) {
            tension += 15; // Tarik!
        }
    });

    function animate() {
        requestAnimationFrame(animate);
        
        // Animasi Air MSI Edition (Gelombang Halus)
        water.geometry.attributes.position.array.forEach((v, i) => {
            if(i % 3 === 2) { // z-axis in plane geometry
                water.geometry.attributes.position.array[i] = Math.sin(Date.now() * 0.002 + i) * 0.2;
            }
        });
        water.geometry.attributes.position.needsUpdate = true;

        if(isHooked) {
            tension -= 0.5; // Ikan narik balik
            if(tension < 0) tension = 0;
            
            const fill = document.getElementById('tension-fill');
            fill.style.width = tension + '%';
            
            // Warna bar berubah kalau mau putus
            if(tension > 80) fill.style.background = '#e74c3c';
            else fill.style.background = '#2ecc71';

            if(tension >= 100) { // BERHASIL!
                isHooked = false;
                tension = 0;
                fishCount += Math.floor(Math.random() * 5) + 1;
                document.getElementById('count').innerText = fishCount;
                document.getElementById('msg').innerText = "DAPET IKAN! 🎉";
                document.getElementById('tension-bar').style.display = 'none';
                setTimeout(() => {
                    document.getElementById('msg').style.opacity = 0;
                    waitLevel();
                }, 2000);
            }
        }

        renderer.render(scene, camera);
    }
</script>
</body>
</html>
