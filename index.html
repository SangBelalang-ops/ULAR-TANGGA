<!DOCTYPE html>
<html>
<head>
    <title>SQUAD HERO V3 - NOTES FIXED</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: #fff; text-align: center; }
        #setup { position: absolute; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 20px 60px; font-size: 25px; cursor: pointer; background: #00d4ff; border: none; border-radius: 15px; font-weight: 900; color: #000; }
        #stats { position: absolute; top: 20px; left: 20px; font-size: 30px; text-align: left; }
        #combo { font-size: 50px; color: #f1c40f; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff; font-size: 50px;">SQUAD HERO V3</h1>
    <p style="color: #666;">FIXED NOTES VISUAL</p>
    <button class="btn" onclick="startPlay()">START SHREDDING! 🎸</button>
</div>

<div id="ui">
    <div id="stats">SKOR: <span id="sc">0</span><br><span id="combo">0x</span></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, audioCtx;
    let notes = [], score = 0, combo = 0, startTime = 0;
    let isPlaying = false;

    // TRACK: Detik muncul, Key (0-3)
    const TRACK = [
        {t: 1, k: 0}, {t: 2, k: 1}, {t: 3, k: 2}, {t: 4, k: 3},
        {t: 5, k: 0}, {t: 5.5, k: 1}, {t: 6, k: 2}, {t: 6.5, k: 3},
        {t: 8, k: 0}, {t: 8.2, k: 0}, {t: 9, k: 1}, {t: 9.5, k: 2},
        {t: 10, k: 3}, {t: 11, k: 0}, {t: 12, k: 1}, {t: 13, k: 2}
    ];

    const COLORS = [0x00ff00, 0xff0000, 0xffff00, 0x00aaff];
    const KEYS = ["KeyA", "KeyS", "KeyK", "KeyL"];

    window.startPlay = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('setup').style.display = 'none';
        init();
    };

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12); camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // Papan Jalan
        const road = new THREE.Mesh(new THREE.PlaneGeometry(8, 200), new THREE.MeshStandardMaterial({color: 0x111111}));
        road.rotation.x = -Math.PI/2;
        scene.add(road);

        // Garis Target (HIT ZONE)
        const target = new THREE.Mesh(new THREE.PlaneGeometry(8, 0.6), new THREE.MeshBasicMaterial({color: 0xffffff}));
        target.rotation.x = -Math.PI/2;
        target.position.set(0, 0.1, 8); // Di bawah kamera pas
        scene.add(target);

        // Spawn Semua Notes
        TRACK.forEach(n => {
            const ball = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 16),
                new THREE.MeshStandardMaterial({color: COLORS[n.k], emissive: COLORS[n.k], emissiveIntensity: 2})
            );
            // Spawn posisi Z jauh berdasarkan waktu detik
            ball.position.set(n.k*2 - 3, 0.5, n.t * -25); 
            scene.add(ball);
            notes.push({mesh: ball, time: n.t, key: n.k, hit: false});
        });

        startTime = Date.now();
        isPlaying = true;
        animate();
    }

    window.addEventListener('keydown', (e) => {
        if(!isPlaying) return;
        const idx = KEYS.indexOf(e.code);
        if(idx === -1) return;

        playTone(idx);
        const now = (Date.now() - startTime) / 1000;

        for(let n of notes) {
            // Cek jarak nada ke hit zone (z=8)
            const dist = Math.abs(n.mesh.position.z - 8);
            if(!n.hit && n.key === idx && dist < 1.5) {
                n.hit = true;
                n.mesh.visible = false;
                score += 100; combo++;
                updateUI();
                return;
            }
        }
        combo = 0; updateUI();
    });

    function playTone(k) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = [261, 329, 392, 523][k];
        osc.type = 'sawtooth';
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }

    function updateUI() {
        document.getElementById('sc').innerText = score;
        document.getElementById('combo').innerText = combo + "x";
    }

    function animate() {
        if(!isPlaying) return;
        requestAnimationFrame(animate);
        const elapsed = (Date.now() - startTime) / 1000;

        notes.forEach(n => {
            if(!n.hit) {
                // Kecepatan 25 unit per detik menuju arah positif Z (kamera)
                n.mesh.position.z = (elapsed * 25) + (n.time * -25);
                
                // Jika lewat kamera tapi gak dipencet
                if(n.mesh.position.z > 10 && !n.hit) {
                    n.hit = true; combo = 0; updateUI();
                }
            }
        });
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
