<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>MINECRAFT LITE: JS EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #instructions {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
            text-align: center; cursor: pointer; z-index: 10;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: white; font-size: 24px; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="instructions">
        <h1>MINECRAFT LITE</h1>
        <p>KLIK UNTUK MAIN</p>
        <p>(W,A,S,D = Jalan | MOUSE = Lihat Sekitar)</p>
    </div>
    <div id="crosshair">+</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. SETUP SCENE
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // Langit Biru
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. CONTROLS
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => {
            controls.lock();
        });

        controls.addEventListener('lock', () => {
            instructions.style.display = 'none';
        });

        controls.addEventListener('unlock', () => {
            instructions.style.display = 'block';
        });

        // 3. LIGHTING (Biar Real)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);

        // 4. BUAT DUNIA (Blocks)
        const loader = new THREE.TextureLoader();
        // Fallback warna kalau gambar gak ke-load
        const grassMat = new THREE.MeshLambertMaterial({ color: 0x4d9043 });
        const dirtMat = new THREE.MeshLambertMaterial({ color: 0x8b4513 });
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);

        for (let x = -15; x < 15; x++) {
            for (let z = -15; z < 15; z++) {
                // Lantai Rumput
                const grass = new THREE.Mesh(boxGeo, grassMat);
                grass.position.set(x, 0, z);
                scene.add(grass);

                // Lapisan Tanah di bawahnya
                const dirt = new THREE.Mesh(boxGeo, dirtMat);
                dirt.position.set(x, -1, z);
                scene.add(dirt);
            }
        }

        // Tambah beberapa pohon "absurd" (tumpukan block)
        for (let i = 0; i < 10; i++) {
            const tx = Math.floor(Math.random() * 20) - 10;
            const tz = Math.floor(Math.random() * 20) - 10;
            
            // Batang
            for (let h = 1; h < 4; h++) {
                const trunk = new THREE.Mesh(boxGeo, new THREE.MeshLambertMaterial({ color: 0x5d2906 }));
                trunk.position.set(tx, h, tz);
                scene.add(trunk);
            }
            // Daun
            const leaf = new THREE.Mesh(boxGeo, new THREE.MeshLambertMaterial({ color: 0x228b22 }));
            leaf.position.set(tx, 4, tz);
            scene.add(leaf);
        }

        camera.position.y = 2; // Tinggi mata pemain

        // 5. MOVEMENT LOGIC
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const onKeyDown = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
            }
        };

        const onKeyUp = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // 6. ANIMATION LOOP
        let prevTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const time = performance.now();
                const delta = (time - prevTime) / 1000;

                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                prevTime = time;
            }

            renderer.render(scene, camera);
        }

        animate();

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
