<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ULARTANGGA SQUAD | PNG EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        
        #game-container { max-width: 500px; margin: auto; padding: 10px; padding-bottom: 160px; display: none; }
        
        /* GRID BOARD */
        #board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 2px;
            background: #1e293b;
            border: 4px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1/1;
            position: relative;
        }
        .cell {
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            font-weight: 800;
            color: rgba(255,255,255,0.05);
            position: relative;
        }
        .cell:nth-child(even) { background: #1e293b; }
        
        .ladder-start { border: 2px solid #22c55e; background: rgba(34, 197, 94, 0.1) !important; }
        .snake-start { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1) !important; }

        /* PAWN PNG STYLE */
        .pawn-head {
            width: 32px; height: 32px;
            position: absolute;
            z-index: 40;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
        }

        /* OVERLAYS */
        #start-overlay {
            position: fixed; inset: 0; background: #020617; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        .avatar-card {
            background: #0f172a; border: 2px solid #334155; border-radius: 12px;
            padding: 10px; cursor: pointer; transition: 0.3s; text-align: center;
        }
        .avatar-card.selected { border-color: #3b82f6; background: rgba(59, 130, 246, 0.2); transform: scale(1.05); }

        .dice {
            width: 65px; height: 65px; background: #fff; color: #000; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
            cursor: pointer; box-shadow: 0 8px 15px rgba(0,0,0,0.4);
        }
        .dice-rolling { animation: shake 0.2s infinite; }
        @keyframes shake { 0%{transform:rotate(0)} 25%{transform:rotate(5deg)} 75%{transform:rotate(-5deg)} 100%{transform:rotate(0)} }

        .controls-box {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px);
            padding: 20px; border-top: 1px solid #334155; display: none;
        }
    </style>
</head>
<body>

<!-- SCREEN 1: PILIH PEMAIN -->
<div id="start-overlay">
    <h1 class="text-3xl font-black italic mb-2 text-blue-500 text-center">ULARTANGGA <span class="text-white">SQUAD</span></h1>
    <p class="text-xs font-bold text-slate-400 mb-8 uppercase tracking-widest text-center">Pilih 6 Pemain buat Mabar!</p>
    
    <div class="grid grid-cols-2 gap-4 mb-10 w-full max-w-sm" id="avatar-list"></div>

    <button id="start-btn" class="w-full max-w-sm bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest opacity-50 cursor-not-allowed" disabled>
        GAS MAIN!
    </button>
</div>

<!-- SCREEN 2: GAME BOARD -->
<div id="game-container">
    <div id="board"></div>
</div>

<!-- CONTROLS -->
<div class="controls-box" id="controls">
    <div class="flex items-center justify-between mb-4">
        <div id="dice" class="dice" onclick="rollDice()">🎲</div>
        <div class="text-right">
            <p id="current-player-name" class="text-sm font-black uppercase text-blue-400">Giliran: ---</p>
            <p class="text-[10px] text-slate-500 font-bold uppercase">Ketuk dadu untuk jalan</p>
        </div>
    </div>
    <div class="grid grid-cols-6 gap-2" id="legend"></div>
</div>

<script>
    const board = document.getElementById('board');
    
    // DATA PEMAIN (Pastikan upload lilas.png, albert.png, dll ke GitHub)
    const playerData = [
        { id: 0, name: "Lilas", img: "lilas.png" },
        { id: 1, name: "Albert", img: "albert.png" },
        { id: 2, name: "Tegar", img: "tegar.png" },
        { id: 3, name: "Meggy", img: "meggy.png" },
        { id: 4, name: "Anjas", img: "anjas.png" },
        { id: 5, name: "Piter", img: "piter.png" }
    ];

    let players = [];
    let turn = 0;
    let isMoving = false;

    const jumps = {
        2: 38, 7: 14, 8: 31, 15: 26, 21: 42, 36: 44, 51: 67, 71: 91, 78: 98,
        16: 6, 46: 25, 49: 11, 62: 19, 64: 60, 74: 53, 89: 68, 95: 75, 99: 80
    };

    function initSelection() {
        const list = document.getElementById('avatar-list');
        list.innerHTML = playerData.map((p, i) => `
            <div class="avatar-card" id="card-${i}" onclick="toggleSelect(${i})">
                <img src="${p.img}" class="w-12 h-12 mx-auto mb-2 pointer-events-none" onerror="this.src='https://via.placeholder.com/50?text=${p.name[0]}'">
                <p class="text-[10px] font-black uppercase tracking-tighter">${p.name}</p>
            </div>
        `).join('');
    }

    let selectedIdx = [];
    function toggleSelect(i) {
        const card = document.getElementById(`card-${i}`);
        if (selectedIdx.includes(i)) {
            selectedIdx = selectedIdx.filter(id => id !== i);
            card.classList.remove('selected');
        } else {
            selectedIdx.push(i);
            card.classList.add('selected');
        }
        
        const btn = document.getElementById('start-btn');
        if (selectedIdx.length === 6) {
            btn.disabled = false;
            btn.classList.replace('opacity-50', 'opacity-100');
            btn.classList.add('bg-blue-500', 'shadow-lg');
        } else {
            btn.disabled = true;
            btn.classList.replace('opacity-100', 'opacity-50');
        }
    }

    document.getElementById('start-btn').onclick = () => {
        players = selectedIdx.map(idx => ({ ...playerData[idx], pos: 1 }));
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('game-container').style.display = 'block';
        document.getElementById('controls').style.display = 'block';
        createBoard();
    };

    function createBoard() {
        for (let r = 9; r >= 0; r--) {
            for (let c = 0; c < 10; c++) {
                let num = (r % 2 === 0) ? (r * 10 + c + 1) : (r * 10 + (10 - c));
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${num}`;
                cell.innerHTML = `<span>${num}</span>`;
                if (jumps[num]) cell.classList.add(jumps[num] > num ? 'ladder-start' : 'snake-start');
                board.appendChild(cell);
            }
        }
        updateGame();
    }

    function updateGame() {
        document.querySelectorAll('.pawn-head').forEach(p => p.remove());
        players.forEach((p, i) => {
            const cell = document.getElementById(`cell-${p.pos}`);
            const head = document.createElement('div');
            head.className = 'pawn-head';
            head.style.backgroundImage = `url('${p.img}')`;
            head.style.transform = `translate(${i*3-8}px, ${i*3-8}px)`;
            cell.appendChild(head);
        });
        
        document.getElementById('current-player-name').innerText = `Giliran: ${players[turn].name}`;
        
        const legend = document.getElementById('legend');
        legend.innerHTML = players.map((p, i) => `
            <div class="flex flex-col items-center ${turn === i ? 'opacity-100 scale-110' : 'opacity-30'}">
                <img src="${p.img}" class="w-8 h-8 rounded-full border-2 ${turn === i ? 'border-blue-500' : 'border-transparent'}">
                <p class="text-[8px] font-bold mt-1">${p.name}</p>
            </div>
        `).join('');
    }

    function rollDice() {
        if (isMoving) return;
        isMoving = true;
        const d = document.getElementById('dice');
        d.classList.add('dice-rolling');
        
        setTimeout(() => {
            const val = Math.floor(Math.random() * 6) + 1;
            const icons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
            d.innerHTML = icons[val-1];
            d.classList.remove('dice-rolling');
            movePlayer(val);
        }, 600);
    }

    async function movePlayer(step) {
        let p = players[turn];
        for (let i = 0; i < step; i++) {
            if (p.pos < 100) {
                p.pos++;
                updateGame();
                await new Promise(r => setTimeout(r, 250));
            }
        }
        if (jumps[p.pos]) {
            await new Promise(r => setTimeout(r, 500));
            p.pos = jumps[p.pos];
            updateGame();
        }
        if (p.pos === 100) {
            alert(`GOKIL! ${p.name} MENANG!`);
            location.reload();
            return;
        }
        turn = (turn + 1) % players.length;
        updateGame();
        isMoving = false;
    }

    initSelection();
</script>
</body>
</html>
