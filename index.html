<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER: REAL 3D EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; color: white; z-index: 10; }
        #setup { position: absolute; inset: 0; background: #16213e; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; pointer-events: auto; }
        .btn { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #e94560; border: none; border-radius: 10px; font-weight: bold; color: #fff; transition: 0.3s; box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4); }
        .btn:hover:not(:disabled) { transform: translateY(-3px); background: #ff4d6d; }
        .btn:disabled { background: #444; opacity: 0.5; }
        #log { position: absolute; top: 20px; left: 20px; background: rgba(15, 52, 96, 0.9); padding: 20px; border-radius: 12px; width: 250px; border-bottom: 5px solid #e94560; height: 150px; overflow-y: auto; font-size: 14px; }
        .status { position: absolute; top: 20px; right: 20px; font-size: 24px; font-weight: bold; color: #00ffcc; text-shadow: 2px 2px #000; }
        input { padding: 12px; width: 220px; margin: 15px; border-radius: 8px; border: none; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #e94560; font-size: 50px; margin-bottom: 10px;">SQUAD LADDER 🐍</h1>
    <p style="color: #00ffcc;">ONLINE MULTIPLAYER REAL-TIME</p>
    <input type="text" id="playerName" placeholder="Nama Kamu...">
    <button class="btn" onclick="startGame()">MASUK ARENA</button>
</div>

<div id="ui">
    <div id="log"><b>GAME LOG:</b><br><span id="msg">Ayo mabar, Vin!</span></div>
    <div class="status" id="turnInfo">MENUNGGU...</div>
    <div id="controls"><button id="rollBtn" class="btn" onclick="handleRoll()" disabled>KOCOK DADU! 🎲</button></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder/state');

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false, targetCamPos = new THREE.Vector3(0, 15, 12);
    let targetLookAt = new THREE.Vector3(0, 0, 0);

    const LADDERS = { 3: 21, 8: 30, 28: 54, 58: 77, 75: 95 };
    const SNAKES = { 25: 6, 44: 19, 68: 48, 91: 71, 98: 10 };

    window.startGame = () => {
        myName = document.getElementById('playerName').value.trim();
        if(!myName) return alert("Nama jangan kosong dong!");
        document.getElementById('setup').style.display = 'none';
        initThree();
        syncWithFirebase();
    };

    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);

        createBoard();
        createObstacles(); // GANTINYA CATUR: TAMBAH ULAR & TANGGA
        animate();
    }

    function createBoard() {
        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = row % 2 === 0 ? (i % 10) : (9 - (i % 10));
            const geo = new THREE.BoxGeometry(1.1, 0.2, 1.1);
            const mat = new THREE.MeshStandardMaterial({ 
                color: (row + col) % 2 === 0 ? 0xffffff : 0xeeeeee,
                metalness: 0.1, roughness: 0.8
            });
            const tile = new THREE.Mesh(geo, mat);
            tile.position.set(col * 1.2 - 5.4, 0, row * 1.2 - 5.4);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createObstacles() {
        // VISUAL ULAR (Tube Merah)
        Object.entries(SNAKES).forEach(([start, end]) => {
            const curve = new THREE.QuadraticBezierCurve3(
                boardPos[start].clone().add(new THREE.Vector3(0, 0.2, 0)),
                new THREE.Vector3((boardPos[start].x + boardPos[end].x)/2, 2, (boardPos[start].z + boardPos[end].z)/2),
                boardPos[end].clone().add(new THREE.Vector3(0, 0.2, 0))
            );
            const geo = new THREE.TubeGeometry(curve, 20, 0.1, 8, false);
            scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0xff0000})));
        });

        // VISUAL TANGGA (Dua tiang Hijau)
        Object.entries(LADDERS).forEach(([start, end]) => {
            for(let side = -0.3; side <= 0.3; side += 0.6) {
                const curve = new THREE.LineCurve3(
                    boardPos[start].clone().add(new THREE.Vector3(side, 0.1, 0)),
                    boardPos[end].clone().add(new THREE.Vector3(side, 0.1, 0))
                );
                const geo = new THREE.TubeGeometry(curve, 2, 0.05, 8, false);
                scene.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color: 0x00ff00})));
            }
        });
    }

    async function syncWithFirebase() {
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                set(gameRef, { turn: 0, players: [{name: myName, pos: 0, color: '#e94560'}] });
                return;
            }
            const serverPlayers = data.players || [];
            let found = false;
            serverPlayers.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
                if(!playerModels[idx]) createPlayer(idx, p);
                const target = boardPos[p.pos].clone().add(new THREE.Vector3(0, 0.5, 0));
                playerModels[idx].position.lerp(target, 0.1);
            });
            if(!found) {
                myId = serverPlayers.length;
                serverPlayers.push({ name: myName, pos: 0, color: '#'+Math.floor(Math.random()*16777215).toString(16) });
                update(gameRef, { players: serverPlayers });
            }
            const activeP = serverPlayers[data.turn];
            document.getElementById('turnInfo').innerText = `GILIRAN: ${activeP.name}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving);
        });
    }

    function createPlayer(id, data) {
        const group = new THREE.Group();
        group.add(new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({color: data.color})));
        const loader = new THREE.TextureLoader();
        const face = new THREE.Sprite(new THREE.SpriteMaterial({ map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${data.name}`) }));
        face.position.y = 0.8; face.scale.set(0.6, 0.6, 1);
        group.add(face);
        scene.add(group);
        playerModels[id] = group;
    }

    window.handleRoll = async () => {
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        addLog(`Dadu: ${roll}`);
        
        const snapshot = await get(gameRef);
        const data = snapshot.val();
        let newPos = data.players[myId].pos + roll;
        if(newPos > 99) newPos = 99;

        targetCamPos.set(playerModels[myId].position.x, 5, playerModels[myId].position.z + 5);
        targetLookAt.copy(playerModels[myId].position);

        setTimeout(() => {
            if(LADDERS[newPos]) { addLog("NAIK TANGGA! 🚀"); newPos = LADDERS[newPos]; }
            else if(SNAKES[newPos]) { addLog("DIGIGIT ULAR! 🐍"); newPos = SNAKES[newPos]; }
            
            const nextTurn = (data.turn + 1) % data.players.length;
            const updatedPlayers = data.players;
            updatedPlayers[myId].pos = newPos;
            update(gameRef, { turn: nextTurn, players: updatedPlayers });
            
            targetCamPos.set(0, 15, 12);
            targetLookAt.set(0, 0, 0);
            isMoving = false;
        }, 1500);
    };

    function addLog(msg) { document.getElementById('msg').innerHTML = `> ${msg}<br>` + document.getElementById('msg').innerHTML; }

    function animate() {
        requestAnimationFrame(animate);
        camera.position.lerp(targetCamPos, 0.05);
        camera.lookAt(targetLookAt);
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
