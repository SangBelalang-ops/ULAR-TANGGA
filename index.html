<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER ONLINE: POV EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; color: white; }
        #setup { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; pointer-events: auto; }
        .btn { padding: 15px 35px; font-size: 18px; cursor: pointer; background: #00d4ff; border: none; border-radius: 8px; font-weight: bold; color: #000; transition: 0.3s; }
        .btn:disabled { background: #444; cursor: not-allowed; }
        #log { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 10px; width: 250px; border-left: 4px solid #00d4ff; }
        .status { position: absolute; top: 20px; right: 20px; font-size: 24px; color: #00ff00; }
        input { padding: 10px; width: 200px; margin: 10px; border-radius: 5px; border: none; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff;">ONLINE SQUAD LADDER</h1>
    <p>MSI i7 POWERED ENGINE</p>
    <input type="text" id="playerName" placeholder="Nama Kamu (Contoh: Alvin)">
    <button class="btn" onclick="startGame()">MASUK SERVER</button>
</div>

<div id="ui">
    <div id="log"><b>GAME LOG:</b><br><span id="msg">Menunggu pemain...</span></div>
    <div class="status" id="turnInfo">GILIRAN: ---</div>
    <div id="controls">
        <button id="rollBtn" class="btn" onclick="handleRoll()" disabled>KOCOK DADU! 🎲</button>
    </div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update } from 'firebase/database';

    // === KONFIGURASI FIREBASE (GANTI PAKE PUNYA LO, VIN!) ===
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        databaseURL: "https://YOUR_PROJECT.firebaseio.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder/state');

    // === GAME VARS ===
    let scene, camera, renderer, clock;
    let myName = "", myId = null;
    let players = {}, playerModels = {};
    let boardPos = [];
    let isMoving = false;
    let targetCamPos = new THREE.Vector3(0, 15, 15);
    let targetLookAt = new THREE.Vector3(0, 0, 0);

    const LADDERS = { 3: 22, 12: 35, 45: 75, 60: 85 };
    const SNAKES = { 25: 5, 55: 20, 90: 50, 98: 10 };

    window.startGame = () => {
        myName = document.getElementById('playerName').value;
        if(!myName) return alert("Isi nama dulu, bre!");
        document.getElementById('setup').style.display = 'none';
        initGame();
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.Fog(0x020205, 10, 50);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const amb = new THREE.AmbientLight(0xffffff, 0.5);
        const sun = new THREE.PointLight(0x00d4ff, 2, 100);
        sun.position.set(0, 20, 0);
        scene.add(amb, sun);

        createBoard();
        listenToServer();
        animate();
    }

    function createBoard() {
        const geo = new THREE.BoxGeometry(1, 0.2, 1);
        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = row % 2 === 0 ? (i % 10) : (9 - (i % 10));
            const mat = new THREE.MeshStandardMaterial({ 
                color: (row + col) % 2 === 0 ? 0x111111 : 0x222222,
                emissive: LADDERS[i] ? 0x00ff00 : (SNAKES[i] ? 0xff0000 : 0x000000),
                emissiveIntensity: 0.5
            });
            const tile = new THREE.Mesh(geo, mat);
            tile.position.set(col * 1.1 - 5, 0, row * 1.1 - 5);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function listenToServer() {
        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if(!data) {
                // Init database if empty
                set(gameRef, { turn: 0, players: [{name: myName, pos: 0, color: '#00ffcc'}] });
                return;
            }

            // Sync Players
            const serverPlayers = data.players || [];
            let found = false;
            serverPlayers.forEach((p, index) => {
                if(p.name === myName) { myId = index; found = true; }
                syncPlayerModel(index, p);
            });

            if(!found) {
                serverPlayers.push({name: myName, pos: 0, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players: serverPlayers });
            }

            // Update UI
            const activePlayer = serverPlayers[data.turn];
            document.getElementById('turnInfo').innerText = `GILIRAN: ${activePlayer.name}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving);
        });
    }

    function syncPlayerModel(id, data) {
        if(!playerModels[id]) {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.ConeGeometry(0.3, 0.8, 16), new THREE.MeshStandardMaterial({color: data.color}));
            
            // Avatar Muka (Dicebear API)
            const loader = new THREE.TextureLoader();
            const spriteMat = new THREE.SpriteMaterial({ map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${data.name}`) });
            const face = new THREE.Sprite(spriteMat);
            face.position.y = 1; face.scale.set(0.7, 0.7, 1);
            
            group.add(body, face);
            scene.add(group);
            playerModels[id] = group;
        }
        
        // Smooth Move Logic
        const targetPos = boardPos[data.pos].clone();
        targetPos.y = 0.5;
        playerModels[id].position.lerp(targetPos, 0.1);
    }

    window.handleRoll = async () => {
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('msg').innerText = `Kamu kocok: ${roll}!`;
        
        onValue(gameRef, (snap) => {
            const data = snap.val();
            let newPos = data.players[myId].pos + roll;
            if(newPos > 99) newPos = 99;

            // POV CAMERA MODE
            setCameraPOV(myId);

            setTimeout(() => {
                // Cek Snake/Ladder
                if(LADDERS[newPos]) newPos = LADDERS[newPos];
                if(SNAKES[newPos]) newPos = SNAKES[newPos];

                const nextTurn = (data.turn + 1) % data.players.length;
                const updatedPlayers = data.players;
                updatedPlayers[myId].pos = newPos;

                update(gameRef, { turn: nextTurn, players: updatedPlayers });
                
                // BACK TO GLOBAL CAMERA
                resetCamera();
                isMoving = false;
            }, 2000);
        }, { onlyOnce: true });
    };

    function setCameraPOV(id) {
        const model = playerModels[id];
        // Taruh kamera di belakang pion
        targetCamPos.set(model.position.x, 3, model.position.z + 4);
        targetLookAt.copy(model.position);
    }

    function resetCamera() {
        targetCamPos.set(0, 15, 15);
        targetLookAt.set(0, 0, 0);
    }

    function animate() {
        requestAnimationFrame(animate);
        
        // Smooth Camera Transition
        camera.position.lerp(targetCamPos, 0.05);
        const currentLookAt = new THREE.Vector3();
        currentLookAt.lerpVectors(new THREE.Vector3(0,0,0), targetLookAt, 0.05);
        camera.lookAt(targetLookAt);

        renderer.render(scene, camera);
    }

    initGame();
</script>
</body>
</html>
