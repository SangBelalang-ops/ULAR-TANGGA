<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FPS SURVIVAL: GRID BUILDER</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 100%; height: 10px; border: 1px solid #fff; pointer-events: none; }
        #gui { position: absolute; inset: 0; pointer-events: none; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 12px; pointer-events: auto; }
        .slot { width: 60px; height: 60px; background: #333; border: 3px solid #555; border-radius: 8px; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; text-align: center; }
        .slot.active { border-color: #00d4ff; box-shadow: 0 0 15px #00d4ff; background: #444; }
        #stats { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 10px; }
        #instructions { position: absolute; inset: 0; background: rgba(0,0,0,0.9); color: #00d4ff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; cursor: pointer; }
    </style>
</head>
<body>

<div id="instructions">
    <h1>FPS SURVIVAL PRO</h1>
    <p>MSI i7 OPTIMIZED ENGINE</p>
    <div style="text-align: left; background: #222; padding: 20px; border: 1px solid #444;">
        [1] TANGAN - [2] PALU BANGUNAN<br>
        KLIK KIRI: ACTION | KLIK KANAN: ROTASI<br>
        WASD: JALAN | SPACE: LONCAT
    </div>
    <p style="margin-top: 20px;">KLIK UNTUK MULAI SURVIVAL</p>
</div>

<div id="gui">
    <div id="stats">
        WOOD: <span id="wood-val" style="color:#ffa500">0</span> | 
        STONE: <span id="stone-val" style="color:#aaa">0</span>
    </div>
    <div id="crosshair"></div>
    <div id="hotbar">
        <div class="slot active" id="slot1">HAND<br>[1]</div>
        <div class="slot" id="slot2">HAMMER<br>[2]</div>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    let scene, camera, renderer, controls, raycaster;
    let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;
    let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
    let wood = 0, stone = 0, activeTool = 1, buildRotation = 0;
    
    let handModel, hammerModel, ghostModel; // FPS MODELS
    let collidableObjects = [];

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 0, 50);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);
        document.getElementById('instructions').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
        controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'flex');

        raycaster = new THREE.Raycaster();

        // LIGHTS
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(ambient, sun);

        // GROUND
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({color: 0x348C31}));
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        createWorld();
        createFPSModels();
        animate();
    }

    function createWorld() {
        // Spawn Pohon & Batu Secara Random
        for(let i=0; i<30; i++) {
            const x = Math.floor(Math.random() * 40 - 20);
            const z = Math.floor(Math.random() * 40 - 20);
            
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.BoxGeometry(0.5, 3, 0.5), new THREE.MeshStandardMaterial({color: 0x5d4037}));
            trunk.position.y = 1.5; trunk.castShadow = true;
            const leaves = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({color: 0x2e7d32}));
            leaves.position.y = 3.5; leaves.castShadow = true;
            tree.add(trunk, leaves);
            tree.position.set(x, 0, z);
            tree.userData = { type: 'tree', hp: 3 };
            scene.add(tree);
            collidableObjects.push(tree);
        }
    }

    function createFPSModels() {
        // HAND MODEL
        handModel = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0xffdbac}));
        handModel.position.set(0.5, -0.4, -0.6);
        camera.add(handModel);

        // HAMMER MODEL
        hammerModel = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.3), new THREE.MeshStandardMaterial({color: 0x777777}));
        hammerModel.position.set(0.5, -0.4, -0.6);
        hammerModel.visible = false;
        camera.add(hammerModel);
        
        scene.add(camera);

        // GHOST BUILDING (Blueprint)
        ghostModel = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 0.5), new THREE.MeshStandardMaterial({color: 0x00d4ff, transparent: true, opacity: 0.4}));
        ghostModel.visible = false;
        scene.add(ghostModel);
    }

    // LOGIKA INTERAKSI
    window.addEventListener('mousedown', (e) => {
        if(!controls.isLocked) return;

        if(e.button === 0) { // Klik Kiri
            if(activeTool === 1) { // Pake Tangan (Nambang)
                raycaster.setFromCamera(new THREE.Vector2(), camera);
                const hits = raycaster.intersectObjects(collidableObjects, true);
                if(hits.length > 0 && hits[0].distance < 4) {
                    let target = hits[0].object;
                    while(target.parent !== scene) target = target.parent;
                    target.userData.hp--;
                    if(target.userData.hp <= 0) {
                        wood += 5; document.getElementById('wood-val').innerText = wood;
                        scene.remove(target);
                        collidableObjects.splice(collidableObjects.indexOf(target), 1);
                    }
                    // Animasi Tangan Mukul
                    handModel.position.z -= 0.2; setTimeout(() => handModel.position.z += 0.2, 100);
                }
            } else if(activeTool === 2 && wood >= 10) { // Pake Palu (Bangun)
                const wall = ghostModel.clone();
                wall.material = new THREE.MeshStandardMaterial({color: 0x8d6e63});
                wall.material.opacity = 1;
                wall.material.transparent = false;
                scene.add(wall);
                collidableObjects.push(wall);
                wood -= 10; document.getElementById('wood-val').innerText = wood;
            }
        }
        if(e.button === 2) { // Klik Kanan (Rotasi Bangunan)
            buildRotation += Math.PI / 2;
        }
    });

    window.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true;
        if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
        if(e.code === 'Space' && canJump) { velocity.y += 10; canJump = false; }
        if(e.key === '1') switchTool(1); if(e.key === '2') switchTool(2);
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false;
        if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
    });

    function switchTool(n) {
        activeTool = n;
        handModel.visible = (n === 1);
        hammerModel.visible = (n === 2);
        ghostModel.visible = (n === 2);
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById('slot'+n).classList.add('active');
    }

    function animate() {
        requestAnimationFrame(animate);
        const delta = 0.016; // Standar 60fps

        if (controls.isLocked) {
            // Pergerakan
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= 9.8 * 3.0 * delta;

            direction.z = Number(moveF) - Number(moveB);
            direction.x = Number(moveR) - Number(moveL);
            direction.normalize();

            if (moveF || moveB) velocity.z -= direction.z * 100.0 * delta;
            if (moveL || moveR) velocity.x -= direction.x * 100.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
            camera.position.y += (velocity.y * delta);

            if (camera.position.y < 2) { velocity.y = 0; camera.position.y = 2; canJump = true; }

            // LOGIKA GHOST BUILDING (GRID SNAPPING)
            if(activeTool === 2) {
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const targetPos = camera.position.clone().add(dir.multiplyScalar(5));
                
                // GRID SNAPPING (Nempel tiap 2 unit biar rapi)
                ghostModel.position.x = Math.round(targetPos.x / 2) * 2;
                ghostModel.position.z = Math.round(targetPos.z / 2) * 2;
                ghostModel.position.y = 1.5;
                ghostModel.rotation.y = buildRotation;
            }
        }
        renderer.render(scene, camera);
    }

    window.addEventListener('contextmenu', e => e.preventDefault());
    init();
</script>
</body>
</html>
