<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER 3D: MSI EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; pointer-events: none; z-index: 10; }
        #controls { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 20px; font-size: 20px; cursor: pointer; background: #00ffcc; border: none; border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px #00ffcc; }
        button:hover { transform: scale(1.1); background: #fff; }
        #log { background: rgba(0,0,0,0.8); padding: 15px; border-left: 5px solid #00ffcc; width: 250px; height: 150px; overflow-y: auto; font-size: 14px; }
        .turn-indicator { font-size: 24px; color: #fbbf24; text-shadow: 2px 2px #000; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="turn-indicator" id="turn">GILIRAN: PLAYER 1</div>
    <div id="log">Selamat Datang di Squad Ladder!<br>---</div>
</div>

<div id="controls">
    <button id="rollBtn">KOCOK DADU! 🎲</button>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- CONFIG SQUAD (GANTI FOTO TEMEN LO DI SINI) ---
    const PLAYER_SQUAD = [
        { name: "Meggy", color: 0xff00ff, img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Meggy" }, 
        { name: "Tegar", color: 0x00ffff, img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Tegar" },
        { name: "Bernad", color: 0xffff00, img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Bernad" },
        { name: "Alvin", color: 0x00ff00, img: "https://api.dicebear.com/7.x/avataaars/svg?seed=Alvin" }
    ];

    let scene, camera, renderer, board = [];
    let currentPlayer = 0;
    let playersModels = [];
    let playerPos = [0, 0, 0, 0]; // Posisi kotak (0-99)

    // Logika Ular & Tangga (Index Kotak)
    const shortcuts = {
        3: 20, 8: 30, 19: 5, 27: 1, 40: 60, 50: 35, 70: 90, 98: 10
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 12, 12);
        camera.lookAt(0, 0, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambLight = new THREE.AmbientLight(0xffffff, 0.8);
        const pointLight = new THREE.PointLight(0x00ffcc, 2, 50);
        pointLight.position.set(0, 10, 0);
        scene.add(ambLight, pointLight);

        createBoard();
        createPlayers();
        animate();
    }

    function createBoard() {
        const size = 10;
        const spacing = 1.1;
        const loader = new THREE.TextureLoader();

        for (let i = 0; i < 100; i++) {
            const row = Math.floor(i / 10);
            const col = row % 2 === 0 ? (i % 10) : (9 - (i % 10));
            
            const color = (row + col) % 2 === 0 ? 0x222222 : 0x444444;
            const geo = new THREE.BoxGeometry(1, 0.2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            
            // Efek kotak jebakan
            if (shortcuts[i]) {
                mat.color.set(shortcuts[i] > i ? 0x00ff00 : 0xff0000);
                mat.emissive.set(shortcuts[i] > i ? 0x003300 : 0x330000);
            }

            const cube = new THREE.Mesh(geo, mat);
            cube.position.set(col * spacing - 5, 0, row * spacing - 5);
            scene.add(cube);
            board[i] = cube.position;
        }
    }

    function createPlayers() {
        const loader = new THREE.TextureLoader();
        PLAYER_SQUAD.forEach((data, i) => {
            const group = new THREE.Group();
            
            // Pion Badan
            const body = new THREE.Mesh(
                new THREE.ConeGeometry(0.3, 0.8, 32),
                new THREE.MeshStandardMaterial({ color: data.color })
            );
            
            // Muka Temen (Pake Sprite biar selalu madep kamera)
            const map = loader.load(data.img);
            const spriteMat = new THREE.SpriteMaterial({ map: map });
            const sprite = new THREE.Sprite(spriteMat);
            sprite.position.y = 0.8;
            sprite.scale.set(0.6, 0.6, 1);
            
            group.add(body, sprite);
            group.position.copy(board[0]);
            group.position.y = 0.5;
            scene.add(group);
            playersModels.push(group);
        });
    }

    async function rollDice() {
        const roll = Math.floor(Math.random() * 6) + 1;
        const p = PLAYER_SQUAD[currentPlayer];
        addLog(`${p.name} mengocok dadu: **${roll}**`);

        // Update Posisi
        let newPos = playerPos[currentPlayer] + roll;
        if (newPos >= 99) {
            newPos = 99;
            alert(`${p.name} MENANG! GAME OVER.`);
            location.reload();
        }

        playerPos[currentPlayer] = newPos;
        movePlayerModel(currentPlayer, newPos);

        // Cek Jebakan/Tangga
        await new Promise(r => setTimeout(r, 600));
        if (shortcuts[newPos]) {
            const type = shortcuts[newPos] > newPos ? "TANGGA! 🚀" : "ULAR! 🐍";
            addLog(`${p.name} kena ${type}`);
            playerPos[currentPlayer] = shortcuts[newPos];
            movePlayerModel(currentPlayer, shortcuts[newPos]);
        }

        // Ganti Giliran
        currentPlayer = (currentPlayer + 1) % PLAYER_SQUAD.length;
        document.getElementById('turn').innerText = `GILIRAN: ${PLAYER_SQUAD[currentPlayer].name}`;
        document.getElementById('turn').style.color = `#${PLAYER_SQUAD[currentPlayer].color.toString(16)}`;
    }

    function movePlayerModel(id, posIndex) {
        const target = board[posIndex];
        const model = playersModels[id];
        // Animasi geser sederhana
        model.position.x = target.x;
        model.position.z = target.z;
    }

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += msg + "<br>";
        log.scrollTop = log.scrollHeight;
    }

    function animate() {
        requestAnimationFrame(animate);
        // Puter kamera dikit biar mantep
        scene.rotation.y += 0.001;
        renderer.render(scene, camera);
    }

    document.getElementById('rollBtn').addEventListener('click', rollDice);
    init();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
