<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER - THE REAL EDITION</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 20; color: white; }
        #setup { position: absolute; inset: 0; background: radial-gradient(circle, #222 0%, #000 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .btn { padding: 15px 45px; font-size: 22px; cursor: pointer; background: #fff; color: #000; border: 4px solid #ff4757; border-radius: 15px; font-weight: 900; transition: 0.2s; box-shadow: 0 0 20px rgba(255, 71, 87, 0.4); }
        .btn:hover:not(:disabled) { transform: scale(1.1); background: #ff4757; color: #fff; }
        .btn:disabled { opacity: 0.3; filter: grayscale(1); }
        #turn-msg { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 30px; font-weight: 900; color: #ffd700; text-shadow: 3px 3px #000; }
        input { padding: 15px; width: 250px; border-radius: 10px; border: none; font-size: 18px; margin-bottom: 20px; text-align: center; }
        #dice-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; background: white; border: 4px solid #ccc; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 60px; color: black; font-weight: bold; box-shadow: 0 0 50px white; }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #ff4757; font-size: 60px;">SQUAD LADDER 🐍</h1>
    <input type="text" id="playerName" placeholder="Nama SQUAD (Alvin/Tegar...)">
    <button class="btn" onclick="startPlay()">MASUK ARENA</button>
</div>

<div id="ui">
    <div id="turn-msg">GILIRAN: ---</div>
    <div id="dice-box">?</div>
    <div id="controls"><button id="rollBtn" class="btn" onclick="kocokDadu()" disabled>KOCOK DADU! 🎲</button></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder_v13/state');

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false;

    const LADDERS = { 2: 21, 7: 30, 27: 83, 50: 66, 70: 90 };
    const SNAKES = { 16: 5, 46: 24, 61: 17, 94: 73, 97: 76 };

    window.startPlay = () => {
        myName = document.getElementById('playerName').value.trim();
        if(!myName) return alert("Woi! Nama isi dulu!");
        document.getElementById('setup').style.display = 'none';
        init3D();
        connectFirebase();
    };

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 14, 11); camera.lookAt(0, -1, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const light = new THREE.PointLight(0xffffff, 50, 100); light.position.set(0, 10, 0);
        scene.add(light);

        createBoard();
        createUlarTangga();
        animate();
    }

    function createBoard() {
        const canvas = document.createElement('canvas');
        canvas.width = 256; canvas.height = 256;
        const ctx = canvas.getContext('2d');

        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));

            // Visual Kotak Kayu
            ctx.fillStyle = (row + col) % 2 === 0 ? '#4e342e' : '#3e2723';
            ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 10; ctx.strokeRect(0,0,256,256);
            
            // Nomor (BESAR & JELAS)
            ctx.fillStyle = '#fff'; ctx.font = 'bold 90px Arial'; ctx.textAlign = 'center';
            ctx.fillText(i + 1, 128, 160);

            const tex = new THREE.CanvasTexture(canvas.cloneNode(true));
            const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.2), new THREE.MeshStandardMaterial({map: tex}));
            tile.position.set(col * 1.3 - 5.8, 0, row * 1.3 - 5.8);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createUlarTangga() {
        // ULAR (Tube Merah Tebal)
        Object.entries(SNAKES).forEach(([s, e]) => {
            const start = boardPos[s].clone().add(new THREE.Vector3(0,0.2,0));
            const end = boardPos[e].clone().add(new THREE.Vector3(0,0.2,0));
            const curve = new THREE.QuadraticBezierCurve3(start, new THREE.Vector3((start.x+end.x)/2, 2.5, (start.z+end.z)/2), end);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.12, 8), new THREE.MeshStandardMaterial({color: 0xff0000})));
        });
        // TANGGA (Tube Hijau)
        Object.entries(LADDERS).forEach(([s, e]) => {
            const start = boardPos[s]; const end = boardPos[e];
            const curve = new THREE.LineCurve3(start, end);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 2, 0.06, 8), new THREE.MeshStandardMaterial({color: 0x00ff00})));
        });
    }

    function connectFirebase() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, won: false, color: '#ff4757'}] });

            const sPlayers = data.players || [];
            let found = false;
            sPlayers.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
                if(!playerModels[idx]) {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: p.color})));
                    const loader = new THREE.TextureLoader();
                    const face = new THREE.Sprite(new THREE.SpriteMaterial({map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}`)}));
                    face.position.y = 1; face.scale.set(0.8, 0.8, 1);
                    g.add(face);
                    scene.add(g); playerModels[idx] = g;
                }
                playerModels[idx].position.lerp(boardPos[p.pos].clone().add(new THREE.Vector3(0, 0.6, 0)), 0.1);
            });

            if(!found) {
                sPlayers.push({name: myName, pos: 0, won: false, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players: sPlayers });
            }

            const current = sPlayers[data.turn];
            document.getElementById('turn-msg').innerText = `GILIRAN: ${current.name.toUpperCase()}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving || sPlayers[myId].won);
            if(sPlayers[myId].won) document.getElementById('turn-msg').innerText = "ANDA FINISH! 🏆";
        });
    }

    window.kocokDadu = async () => {
        isMoving = true;
        const roll = Math.floor(Math.random() * 6) + 1;
        const diceUI = document.getElementById('dice-box');
        diceUI.style.display = 'flex'; diceUI.innerText = "🎲";
        
        setTimeout(() => {
            diceUI.innerText = roll;
            setTimeout(async () => {
                diceUI.style.display = 'none';
                const snap = await get(gameRef);
                const data = snap.val();
                let p = data.players[myId];
                let nPos = p.pos + roll;

                if(nPos >= 99) { nPos = 99; p.won = true; }
                if(LADDERS[nPos]) nPos = LADDERS[nPos];
                if(SNAKES[nPos]) nPos = SNAKES[nPos];

                const updated = data.players;
                updated[myId].pos = nPos; updated[myId].won = p.won;
                update(gameRef, { turn: (data.turn + 1) % updated.length, players: updated });
                isMoving = false;
            }, 1000);
        }, 600);
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
