<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLAUST PRO PIANO ENGINE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; margin: 0; overflow: hidden; display: flex; flex-direction: column; }
        
        /* Header & Info */
        .studio-header { background: #0f172a; border-bottom: 2px solid #1e293b; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .kb-hint { font-size: 11px; color: #64748b; font-weight: bold; }

        /* Piano Area */
        .piano-outer { flex: 1; overflow-x: auto; display: flex; align-items: center; padding: 20px; scroll-behavior: smooth; }
        .piano-body { display: flex; position: relative; height: 320px; margin: 0 auto; background: #000; padding: 5px; border-radius: 8px; border-top: 15px solid #1e293b; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }

        /* Key Styles */
        .key { cursor: pointer; user-select: none; position: relative; transition: transform 0.05s, background 0.1s; }
        
        .white-key { width: 55px; height: 300px; background: linear-gradient(to bottom, #fff 0%, #e2e8f0 100%); border: 1px solid #94a3b8; border-radius: 0 0 6px 6px; z-index: 1; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 15px; }
        .white-key:active, .white-key.active { background: #cbd5e1; transform: translateY(4px); box-shadow: inset 0 5px 10px rgba(0,0,0,0.2); }
        .white-key span { color: #94a3b8; font-size: 12px; font-weight: 800; pointer-events: none; }

        .black-key { width: 34px; height: 180px; background: linear-gradient(to bottom, #334155 0%, #000 100%); border-radius: 0 0 4px 4px; z-index: 2; margin-left: -17px; margin-right: -17px; border: 1px solid #000; }
        .black-key:active, .black-key.active { background: #475569; transform: translateY(2px); }

        /* Key Mapping Label */
        .key-map { position: absolute; bottom: 40px; font-size: 10px; color: #f59e0b; font-weight: 900; }

        /* Controls */
        .bottom-bar { background: #0f172a; padding: 15px; border-top: 1px solid #1e293b; display: flex; gap: 20px; justify-content: center; align-items: center; }
        .pedal-btn { background: #1e293b; padding: 8px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; border: 1px solid #334155; }
        .pedal-btn.on { background: #f59e0b; color: #000; box-shadow: 0 0 15px rgba(245,158,11,0.5); }
    </style>
</head>
<body>

<div class="studio-header">
    <div>
        <h1 class="text-xl font-black italic tracking-tighter text-white">FLAUST <span class="text-yellow-500">PRO-88</span></h1>
        <p class="kb-hint uppercase tracking-widest">Acoustic Mode // High-Fidelity Synthesis</p>
    </div>
    <div class="text-right">
        <div class="kb-hint">KEYBOARD MAPPING: <span class="text-white">A-K (White) | W-U (Black)</span></div>
        <div class="kb-hint">SUSTAIN: <span class="text-white">HOLD SPACEBAR</span></div>
    </div>
</div>

<div class="piano-outer">
    <div class="piano-body" id="piano"></div>
</div>

<div class="bottom-bar">
    <div class="flex items-center gap-3">
        <label class="kb-hint">OCTAVE</label>
        <button onclick="shiftOctave(-1)" class="bg-slate-800 px-3 py-1 rounded">-</button>
        <span id="oct-val" class="text-yellow-500 font-bold">0</span>
        <button onclick="shiftOctave(1)" class="bg-slate-800 px-3 py-1 rounded">+</button>
    </div>
    <button id="pedal" class="pedal-btn">SUSTAIN PEDAL (SPACE)</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // SOUND ENGINE: Reverb & Filter
    const mainGain = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.value = 8000; // Ngurangin suara cempreng
    mainGain.connect(filter);
    filter.connect(audioCtx.destination);

    const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
    const keyMap = { 'A':'C4', 'W':'C#4', 'S':'D4', 'E':'D#4', 'D':'E4', 'F':'F4', 'T':'F#4', 'G':'G4', 'Y':'G#4', 'H':'A4', 'U':'A#4', 'J':'B4', 'K':'C5' };
    
    let activeNodes = {};
    let octaveShift = 0;
    let sustain = false;

    // Generate 88 Keys
    const piano = document.getElementById('piano');
    for (let i = 0; i < 88; i++) {
        const nIdx = (i + 9) % 12;
        const oct = Math.floor((i + 9) / 12);
        const name = notes[nIdx];
        const isBlack = name.includes('#');
        const fullName = name + oct;

        const div = document.createElement('div');
        div.className = `key ${isBlack ? 'black-key' : 'white-key'}`;
        div.dataset.note = fullName;

        // Add keyboard labels for middle octave
        for (let char in keyMap) {
            if (keyMap[char] === fullName) {
                div.innerHTML = `<div class="key-map">${char}</div>`;
            }
        }
        
        if (!isBlack) div.innerHTML += `<span>${name}${oct}</span>`;

        div.onmousedown = () => play(fullName);
        div.onmouseup = () => stop(fullName);
        div.onmouseleave = () => stop(fullName);
        piano.appendChild(div);
    }

    function play(note) {
        if (activeNodes[note]) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();

        // High Quality Synthesis
        const osc = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator(); // Sub-harmonics
        const g = audioCtx.createGain();

        const freq = getFrequency(note);
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc2.frequency.setValueAtTime(freq / 2, audioCtx.currentTime); // Deepness

        osc.type = 'triangle';
        osc2.type = 'sine';

        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + 0.02); // Attack halus

        osc.connect(g);
        osc2.connect(g);
        g.connect(mainGain);

        osc.start();
        osc2.start();
        activeNodes[note] = { osc, osc2, g };
        
        const el = document.querySelector(`[data-note="${note}"]`);
        if (el) el.classList.add('active');
    }

    function stop(note) {
        if (!activeNodes[note] || sustain) return;
        
        const { osc, osc2, g } = activeNodes[note];
        const release = 0.5; // Release lembut ala piano asli
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + release);
        
        setTimeout(() => {
            osc.stop();
            osc2.stop();
            delete activeNodes[note];
        }, release * 1000);

        const el = document.querySelector(`[data-note="${note}"]`);
        if (el) el.classList.remove('active');
    }

    function getFrequency(note) {
        const name = note.slice(0, -1);
        let oct = parseInt(note.slice(-1)) + octaveShift;
        const idx = notes.indexOf(name);
        return 440 * Math.pow(2, (idx - 9 + (oct - 4) * 12) / 12);
    }

    // Keyboard Handler
    window.addEventListener('keydown', (e) => {
        if (e.repeat) return;
        if (e.code === 'Space') { sustain = true; document.getElementById('pedal').classList.add('on'); return; }
        
        const note = keyMap[e.key.toUpperCase()];
        if (note) play(note);
    });

    window.addEventListener('keyup', (e) => {
        if (e.code === 'Space') { 
            sustain = false; 
            document.getElementById('pedal').classList.remove('on');
            // Matikan semua nada yang nyangkut
            Object.keys(activeNodes).forEach(stop);
            return; 
        }
        const note = keyMap[e.key.toUpperCase()];
        if (note) stop(note);
    });

    function shiftOctave(v) {
        octaveShift = Math.max(-2, Math.min(2, octaveShift + v));
        document.getElementById('oct-val').innerText = octaveShift;
    }
</script>
</body>
</html>
