<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD CHICKEN: TACTICAL WARFARE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #0f172a; border: 4px solid #334155; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .hud { position: absolute; top: 20px; width: 760px; display: flex; justify-content: space-between; pointer-events: none; }
        .stat { background: rgba(15, 23, 42, 0.9); padding: 10px 15px; border-radius: 6px; border: 1px solid #475569; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">
            <p class="text-[10px] text-slate-500 uppercase">Status</p>
            <p id="lives" class="text-xl">❤️❤️❤️</p>
            <div class="w-24 h-2 bg-slate-700 mt-1 rounded-full overflow-hidden"><div id="hp" class="h-full bg-green-500 transition-all"></div></div>
        </div>
        <div class="stat text-center">
            <p id="wave-display" class="text-yellow-500 text-xl font-black italic">WAVE 1</p>
            <p id="score" class="text-white text-xs">SCORE: 0</p>
        </div>
        <div class="stat text-right">
            <p class="text-[10px] text-slate-500 uppercase">Current Weapon</p>
            <p id="weapon-name" class="text-sm text-red-500 font-black italic uppercase">Pistol Egg</p>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game State
    let score = 0, wave = 1, gameActive = true, lives = 3, hp = 100;
    const gravity = 0.8, friction = 0.8;
    const keys = {};

    // Chicken (Player)
    const player = {
        x: 100, y: 300, w: 40, h: 40, dx: 0, dy: 0, 
        speed: 5, jump: 15, grounded: false,
        weapon: 'NORMAL', weaponTimer: 0,
        draw() {
            ctx.fillStyle = this.weapon === 'NORMAL' ? "#fbbf24" : "#ef4444";
            ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = "#ff0000"; ctx.fillRect(this.x + 25, this.y - 5, 10, 10); // Jengger
        }
    };

    const bullets = [], enemies = [], items = [], eBullets = [];
    const weaponTypes = ['LASER', 'GRENADE', 'SPREAD'];

    // Handle Input
    window.onkeydown = (e) => keys[e.code] = true;
    window.onkeyup = (e) => { 
        keys[e.code] = false; 
        if(e.code === 'KeyF' && gameActive) shoot();
        if(e.code === 'KeyF' && !gameActive) location.reload();
    };

    function shoot() {
        const bSpeed = 12;
        if(player.weapon === 'NORMAL') {
            bullets.push({x: player.x + 40, y: player.y + 20, vx: bSpeed, vy: 0, type: 'NORMAL', r: 5});
        } else if(player.weapon === 'LASER') {
            bullets.push({x: player.x + 40, y: player.y + 18, vx: 20, vy: 0, type: 'LASER', r: 3});
        } else if(player.weapon === 'GRENADE') {
            bullets.push({x: player.x + 40, y: player.y + 10, vx: 8, vy: -8, type: 'GRENADE', r: 8});
        } else if(player.weapon === 'SPREAD') {
            bullets.push({x: player.x + 40, y: player.y + 20, vx: bSpeed, vy: -2, type: 'NORMAL', r: 5});
            bullets.push({x: player.x + 40, y: player.y + 20, vx: bSpeed, vy: 0, type: 'NORMAL', r: 5});
            bullets.push({x: player.x + 40, y: player.y + 20, vx: bSpeed, vy: 2, type: 'NORMAL', r: 5});
        }
    }

    function spawnWave() {
        let count = 3 + wave;
        for(let i=0; i<count; i++) {
            enemies.push({
                x: canvas.width + (i * 200), y: 310, w: 40, h: 40, 
                hp: 20 + (wave * 10), speed: 2 + (wave * 0.2), 
                lastShot: 0
            });
        }
        if(Math.random() > 0.5) items.push({x: canvas.width + 100, y: 200, w: 30, h: 30, type: weaponTypes[Math.floor(Math.random()*3)]});
    }

    function update() {
        if(!gameActive) return;

        // Player Movement WASD
        if(keys['KeyA']) player.dx = -player.speed;
        if(keys['KeyD']) player.dx = player.speed;
        if(keys['Space'] && player.grounded || keys['KeyW'] && player.grounded) {
            player.dy = -player.jump;
            player.grounded = false;
        }

        player.y += player.dy;
        player.x += player.dx;
        player.dy += gravity;
        player.dx *= friction;

        // Constraints
        if(player.y > 310) { player.y = 310; player.dy = 0; player.grounded = true; }
        if(player.x < 0) player.x = 0;
        if(player.x > canvas.width - 40) player.x = canvas.width - 40;

        // Weapon Timer
        if(player.weaponTimer > 0) {
            player.weaponTimer--;
            if(player.weaponTimer <= 0) {
                player.weapon = 'NORMAL';
                document.getElementById('weapon-name').innerText = "Pistol Egg";
            }
        }

        // Wave Logic
        if(enemies.length === 0) { wave++; spawnWave(); document.getElementById('wave-display').innerText = `WAVE ${wave}`; }

        ctx.clearRect(0,0,800,400);
        ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 350, 800, 50); // Floor

        player.draw();

        // Update Bullets
        bullets.forEach((b, i) => {
            b.x += b.vx; b.y += b.vy;
            if(b.type === 'GRENADE') b.vy += 0.4;
            ctx.fillStyle = b.type === 'LASER' ? "#00f2ff" : "#fff";
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
            if(b.x > 800 || b.y > 350) bullets.splice(i, 1);
        });

        // Update Enemies
        enemies.forEach((e, i) => {
            e.x -= e.speed;
            ctx.fillStyle = "#94a3b8"; ctx.fillRect(e.x, e.y, e.w, e.h);
            
            // Shooting logic
            if(Date.now() - e.lastShot > 2000) {
                eBullets.push({x: e.x, y: e.y + 20, vx: -5});
                e.lastShot = Date.now();
            }

            // Collision with bullet
            bullets.forEach((b, bi) => {
                if(b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
                    e.hp -= (b.type === 'LASER' ? 10 : 20);
                    if(b.type !== 'LASER') bullets.splice(bi, 1);
                    if(e.hp <= 0) { enemies.splice(i, 1); score += 100; document.getElementById('score').innerText = `SCORE: ${score}`; }
                }
            });

            if(e.x < player.x + player.w && e.x + e.w > player.x && e.y < player.y + player.h && e.y + e.h > player.y) {
                takeDamage(1);
            }
        });

        // Enemy Bullets
        eBullets.forEach((eb, i) => {
            eb.x += eb.vx;
            ctx.fillStyle = "#facc15"; ctx.fillRect(eb.x, eb.y, 8, 4);
            if(eb.x < player.x + player.w && eb.x + 8 > player.x && eb.y < player.y + player.h && eb.y + 4 > player.y) {
                eBullets.splice(i, 1); takeDamage(20);
            }
        });

        // Items
        items.forEach((it, i) => {
            it.x -= 2;
            ctx.fillStyle = "#f59e0b"; ctx.fillRect(it.x, it.y, it.w, it.h);
            ctx.fillStyle = "#fff"; ctx.font = "12px Arial"; ctx.fillText(it.type[0], it.x + 10, it.y + 20);
            if(it.x < player.x + player.w && it.x + it.w > player.x && it.y < player.y + player.h && it.y + it.h > player.y) {
                player.weapon = it.type;
                player.weaponTimer = 300;
                document.getElementById('weapon-name').innerText = it.type;
                items.splice(i, 1);
            }
        });

        requestAnimationFrame(update);
    }

    function takeDamage(amt) {
        hp -= amt;
        document.getElementById('hp').style.width = hp + "%";
        if(hp <= 0) {
            lives--; hp = 100;
            let heart = ""; for(let i=0; i<lives; i++) heart += "❤️";
            document.getElementById('lives').innerText = heart;
            if(lives <= 0) gameOver();
        }
    }

    function gameOver() {
        gameActive = false;
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "red"; ctx.font = "bold 40px Arial"; ctx.textAlign = "center";
        ctx.fillText("MISSION FAILED", 400, 200);
        ctx.fillStyle = "white"; ctx.font = "20px Arial";
        ctx.fillText("Press F to Restart", 400, 250);
    }

    spawnWave();
    update();
</script>
</body>
</html>
