<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD LADDER ULTIMATE V12</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; inset: 0; pointer-events: none; z-index: 10; color: white; }
        #setup { position: absolute; inset: 0; background: #111; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; }
        #controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); pointer-events: auto; }
        .btn-roll { 
            padding: 20px 60px; font-size: 24px; cursor: pointer; background: #fff; color: #000; 
            border: 4px solid #00d4ff; border-radius: 50px; font-weight: 900; transition: 0.3s;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        .btn-roll:hover:not(:disabled) { transform: scale(1.1); background: #00d4ff; color: #fff; }
        .btn-roll:disabled { opacity: 0.2; cursor: not-allowed; }
        #status { position: absolute; top: 30px; width: 100%; text-align: center; font-size: 28px; font-weight: 900; color: #fbbf24; text-shadow: 2px 2px #000; }
        input { padding: 15px; width: 250px; margin: 15px; border-radius: 10px; border: none; font-size: 18px; text-align: center; }
        /* DADU PUTIH 3D CSS */
        #dice-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); perspective: 1000px; display:none; }
        .cube { width: 100px; height: 100px; position: relative; transform-style: preserve-3d; transform: rotateX(-30deg) rotateY(-45deg); transition: transform 0.1s; }
        .face { position: absolute; width: 100px; height: 100px; background: white; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: bold; color: black; border-radius: 10px; }
        .front  { transform: rotateY(0deg) translateZ(50px); }
        .back   { transform: rotateY(180deg) translateZ(50px); }
        .right  { transform: rotateY(90deg) translateZ(50px); }
        .left   { transform: rotateY(-90deg) translateZ(50px); }
        .top    { transform: rotateX(90deg) translateZ(50px); }
        .bottom { transform: rotateX(-90deg) translateZ(50px); }
    </style>
</head>
<body>

<div id="setup">
    <h1 style="color: #00d4ff; font-size: 50px; margin-bottom: 0;">SQUAD LADDER V12</h1>
    <p style="color: #666;">ENGINE: MSI i7 | GFX: THREE.JS REAL-3D</p>
    <input type="text" id="pName" placeholder="Nama Kamu (Alvin/Bernad...)">
    <button class="btn-roll" onclick="startApp()" style="font-size: 18px; padding: 10px 30px;">CONNECT SERVER</button>
</div>

<div id="ui">
    <div id="status">MENUNGGU PEMAIN...</div>
    <div id="dice-container">
        <div class="cube" id="diceCube">
            <div class="face front">1</div>
            <div class="face back">6</div>
            <div class="face right">3</div>
            <div class="face left">4</div>
            <div class="face top">2</div>
            <div class="face bottom">5</div>
        </div>
    </div>
    <div id="controls">
        <button id="rollBtn" class="btn-roll" onclick="kickDice()" disabled>KOCOK DADU! 🎲</button>
    </div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, set, onValue, update, get } from 'firebase/database';

    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const gameRef = ref(db, 'squad_ladder_v12/state');

    let scene, camera, renderer, myName = "", myId = null;
    let playerModels = {}, boardPos = [];
    let isMoving = false;

    const LADDERS = { 2: 21, 8: 30, 25: 45, 50: 75, 70: 92 };
    const SNAKES = { 18: 4, 46: 22, 62: 38, 88: 50, 98: 10 };

    window.startApp = () => {
        myName = document.getElementById('pName').value.trim();
        if(!myName) return alert("Nama jangan kosong!");
        document.getElementById('setup').style.display = 'none';
        init3D();
        syncServer();
    };

    function init3D() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 12); camera.lookAt(0,0,0);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1));
        createBoard();
        createObstacles();
        animate();
    }

    function createBoard() {
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');

        for(let i=0; i<100; i++) {
            const row = Math.floor(i / 10);
            const col = (row % 2 === 0) ? (i % 10) : (9 - (i % 10));

            ctx.fillStyle = (row + col) % 2 === 0 ? '#3e2723' : '#5d4037';
            ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 50px Arial'; ctx.textAlign = 'center';
            ctx.fillText(i + 1, 64, 80);

            const tex = new THREE.CanvasTexture(canvas.cloneNode(true));
            const tile = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 1.2), new THREE.MeshStandardMaterial({map: tex}));
            tile.position.set(col * 1.3 - 5.8, 0, row * 1.3 - 5.8);
            scene.add(tile);
            boardPos[i] = tile.position.clone();
        }
    }

    function createObstacles() {
        // ULAR (Tube Merah Melengkung)
        Object.entries(SNAKES).forEach(([s, e]) => {
            const curve = new THREE.QuadraticBezierCurve3(boardPos[s], new THREE.Vector3((boardPos[s].x+boardPos[e].x)/2, 3, (boardPos[s].z+boardPos[e].z)/2), boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 20, 0.1, 8), new THREE.MeshStandardMaterial({color: 0xff0000})));
        });
        // TANGGA (Tiang Hijau)
        Object.entries(LADDERS).forEach(([s, e]) => {
            const curve = new THREE.LineCurve3(boardPos[s], boardPos[e]);
            scene.add(new THREE.Mesh(new THREE.TubeGeometry(curve, 2, 0.05, 8), new THREE.MeshStandardMaterial({color: 0x00ff00})));
        });
    }

    function syncServer() {
        onValue(gameRef, (snap) => {
            const data = snap.val();
            if(!data) return set(gameRef, { turn: 0, players: [{name: myName, pos: 0, won: false, color: '#00d4ff'}] });

            const serverP = data.players || [];
            let found = false;
            serverP.forEach((p, idx) => {
                if(p.name === myName) { myId = idx; found = true; }
                if(!playerModels[idx]) {
                    const g = new THREE.Group();
                    g.add(new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: p.color})));
                    const loader = new THREE.TextureLoader();
                    const face = new THREE.Sprite(new THREE.SpriteMaterial({map: loader.load(`https://api.dicebear.com/7.x/avataaars/svg?seed=${p.name}`)}));
                    face.position.y = 1; g.add(face);
                    scene.add(g); playerModels[idx] = g;
                }
                playerModels[idx].position.lerp(boardPos[p.pos].clone().add(new THREE.Vector3(0,0.6,0)), 0.1);
            });

            if(!found) {
                serverP.push({name: myName, pos: 0, won: false, color: '#'+Math.floor(Math.random()*16777215).toString(16)});
                update(gameRef, { players: serverP });
            }
            const active = serverP[data.turn];
            document.getElementById('status').innerText = `GILIRAN: ${active.name.toUpperCase()}`;
            document.getElementById('rollBtn').disabled = (data.turn !== myId || isMoving || serverP[myId].won);
        });
    }

    window.kickDice = async () => {
        isMoving = true;
        const diceCont = document.getElementById('dice-container');
        const diceCube = document.getElementById('diceCube');
        diceCont.style.display = 'block';
        
        let roll = Math.floor(Math.random() * 6) + 1;
        // Animasi Putar Dadu
        let rot = 0;
        const anim = setInterval(() => {
            rot += 45;
            diceCube.style.transform = `rotateX(${rot}deg) rotateY(${rot}deg)`;
        }, 50);

        setTimeout(async () => {
            clearInterval(anim);
            diceCont.style.display = 'none';
            const snap = await get(gameRef);
            const data = snap.val();
            let newPos = data.players[myId].pos + roll;

            if(newPos >= 99) { newPos = 99; data.players[myId].won = true; }
            if(LADDERS[newPos]) newPos = LADDERS[newPos];
            if(SNAKES[newPos]) newPos = SNAKES[newPos];

            data.players[myId].pos = newPos;
            update(gameRef, { turn: (data.turn + 1) % data.players.length, players: data.players });
            isMoving = false;
        }, 1200);
    };

    function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); }
</script>
</body>
</html>
