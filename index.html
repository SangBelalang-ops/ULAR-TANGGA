<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD STICKMAN: PHOTO EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap');
        body { margin: 0; overflow: hidden; background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; }
        canvas { background: #0f172a; border: 4px solid #334155; border-radius: 15px; }
        .hud { position: absolute; top: 20px; width: 780px; display: flex; justify-content: space-between; pointer-events: none; z-index: 10; }
        .stat { background: rgba(15, 23, 42, 0.9); padding: 12px; border-radius: 8px; border: 1px solid #475569; min-width: 160px; }
    </style>
</head>
<body>

    <div class="hud">
        <div class="stat">
            <p id="char-name" class="text-yellow-500 font-black italic uppercase text-xs">LILAS</p>
            <p id="lives" class="text-xl">❤️❤️❤️</p>
            <div class="w-full h-2 bg-slate-800 mt-2 rounded-full overflow-hidden border border-slate-600"><div id="hp" class="h-full bg-green-500 transition-all"></div></div>
        </div>
        <div class="stat text-center">
            <p id="wave-display" class="text-white text-2xl font-black italic tracking-tighter">WAVE 1</p>
            <p id="score" class="text-slate-400 text-[10px] font-bold uppercase">Ultimate: [E] READY</p>
        </div>
        <div class="stat text-right">
            <p class="text-[10px] text-slate-500 uppercase font-bold">Active Weapon</p>
            <p id="weapon-name" class="text-sm text-red-500 font-black italic uppercase">Pistol Egg</p>
            <div class="w-24 h-1 bg-red-900 mt-1 ml-auto rounded-full overflow-hidden"><div id="w-progress" class="h-full bg-red-500 w-0"></div></div>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    let score = 0, wave = 1, lives = 3, hp = 100, gameActive = true;
    let shake = 0, slowMo = 1, ultTimer = 0; 
    const gravity = 0.8, friction = 0.8, groundY = 350;
    const keys = {};

    // SQUAD ASSETS
    const squad = [
        {name: "LILAS", img: "lilas.png"}, {name: "MEGGY", img: "meggy.png"}, 
        {name: "ALBERT", img: "albert.png"}, {name: "ANJAS", img: "anjas.png"},
        {name: "TEGAR", img: "tegar.png"}, {name: "PITER", img: "piter.png"}
    ];
    let currentChar = 0;
    const headImgs = squad.map(m => {
        const i = new Image();
        i.src = m.img;
        return i;
    });

    const player = {
        x: 100, y: 310, w: 30, h: 65, dx: 0, dy: 0, speed: 6.5, jump: 16, grounded: false,
        weapon: 'NORMAL', weaponTimer: 0, maxWeaponTimer: 400,
        draw() {
            // Stickman Body
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(this.x+15, this.y+25); ctx.lineTo(this.x+15, this.y+50); // Spine
            ctx.moveTo(this.x+15, this.y+30); ctx.lineTo(this.x+5, this.y+45); // Arms
            ctx.moveTo(this.x+15, this.y+30); ctx.lineTo(this.x+25, this.y+45);
            ctx.moveTo(this.x+15, this.y+50); ctx.lineTo(this.x+5, this.y+65); // Legs
            ctx.moveTo(this.x+15, this.y+50); ctx.lineTo(this.x+25, this.y+65);
            ctx.stroke();
            
            // Photo Head
            try {
                ctx.drawImage(headImgs[currentChar], this.x, this.y, 30, 30);
            } catch(e) {
                // Fallback kalau gambar gak ketemu
                ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(this.x+15, this.y+15, 12, 0, Math.PI*2); ctx.fill();
            }
        }
    };

    let enemies = [], bullets = [], eBullets = [], items = [], boss = null;

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if(e.key >= 1 && e.key <= 6) { 
            currentChar = e.key - 1; 
            document.getElementById('char-name').innerText = squad[currentChar].name;
        }
        if(e.code === 'KeyE' && ultTimer <= 0 && gameActive) triggerUlt();
    };
    window.onkeyup = (e) => { 
        keys[e.code] = false;
        if(e.code === 'KeyF' && gameActive) shoot();
        if(e.code === 'KeyF' && !gameActive) location.reload();
    };

    function triggerUlt() {
        shake = 40; slowMo = 0.1; ultTimer = 600;
        enemies = []; eBullets = [];
        if(boss) boss.hp -= 200;
        score += 500;
    }

    function shoot() {
        const bY = player.y + 35;
        if(player.weapon === 'NORMAL') bullets.push({x: player.x+25, y: bY, vx: 13, vy: 0, type: 'NORMAL', r: 4});
        else if(player.weapon === 'LASER') bullets.push({x: player.x+25, y: bY, vx: 25, vy: 0, type: 'LASER', r: 2});
        else if(player.weapon === 'GRENADE') bullets.push({x: player.x+25, y: bY, vx: 8, vy: -10, type: 'GRENADE', r: 8});
        else if(player.weapon === 'SPREAD') {
            [-2, 0, 2].forEach(v => bullets.push({x: player.x+25, y: bY, vx: 13, vy: v, type: 'NORMAL', r: 4}));
        }
    }

    function spawnWave() {
        if(wave % 5 === 0) {
            boss = { x: 850, y: 100, w: 120, h: 250, hp: 600 + (wave*100), maxHp: 600 + (wave*100), speed: 1.2, lastShot: 0 };
        } else {
            for(let i=0; i < (3 + wave); i++) {
                enemies.push({ x: 900 + (i*250), y: 290, w: 30, h: 60, hp: 40, speed: 2, lastShot: Date.now() + (i*800) });
            }
        }
        if(Math.random() > 0.4) items.push({x: 800, y: 200, w: 35, h: 35, type: ['LASER','GRENADE','SPREAD'][Math.floor(Math.random()*3)]});
    }

    function update() {
        if(!gameActive) return;

        // Movement
        if(keys['KeyA']) player.dx = -player.speed;
        if(keys['KeyD']) player.dx = player.speed;
        if((keys['KeyW'] || keys['Space']) && player.grounded) { player.dy = -player.jump; player.grounded = false; }

        player.x += player.dx * slowMo; player.y += player.dy * slowMo;
        player.dy += gravity; player.dx *= friction;

        if(player.y > groundY - player.h) { player.y = groundY - player.h; player.dy = 0; player.grounded = true; }
        if(player.x < 0) player.x = 0; if(player.x > canvas.width - player.w) player.x = canvas.width - player.w;

        // Visuals update
        if(shake > 0) shake--;
        if(slowMo < 1) slowMo += 0.02;
        if(ultTimer > 0) {
            ultTimer--;
            document.getElementById('score').innerText = `ULTIMATE COOLDOWN: ${Math.ceil(ultTimer/60)}s`;
        } else {
            document.getElementById('score').innerText = `ULTIMATE: [E] READY`;
        }

        ctx.save();
        if(shake > 0) ctx.translate(Math.random()*8-4, Math.random()*8-4);
        ctx.clearRect(0,0,800,400);
        
        ctx.fillStyle = "#1e293b"; ctx.fillRect(0, groundY, 800, 50); // Ground
        player.draw();

        if(enemies.length === 0 && !boss) { wave++; spawnWave(); document.getElementById('wave-display').innerText = `WAVE ${wave}`; }

        // BOSS
        if(boss) {
            if(boss.x > 550) boss.x -= boss.speed;
            ctx.fillStyle = "#facc15"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h); // Boss Giant
            ctx.fillStyle = "#000"; ctx.fillRect(boss.x+20, boss.y+30, 20, 20); ctx.fillRect(boss.x+80, boss.y+30, 20, 20); // Eyes
            
            if(Date.now() - boss.lastShot > 2500) {
                for(let i=0; i<3; i++) eBullets.push({x: boss.x, y: boss.y + 100 + (i*40), vx: -7, vy: (i-1)*2});
                boss.lastShot = Date.now();
            }
            bullets.forEach((b, bi) => {
                if(checkCol(b, boss)) {
                    boss.hp -= (b.type === 'LASER' ? 5 : 15);
                    if(b.type !== 'LASER') bullets.splice(bi, 1);
                    if(boss.hp <= 0) { boss = null; score += 2000; shake = 50; slowMo = 0.1; }
                }
            });
        }

        // ENEMIES
        enemies.forEach((e, i) => {
            e.x -= e.speed * slowMo;
            ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(e.x+15, e.y+20); ctx.lineTo(e.x+15, e.y+60); ctx.stroke();
            ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(e.x+15, e.y+10, 10, 0, Math.PI*2); ctx.fill();

            if(Date.now() - e.lastShot > 4000) { 
                eBullets.push({x: e.x, y: e.y + 20, vx: -5});
                e.lastShot = Date.now();
            }
            bullets.forEach((b, bi) => {
                if(checkCol(b, e)) {
                    e.hp -= 20; if(b.type !== 'LASER') bullets.splice(bi, 1);
                    if(e.hp <= 0) { enemies.splice(i, 1); score += 100; shake = 8; }
                }
            });
            if(checkCol(player, e)) takeDamage(1);
        });

        // Entities update
        bullets.forEach((b, i) => { b.x += b.vx; b.y += b.vy; if(b.type === 'GRENADE') b.vy += 0.4; ctx.fillStyle = "#22d3ee"; ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill(); if(b.x > 800 || b.y > groundY) bullets.splice(i, 1); });
        eBullets.forEach((eb, i) => { eb.x += eb.vx; eb.y += (eb.vy||0); ctx.fillStyle = "#f59e0b"; ctx.fillRect(eb.x, eb.y, 10, 5); if(checkCol(eb, player)) { eBullets.splice(i, 1); takeDamage(20); shake = 15; } if(eb.x < 0) eBullets.splice(i, 1); });
        items.forEach((it, i) => { it.x -= 2; ctx.fillStyle = "#facc15"; ctx.fillRect(it.x, it.y, it.w, it.h); ctx.fillStyle = "#000"; ctx.fillText(it.type[0], it.x+10, it.y+23); if(checkCol(player, it)) { player.weapon = it.type; player.weaponTimer = player.maxWeaponTimer; document.getElementById('weapon-name').innerText = it.type; items.splice(i, 1); } });

        // Weapon Timer HUD
        if(player.weaponTimer > 0) {
            player.weaponTimer--;
            document.getElementById('w-progress').style.width = (player.weaponTimer/player.maxWeaponTimer*100) + "%";
            if(player.weaponTimer <= 0) { player.weapon = 'NORMAL'; document.getElementById('weapon-name').innerText = "Pistol Egg"; }
        }

        ctx.restore();
        requestAnimationFrame(update);
    }

    function checkCol(a, b) { return a.x < b.x + (b.w||b.r) && a.x + (a.w||a.r) > b.x && a.y < b.y + (b.h||b.r) && a.y + (a.h||a.r) > b.y; }
    function takeDamage(amt) { hp -= amt; document.getElementById('hp').style.width = hp + "%"; if(hp <= 0) { lives--; hp = 100; updateLivesUI(); if(lives <= 0) { gameActive = false; gameOver(); } } }
    function updateLivesUI() { let l = ""; for(let i=0; i<lives; i++) l += "❤️"; document.getElementById('lives').innerText = l; }

    function gameOver() {
        ctx.fillStyle = "rgba(0,0,0,0.9)"; ctx.fillRect(0,0,800,400);
        ctx.fillStyle = "red"; ctx.font = "black 50px Arial"; ctx.textAlign = "center"; ctx.fillText("GAME OVER", 400, 200);
    }

    spawnWave();
    update();
</script>
</body>
</html>
