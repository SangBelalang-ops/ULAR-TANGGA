<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQUAD VIRTUAL PIANO | FLAUST EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .piano-container {
            display: flex;
            background: #000;
            padding: 20px 10px 10px 10px;
            border-radius: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 2px 10px rgba(255,255,255,0.2);
            position: relative;
            border-top: 10px solid #1e293b;
        }

        .key {
            position: relative;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
        }

        /* Tuts Putih */
        .white-key {
            width: 60px;
            height: 250px;
            background: linear-gradient(to bottom, #eee 0%, #fff 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 5px 5px;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 15px;
            color: #888;
            font-weight: 800;
            font-size: 12px;
        }

        .white-key:active, .white-key.active {
            background: linear-gradient(to bottom, #fff 0%, #dadada 100%);
            transform: translateY(2px);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.2);
        }

        /* Tuts Hitam */
        .black-key {
            width: 35px;
            height: 150px;
            background: linear-gradient(to bottom, #444 0%, #000 100%);
            border-radius: 0 0 3px 3px;
            margin-left: -17.5px;
            margin-right: -17.5px;
            z-index: 2;
            border: 1px solid #222;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 10px;
            color: #555;
            font-size: 10px;
        }

        .black-key:active, .black-key.active {
            background: linear-gradient(to bottom, #222 0%, #444 100%);
            transform: translateY(2px);
        }

        .label-squad {
            font-size: 10px;
            color: #f59e0b;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls {
            margin-bottom: 30px;
            text-align: center;
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(245, 158, 11, 0.5);
        }
    </style>
</head>
<body>

    <div class="controls">
        <h1 class="text-4xl font-black text-yellow-500 glow-text italic mb-2">SQUAD PIANO <span class="text-white">PRO</span></h1>
        <p class="text-slate-400 text-sm">Play with your mouse or keys: <span class="text-white font-bold">A S D F G H J K</span></p>
    </div>

    <div class="piano-container" id="piano">
        </div>

    <div class="mt-10 p-4 bg-slate-900/50 rounded-2xl border border-slate-800 text-center">
        <p class="text-xs text-slate-500 uppercase font-bold tracking-widest">Powered by Flaust Audio Engine</p>
    </div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Mapping Tuts: Note, Type (white/black), Keyboard Key, Squad Label
    const keys = [
        { note: "C4", type: "white", char: "A", squad: "Lilas" },
        { note: "C#4", type: "black", char: "W", squad: "" },
        { note: "D4", type: "white", char: "S", squad: "Albert" },
        { note: "D#4", type: "black", char: "E", squad: "" },
        { note: "E4", type: "white", char: "D", squad: "Tegar" },
        { note: "F4", type: "white", char: "F", squad: "Meggy" },
        { note: "F#4", type: "black", char: "T", squad: "" },
        { note: "G4", type: "white", char: "G", squad: "Anjas" },
        { note: "G#4", type: "black", char: "Y", squad: "" },
        { note: "A4", type: "white", char: "H", squad: "Piter" },
        { note: "A#4", type: "black", char: "U", squad: "" },
        { note: "B4", type: "white", char: "J", squad: "Bernad" },
        { note: "C5", type: "white", char: "K", squad: "Maga" }
    ];

    const frequencies = {
        "C4": 261.63, "C#4": 277.18, "D4": 293.66, "D#4": 311.13, 
        "E4": 329.63, "F4": 349.23, "F#4": 369.99, "G4": 392.00, 
        "G#4": 415.30, "A4": 440.00, "A#4": 466.16, "B4": 493.88, "C5": 523.25
    };

    const pianoElement = document.getElementById('piano');
    const activeOscillators = {};

    // Generate Tuts
    keys.forEach(key => {
        const div = document.createElement('div');
        div.className = `key ${key.type}-key`;
        div.id = `key-${key.note}`;
        div.innerHTML = `
            <span>${key.char}</span>
            ${key.squad ? `<div class="label-squad">${key.squad}</div>` : ''}
        `;
        
        // Event Mouse
        div.onmousedown = () => playNote(key.note);
        div.onmouseup = () => stopNote(key.note);
        div.onmouseleave = () => stopNote(key.note);
        
        // Support Touch
        div.ontouchstart = (e) => { e.preventDefault(); playNote(key.note); };
        div.ontouchend = () => stopNote(key.note);

        pianoElement.appendChild(div);
    });

    function playNote(note) {
        if (activeOscillators[note]) return;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = 'triangle'; // Suara lebih lembut kayak piano elektrik
        osc.frequency.setValueAtTime(frequencies[note], audioCtx.currentTime);

        gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start();
        activeOscillators[note] = { osc, gainNode };
        
        document.getElementById(`key-${note}`).classList.add('active');
        
        // Resume AudioContext (Security browser)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function stopNote(note) {
        if (activeOscillators[note]) {
            const { osc, gainNode } = activeOscillators[note];
            gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.05);
            setTimeout(() => {
                osc.stop();
                delete activeOscillators[note];
            }, 100);
            document.getElementById(`key-${note}`).classList.remove('active');
        }
    }

    // Keyboard Listeners
    window.onkeydown = (e) => {
        const keyData = keys.find(k => k.char === e.key.toUpperCase());
        if (keyData) playNote(keyData.note);
    };

    window.onkeyup = (e) => {
        const keyData = keys.find(k => k.char === e.key.toUpperCase());
        if (keyData) stopNote(keyData.note);
    };
</script>
</body>
</html>
