<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA PRO | FIX ROOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background: #020617; color: #fff; font-family: sans-serif; overflow: hidden; }
        #game-view { width: 100vw; height: 55vh; overflow: auto; background: #0f172a; position: relative; }
        #board-container { position: relative; width: 600px; height: 600px; background: #1e293b; margin: 0 auto; border: 5px solid #334155; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        .cell { border: 1px solid #334155; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; color: #475569; }
        .pawn { width: 35px; height: 35px; position: absolute; z-index: 50; transition: all 0.4s; border-radius: 50%; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 900; color: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .dice-box { width: 70px; height: 70px; background: #fff; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 40px; color: #000; box-shadow: 0 5px 0 #94a3b8; }
        .rolling { animation: spin 0.2s infinite; }
        @keyframes spin { 0% { transform: rotate(0); } 100% { transform: rotate(20deg); } }
    </style>
</head>
<body>

<div id="setup" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6">
    <h1 class="text-5xl font-black text-yellow-500 mb-6">SNAKE MAGA</h1>
    <input id="room-id" type="text" placeholder="Ketik Kode Room (Bebas)" class="w-full max-w-xs p-4 rounded-xl bg-slate-900 border-2 border-slate-700 text-center text-xl font-bold mb-4 uppercase">
    <div id="names" class="grid grid-cols-3 gap-2 mb-6"></div>
    <button onclick="joinGame()" class="w-full max-w-xs bg-yellow-600 p-5 rounded-2xl font-black text-white text-xl uppercase shadow-lg">MASUK ROOM</button>
</div>

<div id="game-ui" class="hidden flex flex-col h-screen">
    <div id="game-view"><div id="board-container"><svg id="svg" class="svg-overlay"></svg><div id="board"></div></div></div>
    <div class="bg-slate-900 p-4 flex gap-4 h-[40vh] border-t-2 border-slate-800">
        <div class="flex flex-col items-center w-1/3">
            <div id="dice" class="dice-box" onclick="roll()">🎲</div>
            <p id="status" class="mt-4 text-[10px] font-bold text-yellow-500 text-center uppercase tracking-tighter">Siap Main</p>
        </div>
        <div id="chat" class="flex-1 bg-black/40 rounded-xl p-3 overflow-y-auto text-[10px]"></div>
    </div>
</div>

<script>
    // FIREBASE CONFIG (PAKE YANG INI AJA, RULES UDAH GUE OPEN)
    const config = {
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app"
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    let myName = '', room = '';

    // Pilih Nama
    squad.forEach(n => {
        const btn = document.createElement('button'); btn.innerText = n;
        btn.className = "p-3 bg-slate-800 rounded-lg text-[10px] font-bold n-btn";
        btn.onclick = () => { myName = n; document.querySelectorAll('.n-btn').forEach(x=>x.classList.remove('bg-yellow-600')); btn.classList.add('bg-yellow-600'); };
        document.getElementById('names').appendChild(btn);
    });

    function joinGame() {
        room = document.getElementById('room-id').value.toUpperCase();
        if(!room || !myName) return alert("Pilih Nama & Isi Kode Room!");
        
        db.ref('r/'+room).transaction(d => {
            if(!d) return { p: [{n:myName, pos:1, f:false}], t:0, m:false };
            if(!d.p.find(x=>x.n===myName)) d.p.push({n:myName, pos:1, f:false});
            return d;
        }, () => {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game-ui').classList.remove('hidden');
            init(); sync();
        });
    }

    function init() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for(let r=9;r>=0;r--) {
            for(let c=0;c<10;c++) {
                let num = (r%2===0) ? (r*10+c+1) : (r*10+(10-c));
                const cell = document.createElement('div'); cell.className='cell'; cell.id=`c-${num}`; cell.innerText=num;
                b.appendChild(cell);
            }
        }
        drawLinks();
    }

    function drawLinks() {
        const svg = document.getElementById('svg'); svg.innerHTML = '';
        Object.keys(jumps).forEach(s => {
            const start=parseInt(s), end=jumps[s], sEl=document.getElementById(`c-${start}`).getBoundingClientRect(), eEl=document.getElementById(`c-${end}`).getBoundingClientRect(), bRect=document.getElementById('board-container').getBoundingClientRect();
            const x1=sEl.left-bRect.left+30, y1=sEl.top-bRect.top+30, x2=eEl.left-bRect.left+30, y2=eEl.top-bRect.top+30;
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1); line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("stroke", end > start ? "#22c55e" : "#ef4444");
            line.setAttribute("stroke-width", "4"); svg.appendChild(line);
        });
    }

    function sync() {
        db.ref('r/'+room).on('value', s => {
            const d = s.val(); if(!d) return;
            const turnP = d.p[d.t];
            document.getElementById('status').innerText = (turnP.n === myName) ? "GILIRAN LO!" : turnP.n + " JALAN";
            document.getElementById('dice').innerText = d.lastRoll || '🎲';
            
            document.querySelectorAll('.pawn').forEach(p=>p.remove());
            d.p.forEach((p, i) => {
                const cell = document.getElementById(`c-${p.pos}`);
                const r = cell.getBoundingClientRect(), br = document.getElementById('board-container').getBoundingClientRect();
                const pawn = document.createElement('div'); pawn.className = 'pawn';
                pawn.style.left = (r.left - br.left + (i*5)) + 'px'; pawn.style.top = (r.top - br.top + (i*5)) + 'px';
                pawn.style.background = ["#ef4444","#3b82f6","#22c55e","#eab308","#a855f7","#ec4899"][i];
                pawn.innerText = p.n[0]; // Inisial nama
                if(p.f) pawn.style.opacity = "0.2";
                document.getElementById('board-container').appendChild(pawn);
            });
        });
    }

    async function roll() {
        const d = (await db.ref('r/'+room).get()).val();
        if(d.p[d.t].n !== myName || d.m || d.p[d.t].f) return;
        
        const res = Math.floor(Math.random()*6)+1;
        document.getElementById('dice').classList.add('rolling');
        await db.ref('r/'+room).update({m:true, lastRoll:res});

        setTimeout(async () => {
            document.getElementById('dice').classList.remove('rolling');
            let ps = [...d.p], p = ps[d.t], target = Math.min(p.pos + res, 100);
            
            for(let i=p.pos+1; i<=target; i++) {
                p.pos = i; await db.ref('r/'+room+'/p').set(ps);
                await new Promise(r=>setTimeout(r, 300));
            }
            if(jumps[p.pos]) { p.pos = jumps[p.pos]; await db.ref('r/'+room+'/p').set(ps); }
            if(p.pos === 100) { p.f = true; confetti(); }

            let nxt = (d.t + 1) % ps.length;
            while(ps[nxt].f && !ps.every(x=>x.f)) nxt = (nxt+1) % ps.length;
            await db.ref('r/'+room).update({t:nxt, m:false});
        }, 1000);
    }
</script>
</body>
</html>
