<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD CRAFT: REMASTERED V7</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; pointer-events: none; z-index: 10; }
        #hotbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; background: rgba(0,0,0,0.85); padding: 12px; border: 2px solid #555; border-radius: 10px; pointer-events: auto; }
        .slot { width: 60px; height: 60px; background: #333; border: 3px solid #666; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: bold; text-align: center; }
        .slot.active { border-color: #00ffcc; box-shadow: 0 0 20px #00ffcc; background: #444; }
        #stats { position: absolute; top: 20px; left: 20px; color: #fff; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border-left: 5px solid #ff0000; }
        #timer { position: absolute; top: 20px; right: 20px; color: #fbbf24; font-size: 32px; font-weight: 900; text-shadow: 2px 2px #000; }
        #overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); color: #00ffcc; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; cursor: pointer; }
    </style>
</head>
<body>

<div id="overlay">
    <h1>SQUAD CRAFT V7</h1>
    <p>ENGINE: MSI i7 OPTIMIZED | 32GB RAM OK</p>
    <div style="background: #111; padding: 25px; border: 1px solid #00ffcc; text-align: left; margin: 20px;">
        [1] TANGAN | [2] KAYU | [3] KACA | [4] OBOR | [5] TANAH<br>
        KLIK KIRI: Hancurkan | KLIK KANAN: Pasang<br>
        W,A,S,D: Jalan | SPACE: Loncat | R: Rotasi Kamera
    </div>
    <h2>KLIK UNTUK MULAI</h2>
</div>

<div id="ui">
    <div id="timer">08:00</div>
    <div id="stats">HP: 100 | ITEM: <span id="item-name">TANGAN</span></div>
    <div id="hotbar">
        <div class="slot active" id="s1">HAND</div>
        <div class="slot" id="s2">WOOD</div>
        <div class="slot" id="s3">GLASS</div>
        <div class="slot" id="s4">TORCH</div>
        <div class="slot" id="s5">DIRT</div>
    </div>
</div>
<div id="crosshair"></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

    // --- SETUP ---
    let scene, camera, renderer, controls, clock;
    let activeSlot = 1, time = 8;
    let moveF = false, moveB = false, moveL = false, moveR = false, canJump = false;
    let velocity = new THREE.Vector3(), direction = new THREE.Vector3();
    let objects = [], raycaster = new THREE.Raycaster();
    let ghost, itemInHand;

    const mats = {
        grass: new THREE.MeshStandardMaterial({ color: 0x2d5a27 }),
        wood: new THREE.MeshStandardMaterial({ color: 0x5d4037 }),
        leaves: new THREE.MeshStandardMaterial({ color: 0x1a4a1a, transparent: false }),
        glass: new THREE.MeshStandardMaterial({ color: 0xade8f4, transparent: true, opacity: 0.5, metalness: 0.5, roughness: 0.1 }),
        torch: new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00 }),
        dirt: new THREE.MeshStandardMaterial({ color: 0x3d2b1f })
    };

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.03);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        controls = new PointerLockControls(camera, document.body);
        document.getElementById('overlay').addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => document.getElementById('overlay').style.display='none');
        controls.addEventListener('unlock', () => document.getElementById('overlay').style.display='flex');

        clock = new THREE.Clock();

        const amb = new THREE.AmbientLight(0xffffff, 0.6);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50); sun.castShadow = true;
        scene.add(amb, sun);
        scene.userData = { sun, amb };

        // WORLD
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), mats.grass);
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
        scene.add(ground); objects.push(ground);

        for(let i=0; i<40; i++) spawnFullTree(Math.random()*100-50, Math.random()*100-50);

        // GHOST
        ghost = new THREE.Mesh(new THREE.BoxGeometry(1.02, 1.02, 1.02), new THREE.MeshBasicMaterial({color: 0x00ffcc, wireframe: true, transparent: true, opacity: 0.5}));
        scene.add(ghost);

        createHandItem();
        animate();
    }

    function spawnFullTree(x, z) {
        const treeGroup = new THREE.Group();
        const trunk = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 1), mats.wood);
        trunk.position.y = 2; trunk.castShadow = true;
        treeGroup.add(trunk);

        const leafSize = 3;
        const leaves = new THREE.Mesh(new THREE.BoxGeometry(leafSize, leafSize, leafSize), mats.leaves);
        leaves.position.y = 5; leaves.castShadow = true;
        treeGroup.add(leaves);

        treeGroup.position.set(x, 0, z);
        treeGroup.userData = { type: 'tree', hp: 4 };
        scene.add(treeGroup);
        objects.push(treeGroup);
    }

    function createHandItem() {
        if(itemInHand) camera.remove(itemInHand);
        
        itemInHand = new THREE.Group();
        let model;
        
        if(activeSlot === 1) model = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0xffdbac})); // Tangan
        else if(activeSlot === 2) model = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mats.wood); // Kayu
        else if(activeSlot === 3) model = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mats.glass); // Kaca
        else if(activeSlot === 4) model = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.6, 0.1), mats.torch); // Obor
        else if(activeSlot === 5) model = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.4), mats.dirt); // Tanah

        itemInHand.add(model);
        itemInHand.position.set(0.6, -0.5, -0.8); // Posisi FPS
        camera.add(itemInHand);
        scene.add(camera);
    }

    window.addEventListener('mousedown', (e) => {
        if(!controls.isLocked) return;
        raycaster.setFromCamera(new THREE.Vector2(), camera);
        
        if(e.button === 0) { // LEFT CLICK: MINING
            const hits = raycaster.intersectObjects(objects, true);
            if(hits.length > 0 && hits[0].distance < 5) {
                let target = hits[0].object;
                while(target.parent !== scene && target.parent !== null) target = target.parent;
                if(target !== objects[0]) {
                    scene.remove(target);
                    objects.splice(objects.indexOf(target), 1);
                }
            }
            // Animasi Pukul
            itemInHand.position.z += 0.2; setTimeout(() => itemInHand.position.z -= 0.2, 100);
        } else if(e.button === 2) { // RIGHT CLICK: BUILD
            if(activeSlot === 1) return;
            const hits = raycaster.intersectObjects(objects, true);
            if(hits.length > 0 && hits[0].distance < 5) {
                let block;
                if(activeSlot === 2) block = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats.wood);
                if(activeSlot === 3) block = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats.glass);
                if(activeSlot === 4) {
                    block = new THREE.Group();
                    block.add(new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.6, 0.2), mats.torch));
                    const l = new THREE.PointLight(0xffaa00, 10, 12); l.position.y = 0.5;
                    block.add(l);
                }
                if(activeSlot === 5) block = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), mats.dirt);

                const pos = hits[0].point.add(hits[0].face.normal.multiplyScalar(0.5));
                block.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
                scene.add(block);
                objects.push(block);
            }
        }
    });

    window.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveF = true; if(e.code === 'KeyS') moveB = true;
        if(e.code === 'KeyA') moveL = true; if(e.code === 'KeyD') moveR = true;
        if(e.code === 'Space' && canJump) { velocity.y += 12; canJump = false; }
        if(e.key >= '1' && e.key <= '5') {
            activeSlot = parseInt(e.key);
            document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
            document.getElementById('s'+e.key).classList.add('active');
            document.getElementById('item-name').innerText = document.getElementById('s'+e.key).innerText;
            createHandItem();
        }
    });
    window.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveF = false; if(e.code === 'KeyS') moveB = false;
        if(e.code === 'KeyA') moveL = false; if(e.code === 'KeyD') moveR = false;
    });

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if(controls.isLocked) {
            velocity.x -= velocity.x * 10 * delta; velocity.z -= velocity.z * 10 * delta;
            velocity.y -= 9.8 * 4 * delta;
            direction.z = Number(moveF) - Number(moveB); direction.x = Number(moveR) - Number(moveL);
            direction.normalize();
            if(moveF || moveB) velocity.z -= direction.z * 150 * delta;
            if(moveL || moveR) velocity.x -= direction.x * 150 * delta;
            controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
            camera.position.y += velocity.y * delta;
            if(camera.position.y < 2) { velocity.y = 0; camera.position.y = 2; canJump = true; }

            // Ghost Logic
            raycaster.setFromCamera(new THREE.Vector2(), camera);
            const hits = raycaster.intersectObjects(objects, true);
            if(hits.length > 0 && hits[0].distance < 5 && activeSlot > 1) {
                ghost.visible = true;
                const pos = hits[0].point.add(hits[0].face.normal.multiplyScalar(0.5));
                ghost.position.set(Math.round(pos.x), Math.round(pos.y), Math.round(pos.z));
            } else { ghost.visible = false; }

            // Time & Light
            time += delta * 0.1;
            const hour = Math.floor(time) % 24;
            document.getElementById('timer').innerText = (hour < 10 ? '0'+hour : hour) + ":00";
            const isNight = hour >= 18 || hour < 6;
            scene.background.set(isNight ? 0x050515 : 0x87CEEB);
            scene.userData.sun.intensity = isNight ? 0 : 1.2;
            scene.userData.amb.intensity = isNight ? 0.05 : 0.6;
            
            // Item Sway (Goyang pas jalan)
            if(moveF || moveB || moveL || moveR) {
                itemInHand.position.y = -0.5 + Math.sin(Date.now()*0.01)*0.02;
            }
        }
        renderer.render(scene, camera);
    }

    init();
    window.oncontextmenu = (e) => e.preventDefault();
</script>
</body>
</html>
