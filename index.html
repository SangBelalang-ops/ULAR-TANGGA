<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SQUAD SHOWDOWN V18 - MSI ULTRA ENGINE</title>
    <style>
        :root { --p-color: #00d4ff; --e-color: #ff0000; }
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        
        #ui-layer { position: absolute; inset: 0; pointer-events: none; z-index: 100; padding: 40px; }
        .hud-container { display: flex; justify-content: space-between; width: 100%; }
        
        /* Bar Darah Modern */
        .health-bar-bg { width: 450px; height: 35px; background: rgba(255,255,255,0.05); border: 3px solid #fff; position: relative; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .health-bar-inner { height: 100%; width: 100%; transition: width 0.2s cubic-bezier(0.1, 0.7, 1.0, 0.1); }
        #p-hp { background: linear-gradient(90deg, #0088aa, var(--p-color)); box-shadow: 0 0 15px var(--p-color); }
        #e-hp { background: linear-gradient(90deg, var(--e-color), #880000); box-shadow: 0 0 15px var(--e-color); }
        
        /* Combo & Info */
        #combo-wrap { position: absolute; top: 150px; left: 50%; transform: translateX(-50%); text-align: center; }
        .combo-text { font-size: 80px; font-weight: 900; color: #f1c40f; text-shadow: 0 0 20px #000; opacity: 0; transform: scale(0.5); transition: 0.1s; }
        
        /* Overlay Game Over */
        #game-over { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 200; pointer-events: all; }
        .retry-btn { padding: 20px 60px; font-size: 25px; background: var(--p-color); color: #000; border: none; cursor: pointer; font-weight: bold; margin-top: 20px; }
        
        canvas { display: block; filter: contrast(1.1) saturate(1.2); }
    </style>
</head>
<body>

<div id="ui-layer">
    <div class="hud-container">
        <div id="p-hud">
            <div style="font-size: 24px; color: var(--p-color); font-weight: bold;">[FLAUST] PLAYER</div>
            <div class="health-bar-bg"><div id="p-hp" class="health-bar-inner"></div></div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">STAMINA: 100%</div>
        </div>
        <div id="e-hud" style="text-align: right;">
            <div style="font-size: 24px; color: var(--e-color); font-weight: bold;">TEAM MERAH [BOSS]</div>
            <div class="health-bar-bg"><div id="e-hp" class="health-bar-inner"></div></div>
            <div style="color: #666; font-size: 12px; margin-top: 5px;">ARMOR: ACTIVE</div>
        </div>
    </div>
    <div id="combo-wrap"><div id="combo-text" class="combo-text">0 COMBO</div></div>
</div>

<div id="game-over">
    <h1 id="result-text" style="font-size: 60px;">RESULT</h1>
    <button class="retry-btn" onclick="location.reload()">REMATCH (PRESS R)</button>
</div>

<canvas id="mainCanvas"></canvas>

<script>
/**
 * SQUAD SHOWDOWN V18 - THE 1000-GRADE ARCHITECTURE
 * Optimasi: Alvin Phanestu (MSI i7 Core)
 */

const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');

// --- ENGINE CONFIG ---
const CONFIG = {
    gravity: 1.2,
    friction: 0.85,
    groundY: 0.85, // 85% dari tinggi layar
    airFriction: 0.98,
    fps: 60
};

let gameActive = true;
let combo = 0;
let comboTimer = 0;
let shakeTime = 0;

// --- UTILITIES ---
const input = {
    left: false, right: false, up: false, 
    keyZ: false, keyX: false, keyC: false, shift: false
};

window.addEventListener('keydown', e => handleKey(e.code, true));
window.addEventListener('keyup', e => handleKey(e.code, false));

function handleKey(code, isPressed) {
    if (code === 'ArrowLeft') input.left = isPressed;
    if (code === 'ArrowRight') input.right = isPressed;
    if (code === 'ArrowUp') input.up = isPressed;
    if (code === 'KeyZ') input.keyZ = isPressed;
    if (code === 'KeyX') input.keyX = isPressed;
    if (code === 'KeyC') input.keyC = isPressed;
    if (code === 'ShiftLeft') input.shift = isPressed;
    if (code === 'KeyR' && !gameActive) location.reload();
}

// --- PARTICLE SYSTEM ---
class Particle {
    constructor(x, y, color) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 15;
        this.vy = (Math.random() - 0.5) * 15;
        this.life = 1.0;
        this.color = color;
        this.size = Math.random() * 5 + 2;
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        this.vy += 0.5; this.life -= 0.03;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}
let particles = [];

// --- FIGHTER CLASS ---
class Fighter {
    constructor({ x, y, color, isPlayer }) {
        this.pos = { x, y };
        this.vel = { x: 0, y: 0 };
        this.w = 50; this.h = 130;
        this.color = color;
        this.isPlayer = isPlayer;
        this.hp = 100;
        this.isGrounded = false;
        this.dir = isPlayer ? 1 : -1;
        this.state = 'IDLE'; // IDLE, MOVE, JUMP, ATTACK, HIT, DEAD
        this.anim = 0;
        this.attackCooldown = 0;
        this.hitbox = { active: false, x: 0, y: 0, w: 80, h: 50 };
    }

    update() {
        if (this.hp <= 0) {
            this.state = 'DEAD';
            this.vel.x *= 0.9;
            return;
        }

        // Physics
        this.vel.y += CONFIG.gravity;
        this.pos.x += this.vel.x;
        this.pos.y += this.vel.y;
        
        this.vel.x *= (this.isGrounded ? CONFIG.friction : CONFIG.airFriction);

        // Ground check (Fixed Camera logic)
        const groundLevel = canvas.height * CONFIG.groundY - this.h;
        if (this.pos.y > groundLevel) {
            this.pos.y = groundLevel;
            this.vel.y = 0;
            this.isGrounded = true;
        } else {
            this.isGrounded = false;
        }

        // Walls
        if (this.pos.x < 0) this.pos.x = 0;
        if (this.pos.x > canvas.width - this.w) this.pos.x = canvas.width - this.w;

        this.anim += 0.15;
        if (this.attackCooldown > 0) this.attackCooldown--;
        
        this.updateState();
    }

    updateState() {
        if (Math.abs(this.vel.x) > 1 && this.isGrounded) this.state = 'MOVE';
        else if (!this.isGrounded) this.state = 'JUMP';
        else if (this.attackCooldown <= 0) this.state = 'IDLE';
    }

    draw() {
        ctx.save();
        ctx.translate(this.pos.x + this.w/2, this.pos.y + this.h/2);
        ctx.scale(this.dir, 1);
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';

        const phase = Math.sin(this.anim);
        
        // Head
        ctx.beginPath();
        ctx.arc(0, -55 + (this.state==='MOVE'?phase*3:0), 18, 0, Math.PI*2);
        ctx.stroke();

        // Body
        ctx.beginPath();
        ctx.moveTo(0, -35); ctx.lineTo(0, 20);
        ctx.stroke();

        // Limbs logic
        if (this.state === 'ATTACK') {
            // Punching
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(60, -20); ctx.stroke();
        } else {
            // Idle arms
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(-20, 10 + phase*5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(20, 10 - phase*5); ctx.stroke();
        }

        // Legs
        const legX = this.state === 'MOVE' ? phase * 30 : 15;
        ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(-legX, 65); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, 20); ctx.lineTo(legX, 65); ctx.stroke();

        ctx.restore();
    }

    attack(type) {
        if (this.attackCooldown > 0 || this.hp <= 0) return;
        this.state = 'ATTACK';
        this.attackCooldown = 25;
        
        // Define Hitbox
        const hitX = this.dir === 1 ? this.pos.x + this.w : this.pos.x - 80;
        const hitY = this.pos.y + 20;
        
        checkCollision(this, hitX, hitY, 80, 60, type);
    }
}

// --- GAME LOGIC ---
const player = new Fighter({ x: 200, y: 0, color: '#00d4ff', isPlayer: true });
const enemy = new Fighter({ x: window.innerWidth - 300, y: 0, color: '#ff0000', isPlayer: false });

function checkCollision(attacker, hX, hY, hW, hH, type) {
    const victim = attacker.isPlayer ? enemy : player;
    
    // AABB Collision
    if (hX < victim.pos.x + victim.w && hX + hW > victim.pos.x &&
        hY < victim.pos.y + victim.h && hY + hH > victim.pos.y) {
        
        const dmg = type === 'heavy' ? 15 : 7;
        victim.hp -= dmg;
        victim.vel.x = attacker.dir * 15;
        victim.vel.y = -5;
        
        shakeTime = 15;
        spawnParticles(victim.pos.x + victim.w/2, victim.pos.y + 50, attacker.color);

        if (attacker.isPlayer) {
            combo++;
            comboTimer = 100;
            updateComboUI();
        }
    }
}

function updateComboUI() {
    const el = document.getElementById('combo-text');
    el.innerText = combo + " COMBO";
    el.style.opacity = 1;
    el.style.transform = "scale(1.2) translateX(-50%)";
    setTimeout(() => el.style.transform = "scale(1) translateX(-50%)", 50);
}

function spawnParticles(x, y, color) {
    for(let i=0; i<15; i++) particles.push(new Particle(x, y, color));
}

function updateAI() {
    if (enemy.hp <= 0) return;
    const dist = player.pos.x - enemy.pos.x;
    enemy.dir = dist > 0 ? 1 : -1;

    if (Math.abs(dist) > 120) {
        enemy.vel.x = enemy.dir * 5;
    } else {
        if (Math.random() > 0.96) enemy.attack('light');
    }
}

function render() {
    if (!gameActive) return;

    // Reset Canvas
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Camera Shake
    if (shakeTime > 0) {
        ctx.save();
        ctx.translate((Math.random()-0.5)*shakeTime, (Math.random()-0.5)*shakeTime);
        shakeTime--;
    }

    // Ground line
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, canvas.height * CONFIG.groundY);
    ctx.lineTo(canvas.width, canvas.height * CONFIG.groundY);
    ctx.stroke();

    // Input Player
    if (input.left) { player.vel.x = -8; player.dir = -1; }
    if (input.right) { player.vel.x = 8; player.dir = 1; }
    if (input.up && player.isGrounded) { player.vel.y = -25; player.isGrounded = false; }
    if (input.keyZ) player.attack('light');
    if (input.keyX) player.attack('heavy');
    if (input.shift) player.vel.x = player.dir * 20;

    // Update Entity
    player.update();
    enemy.update();
    updateAI();

    // Draw Entity
    player.draw();
    enemy.draw();

    // Particles
    particles.forEach((p, i) => {
        p.update(); p.draw();
        if (p.life <= 0) particles.splice(i, 1);
    });

    if (shakeTime > 0) ctx.restore();

    // UI Update
    document.getElementById('p-hp').style.width = player.hp + "%";
    document.getElementById('e-hp').style.width = enemy.hp + "%";
    
    if (comboTimer > 0) comboTimer--;
    else { combo = 0; document.getElementById('combo-text').style.opacity = 0; }

    // Death Check
    if (player.hp <= 0 || enemy.hp <= 0) {
        gameActive = false;
        const go = document.getElementById('game-over');
        go.style.display = 'flex';
        document.getElementById('result-text').innerText = player.hp <= 0 ? "TEAM MERAH WIN" : "FLAUST WIN";
        document.getElementById('result-text').style.color = player.hp <= 0 ? "red" : "var(--p-color)";
    }

    requestAnimationFrame(render);
}

// Init
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
render();

</script>
</body>
</html>
