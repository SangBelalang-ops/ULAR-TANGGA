<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE MAGA | FAIR PLAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap');
        body { background: #020617; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow: hidden; }
        #game-view { width: 100vw; height: 60vh; overflow: auto; position: relative; background: #0f172a; border-bottom: 2px solid #334155; scroll-behavior: smooth; }
        #board-container { position: relative; width: 900px; height: 900px; background: #1e293b; margin: 0 auto; }
        #board { display: grid; grid-template-columns: repeat(10, 1fr); grid-template-rows: repeat(10, 1fr); width: 100%; height: 100%; }
        .cell { border: 1px solid rgba(255,255,255,0.03); display: flex; align-items: flex-start; padding: 10px; font-size: 18px; font-weight: 800; color: rgba(255,255,255,0.05); }
        .svg-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .ladder-group path { stroke: #22c55e; stroke-width: 4; fill: none; opacity: 0.7; filter: drop-shadow(0 0 5px #22c55e); }
        .ladder-group line { stroke: #22c55e; stroke-width: 3; opacity: 0.7; }
        .snake-group path { stroke: #ef4444; stroke-width: 6; fill: none; opacity: 0.7; stroke-linecap: round; filter: drop-shadow(0 0 8px #ef4444); }
        .snake-head { fill: #ef4444; opacity: 0.8; }
        .pawn { width: 60px; height: 60px; position: absolute; z-index: 50; transition: all 0.3s ease-out; background-size: cover; background-position: center; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 10px 25px rgba(0,0,0,0.7); }
        .pawn-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: #fff; color: #000; font-size: 8px; padding: 1px 5px; border-radius: 4px; font-weight: 900; white-space: nowrap; }
        .dice { width: 90px; height: 90px; background: #fff; color: #000; border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 4rem; cursor: pointer; box-shadow: 0 8px 0 #94a3b8; }
        .dice-rolling { animation: roll 0.1s infinite; }
        @keyframes roll { 0% { transform: rotate(0); } 100% { transform: rotate(15deg); } }
    </style>
</head>
<body>

<div id="setup-screen" class="fixed inset-0 bg-[#020617] z-[1000] flex flex-col items-center justify-center p-6">
    <h1 class="text-7xl font-black italic text-yellow-500 mb-2">SNAKE <span class="text-white">MAGA</span></h1>
    <div id="name-selector" class="grid grid-cols-3 gap-2 mb-6"></div>
    <button onclick="handleEntry('join')" class="w-full max-w-sm bg-yellow-600 py-5 rounded-2xl font-black text-white">MASUK SQUAD</button>
</div>

<div id="game-ui" class="hidden flex flex-col h-screen">
    <div id="game-view"><div id="board-container"><svg id="svg-connections" class="svg-overlay"></svg><div id="board"></div></div></div>
    <div class="bg-slate-900 p-4 flex gap-4 h-[30vh]">
        <div class="flex flex-col items-center justify-center w-1/4">
            <div id="dice" class="dice" onclick="handleRoll()">🎲</div>
            <div id="status-text" class="text-[10px] font-black text-yellow-500 uppercase mt-2">Menunggu...</div>
        </div>
        <div id="chat-box" class="flex-1 bg-black/50 rounded-xl p-3 overflow-y-auto text-[11px]"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1iv6fdSjMcm-i4CETVlNZuS9CB6VulyM",
        authDomain: "ulartanggasquad.firebaseapp.com",
        databaseURL: "https://ulartanggasquad-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ulartanggasquad",
        storageBucket: "ulartanggasquad.firebasestorage.app",
        messagingSenderId: "492517449717",
        appId: "1:492517449717:web:becd2a0771a1c3d8a0cabc"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const squad = ["Lilas", "Albert", "Tegar", "Meggy", "Anjas", "Piter"];
    const jumps = { 2:38, 7:14, 8:31, 15:26, 21:42, 36:44, 51:67, 71:91, 78:98, 16:6, 46:25, 49:11, 62:19, 64:60, 74:53, 89:68, 95:75, 99:80 };
    let myName = '', roomCode = 'SNAKE-MAGA-FAIR';

    squad.forEach(n => {
        const b = document.createElement('button'); b.innerText = n;
        b.className = "name-btn bg-slate-800 p-3 rounded-xl text-[10px] font-bold";
        b.onclick = () => { myName = n; document.querySelectorAll('.name-btn').forEach(x => x.style.border="none"); b.style.border="2px solid yellow"; };
        document.getElementById('name-selector').appendChild(b);
    });

    function handleEntry() {
        if(!myName) return alert("Pilih Nama!");
        db.ref('rooms/'+roomCode).transaction(d => {
            if(!d) return { players: [{name:myName, pos:1, finished:false}], turnIndex:0, moving:false };
            if(!d.players.find(p=>p.name===myName)) d.players.push({name:myName, pos:1, finished:false});
            return d;
        }, () => { document.getElementById('setup-screen').className='hidden'; document.getElementById('game-ui').className='flex flex-col h-screen'; initBoard(); sync(); });
    }

    function initBoard() {
        const b = document.getElementById('board'); b.innerHTML = '';
        for (let r=9; r>=0; r--) {
            for (let c=0; c<10; c++) {
                let num = (r%2===0) ? (r*10+c+1) : (r*10+(10-c));
                const cell = document.createElement('div'); cell.className='cell'; cell.id=`cell-${num}`; cell.innerHTML=`<span>${num}</span>`;
                b.appendChild(cell);
            }
        }
        setTimeout(drawConnections, 500);
    }

    function drawConnections() {
        const svg = document.getElementById('svg-connections'); svg.innerHTML = '';
        const bRect = document.getElementById('board-container').getBoundingClientRect();
        Object.keys(jumps).forEach(s => {
            const start=parseInt(s), end=jumps[s], sEl=document.getElementById(`cell-${start}`).getBoundingClientRect(), eEl=document.getElementById(`cell-${end}`).getBoundingClientRect();
            const x1=sEl.left-bRect.left+30, y1=sEl.top-bRect.top+30, x2=eEl.left-bRect.left+30, y2=eEl.top-bRect.top+30;
            const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
            g.setAttribute("class", end>start?"ladder-group":"snake-group");
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", end>start ? `M${x1-5},${y1} L${x2-5},${y2} M${x1+5},${y1} L${x2+5},${y2}` : `M${x1},${y1} Q${(x1+x2)/2+20},${(y1+y2)/2-20} ${x2},${y2}`);
            g.appendChild(p); svg.appendChild(g);
        });
    }

    function sync() {
        db.ref('rooms/'+roomCode).on('value', s => {
            const d = s.val(); if(!d) return;
            const turnP = d.players[d.turnIndex];
            document.getElementById('status-text').innerText = turnP.name === myName ? "GILIRAN LO!" : turnP.name + " JALAN";
            document.querySelectorAll('.pawn').forEach(p=>p.remove());
            d.players.forEach((p,i) => {
                const cell = document.getElementById(`cell-${p.pos}`);
                const rect = cell.getBoundingClientRect(); const bRect = document.getElementById('board-container').getBoundingClientRect();
                const pawn = document.createElement('div'); pawn.className='pawn'+(p.finished?' grayscale opacity-50':'');
                pawn.style.left=`${rect.left-bRect.left+(i*5)}px`; pawn.style.top=`${rect.top-bRect.top+(i*5)}px`;
                pawn.style.backgroundColor = ["#ef4444","#3b82f6","#22c55e","#eab308","#a855f7","#ec4899"][i];
                pawn.innerHTML = `<div class="pawn-label">${p.name}</div>`;
                document.getElementById('board-container').appendChild(pawn);
            });
            if (d.players.every(p => p.finished)) { alert("GAME OVER!"); db.ref('rooms/'+roomCode).remove(); location.reload(); }
        });
    }

    async function handleRoll() {
        const snap = await db.ref('rooms/'+roomCode).get(); const d = snap.val();
        if(!d || d.players[d.turnIndex].name !== myName || d.moving || d.players[d.turnIndex].finished) return;
        
        const roll = Math.floor(Math.random()*6)+1;
        await db.ref('rooms/'+roomCode).update({moving:true, lastRoll:roll});
        document.getElementById('dice').classList.add('dice-rolling');
        
        setTimeout(async () => {
            document.getElementById('dice').classList.remove('dice-rolling');
            let pList = [...d.players]; let p = pList[d.turnIndex];
            let start = p.pos;
            let target = Math.min(start + roll, 100);

            // JALAN SESUAI DADU (FIXED LOGIC)
            for(let i=start+1; i<=target; i++) {
                p.pos = i;
                await db.ref('rooms/'+roomCode+'/players').set(pList);
                await new Promise(r => setTimeout(r, 300));
            }

            // CEK ULAR/TANGGA SETELAH BERHENTI
            if(jumps[p.pos]) {
                await new Promise(r => setTimeout(r, 500));
                p.pos = jumps[p.pos];
                await db.ref('rooms/'+roomCode+'/players').set(pList);
            }

            if(p.pos === 100) { p.finished = true; confetti(); }

            // OPER GILIRAN KE YANG BELUM FINISH
            let next = (d.turnIndex + 1) % pList.length;
            while(pList[next].finished && !pList.every(pl=>pl.finished)) { next = (next + 1) % pList.length; }
            
            await db.ref('rooms/'+roomCode).update({turnIndex:next, moving:false});
        }, 1000);
    }
</script>
</body>
</html>
